    segDist = Math.hypot(s.toX - info.segStart.x, s.toY - info.segStart.y);
  }
  if (segDist < 0.1) return;
  const targetMs = Math.max(50, Math.round(segDist * msPerU));
  _edStepSetTotalDur(s, targetMs);
}

// Ball-holder tracking in authoring orientation. Walks ball constructs in a
// step list and returns the resulting holder role. Handles par sub-steps and
// legacy ballFly/ballTo primitives.
function _edApplyBallTransitions(steps, holder) {
  for (const step of steps || []) {
    if (step.par) {
      holder = _edApplyBallTransitions(step.par, holder);
      continue;
    }
    if (step.ball) {
      const b = step.ball;
      if (b.kind === 'pass' || b.kind === 'throw')  holder = b.to || holder;
      else if (b.kind === 'intercept')              holder = b.interceptedBy || holder;
      // shot/clear don't transfer
    } else if (step.ballTo) {
      holder = step.ballTo;
    } else if (step.ballFly) {
      holder = step.ballFly;
    }
  }
  return holder;
}

// Ball holder at the START of the given phase. For setup/prePlay the holder is
// whoever has hasBall:true in setup. For payoff we apply all ball transitions
// from prePlay.
function _edPhaseBallHolder(play, phase) {
  let holder = null;
  for (const [r, p] of Object.entries(play.setup || {})) {
    if (p && p.hasBall) { holder = r; break; }
  }
  if (!holder) return null;
  const idx = _edPhaseIdx(play, phase);
  if (idx <= 0) return holder;
  // Walk ball transitions across every prior phase.
  if (Array.isArray(play.phases)) {
    for (let i = 0; i < idx && i < play.phases.length; i++) {
      holder = _edApplyBallTransitions(play.phases[i], holder);
    }
    return holder;
  }
  return _edApplyBallTransitions(play.prePlay, holder);
}

// Collect every ball construct in a phase's step list (including par sub-steps),
// in execution order. Setup phase has no step list so no ball events are emitted.
// Legacy ballFly/ballTo primitives are lifted into a ball-shaped object so the
// renderer can treat everything uniformly.
function _edCollectBallEvents(play, phase) {
  const idx = _edPhaseIdx(play, phase);
  if (idx < 0) return [];
  const events = [];
  let holder = _edPhaseBallHolder(play, phase);
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return events;
  function walk(list) {
    for (const step of list) {
      if (step.par) { walk(step.par); continue; }
      if (step.ball) {
        const b = step.ball;
        const from = b.from || holder;
        const to = b.to || null;
        events.push({ from, to, kind: b.kind, interceptedBy: b.interceptedBy || null, toX: b.toX, toY: b.toY });
        if (b.kind === 'pass' || b.kind === 'throw')  holder = b.to || holder;
        else if (b.kind === 'intercept')              holder = b.interceptedBy || holder;
      } else if (step.ballTo) {
        events.push({ from: holder, to: step.ballTo, kind: 'pass' });
        holder = step.ballTo;
      } else if (step.ballFly) {
        events.push({ from: holder, to: step.ballFly, kind: 'pass' });
        holder = step.ballFly;
      }
    }
  }
  walk(steps);
  return events;
}

// Append a `{ ball: {...} }` step to a phase. Used by the Pass tool.
// Session J — three-step behavior so the designer doesn't stack duplicate
// ball events when the author re-draws a pass line:
//   1. If a ball event with matching `from` AND `to` already exists in the
//      phase (top-level or inside a par), update its fields in place.
//      Preserves any authored delay.
//   2. Else, if the phase has a par, insert the new ball event INTO that par
//      so the pass fires concurrent with motion.
//   3. Else, push top-level.
// Returns true on success.
function _edAppendBallStep(play, phase, ball) {
  const steps = _edPhaseSteps(play, phase);
  if (!steps) return false;
  for (const step of steps) {
    if (step.par && Array.isArray(step.par)) {
      for (const sub of step.par) {
        if (sub.ball && sub.ball.from === ball.from && sub.ball.to === ball.to) {
          Object.assign(sub.ball, ball);
          return true;
        }
      }
    } else if (step.ball && step.ball.from === ball.from && step.ball.to === ball.to) {
      Object.assign(step.ball, ball);
      return true;
    }
  }
  let firstPar = null;
  for (const step of steps) {
    if (step.par && Array.isArray(step.par)) { firstPar = step; break; }
  }
  if (firstPar) {
    firstPar.par.push({ ball });
  } else {
    steps.push({ ball });
  }
  return true;
}

// Session J — compute a role's position at time t (ms, par-relative) using
// the same linear interp the engine does. Mirrors resolveRoleAtT's walker
// but accepts explicit parSteps + parStartPos, so the designer renderer can
// place ball-event endpoints at the moment the event actually fires/arrives.
function _edRoleInParAtT(parSteps, role, parStartPos, t) {
  let cx = parStartPos && parStartPos[role] ? parStartPos[role].x : 0;
  let cy = parStartPos && parStartPos[role] ? parStartPos[role].y : 0;
  if (!Array.isArray(parSteps)) return { x: cx, y: cy };
  for (const ps of parSteps) {
    if (!ps || ps.role !== role) continue;
    const d = ps.delay || 0;
    if (t <= d) return { x: cx, y: cy };
    const localT = t - d;
    if ('toX' in ps && 'toY' in ps) {
      const dur = ps.dur || 0;
      if (dur <= 0) { cx = ps.toX; cy = ps.toY; continue; }
      const p = Math.max(0, Math.min(1, localT / dur));
      const nx = cx + (ps.toX - cx) * p;
      const ny = cy + (ps.toY - cy) * p;
      if (p < 1) return { x: nx, y: ny };
      cx = ps.toX; cy = ps.toY;
    } else if (Array.isArray(ps.waypoints) && ps.waypoints.length) {
      let cum = 0;
      let curX = cx, curY = cy;
      let consumed = false;
      for (let wi = 0; wi < ps.waypoints.length; wi++) {
        const wp = ps.waypoints[wi];
        const interDelay = wi > 0 ? (wp.delay || 0) : 0;
        if (interDelay > 0) {
          if (localT <= cum + interDelay) return { x: curX, y: curY };
          cum += interDelay;
        }
        const segDur = wp.dur || 0;
        if (localT <= cum + segDur) {
          const p = segDur > 0 ? Math.max(0, Math.min(1, (localT - cum) / segDur)) : 1;
          return { x: curX + (wp.x - curX) * p, y: curY + (wp.y - curY) * p };
        }
        cum += segDur;
        curX = wp.x; curY = wp.y;
        consumed = true;
      }
      if (consumed) { cx = curX; cy = curY; }
    }
  }
  return { x: cx, y: cy };
}

// Transfer possession in the setup block. Clears hasBall from whoever has it and
// sets it on `newHolder`. Idempotent.
function _edSetSetupBallHolder(play, newHolder) {
  if (!play || !play.setup || !play.setup[newHolder]) return false;
  for (const [r, p] of Object.entries(play.setup)) {
    if (r === newHolder) p.hasBall = true;
    else if (p && p.hasBall) delete p.hasBall;
  }
  return true;
}

// Delete a step addressed by a stable path: topIdx and optional subIdx (for par
// sub-steps). Removes the step from the phase. For ball-inside-par where the par
// becomes empty, removes the empty par too. Returns true on success.
function _edDeletePhaseStep(play, phase, topIdx, subIdx) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps) || topIdx < 0 || topIdx >= steps.length) return false;
  const top = steps[topIdx];
  if (subIdx == null) {
    steps.splice(topIdx, 1);
    return true;
  }
  if (!top.par || !Array.isArray(top.par) || subIdx < 0 || subIdx >= top.par.length) return false;
  top.par.splice(subIdx, 1);
  if (top.par.length === 0) steps.splice(topIdx, 1);
  return true;
}

// Build a flat index of every step in a phase with an addressable path. Used by
// the renderer to tag lines with data-ed-step attributes so clicks can remove
// the exact step behind each line.
function _edEnumeratePhaseSteps(play, phase) {
  const out = [];
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return out;
  steps.forEach((step, topIdx) => {
    if (step.par && Array.isArray(step.par)) {
      step.par.forEach((sub, subIdx) => {
        out.push({ topIdx, subIdx, step: sub });
      });
    } else {
      out.push({ topIdx, subIdx: null, step });
    }
  });
  return out;
}

// Infer which tool authored a motion step (dribble/run/sprint/unknown) from its
// dur/distance ratio. Tolerance ±25 ms/u around each tier centroid.
// Returns a color string or null if no motion/ambiguous.
function _edMotionToolColor(startPos, step) {
  // Single-segment or waypoint; compute total distance + total dur.
  let dist = 0, dur = 0;
  if ('toX' in step && 'toY' in step) {
    const s = startPos[step.role] || {};
    dist = Math.hypot((step.toX - (s.x || 0)), (step.toY - (s.y || 0)));
    dur = step.dur || 0;
  } else if (step.waypoints && step.waypoints.length) {
    dur = step.waypoints.reduce((a, w) => a + (w.dur || 0), 0);
    const s = startPos[step.role] || {};
    let prevX = s.x || 0, prevY = s.y || 0;
    for (const w of step.waypoints) {
      dist += Math.hypot(w.x - prevX, w.y - prevY);
      prevX = w.x; prevY = w.y;
    }
  } else {
    return null;
  }
  if (dist < 0.5 || dur <= 0) return null;
  const ratio = dur / dist;
  // Pick the closest tier centroid. Reject as "unknown" if even the nearest is
  // more than 18 ms/u away — that means the step was hand-tuned off the tiers.
  const tiers = [
    // Session H fix — Sprint used to render amber, which looked identical to
    // the Score-yellow ball arrow and read as a scoring line on defenders.
    // Changed to orange so Sprint motion is distinct from any ball-event arrow.
    { ms: 130, col: 'rgba(90,190,220,0.88)' },  // dribble (carry)
    { ms: 110, col: 'rgba(110,200,130,0.88)' }, // run
    { ms:  75, col: 'rgba(235,125,35,0.90)' },  // sprint (orange, not amber)
  ];
  let best = null;
  for (const t of tiers) {
    const d = Math.abs(ratio - t.ms);
    if (!best || d < best.d) best = { d, col: t.col };
  }
  if (best && best.d <= 18) return best.col;
  // Off-tier (hand-tuned) durs render dim gray so they don't read as
  // pass-white or score-yellow ball arrows.
  return 'rgba(160,160,160,0.70)';
}

// Slice 4 — tier ms/u lookup. Dribble is carry tier (130), Run is run tier (110).
// Sprint tier (75) is reserved for YOU's critical bursts; not exposed as a Slice 4 tool.
const _ED_TIER_MS = { dribble: 130, run: 110, sprint: 75 };
function _edTierMsPerU(tool) { return _ED_TIER_MS[tool] || 110; }
function _edDurFromDistance(distU, tool) {
  const ms = distU * _edTierMsPerU(tool);
  return Math.max(50, Math.round(ms / 50) * 50);
}

// Has the role released the ball AFTER their last motion step in this phase?
// Returns true when the role was the `from` of a ball event whose step-index
// is equal to or greater than the role's last motion step index. Used by the
// upsert / waypoint-extend paths to decide whether a new drag authored for
// the role should mutate the terminal motion (pre-pass) or append a NEW
// top-level step (off-ball continuation after the pass).
//
// Index comparison is TOP-LEVEL only; ball and motion inside the same par are
// treated as "released concurrent with motion," which still qualifies as
// released-after for the purpose of appending continuation.
function _edRoleHasReleasedBallAfterLastMotion(play, phase, role) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return false;
  let lastMotionIdx = -1;
  let releaseIdx = -1;
  const isMotion = (s) => s && s.role === role &&
    (('toX' in s && 'toY' in s) || (Array.isArray(s.waypoints) && s.waypoints.length));
  const isRelease = (s) => {
    if (!s) return false;
    if (s.ball && s.ball.from === role) return true;
    return false;
  };
  for (let i = 0; i < steps.length; i++) {
    const step = steps[i];
    if (step.par && Array.isArray(step.par)) {
      for (const sub of step.par) {
        if (isMotion(sub)) lastMotionIdx = i;
        if (isRelease(sub)) releaseIdx = i;
      }
    } else {
      if (isMotion(step)) lastMotionIdx = i;
      if (isRelease(step)) releaseIdx = i;
    }
  }
  return releaseIdx >= 0 && releaseIdx >= lastMotionIdx;
}

// Slice 4 — upsert a movement step for a role in a phase. If the role already has
// a terminal motion step in the phase, mutate it (toX/toY/dur or last waypoint +
// total waypoint dur). If not, append a new top-level `{ role, toX, toY, dur }`
// step to the phase's step list. Authoring orientation — caller must un-mirror x
// for A-series plays.
//
// Session J — if the role has released the ball AFTER their last motion step
// (i.e., authored a pass from their terminal position), the role's next motion
// is an OFF-BALL continuation and MUST be a new top-level step. Mutating the
// pre-pass terminal would rewrite the dribble's endpoint and destroy the pass.
function _edUpsertPhaseStep(play, phase, role, toX, toY, dur) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return false;
  const rx = Math.round(toX * 10) / 10;
  const ry = Math.round(toY * 10) / 10;
  const rd = Math.max(50, Math.round(dur));
  const releasedAfter = _edRoleHasReleasedBallAfterLastMotion(play, phase, role);
  let lastStep = null;
  for (const step of steps) {
    if (step.par) {
      for (const sub of step.par) {
        if (sub.role === role &&
            (('toX' in sub && 'toY' in sub) || (sub.waypoints && sub.waypoints.length))) {
          lastStep = sub;
        }
      }
    } else if (step.role === role &&
               (('toX' in step && 'toY' in step) || (step.waypoints && step.waypoints.length))) {
      lastStep = step;
    }
  }
  if (lastStep && !releasedAfter) {
    if (lastStep.waypoints && lastStep.waypoints.length) {
      const last = lastStep.waypoints[lastStep.waypoints.length - 1];
      last.x = rx; last.y = ry;
      // Keep waypoint timing intact; only adjust the final segment's dur if single-segment.
      if (lastStep.waypoints.length === 1) lastStep.waypoints[0].dur = rd;
    } else {
      lastStep.toX = rx; lastStep.toY = ry; lastStep.dur = rd;
    }
    return true;
  }
  // Append a new step.
  // - releasedAfter: top-level sequential (the role already occupies the
  //   earlier par via their pre-pass motion, so pushing into that same par
  //   would create two concurrent motions for one DOM element).
  // - fresh motion (no prior step for the role): prefer the FIRST par in
  //   the phase so the new motion is concurrent with the phase's primary
  //   motion set. Earlier behavior pushed into the TRAILING step only; when
  //   the tail was a shot or ball event, the motion fell out to top-level
  //   sequential and played AFTER every other motion in the phase. That
  //   caused the "players stand waiting while the new runner goes" feel.
  if (releasedAfter) {
    steps.push({ role, toX: rx, toY: ry, dur: rd });
    return true;
  }
  let targetPar = null;
  for (const step of steps) {
    if (step.par && Array.isArray(step.par)) { targetPar = step.par; break; }
  }
  if (targetPar) {
    targetPar.push({ role, toX: rx, toY: ry, dur: rd });
  } else {
    steps.push({ role, toX: rx, toY: ry, dur: rd });
  }
  return true;
}

// Slice 4 — find the role whose phase-start position is nearest to (px, py),
// within `maxDist` units. Returns { role, pos, dist } or null.
function _edNearestPhaseStart(play, phase, px, py, maxDist) {
  const start = _edPhaseStartPositions(play, phase);
  let best = null;
  for (const role of Object.keys(start)) {
    const p = start[role];
    const d = Math.hypot(p.x - px, p.y - py);
    if (d <= maxDist && (!best || d < best.dist)) best = { role, pos: p, dist: d };
  }
  return best;
}

// Session I — check both phase-start AND phase-end positions. The drag caller
// uses `isEnd` to branch between "new motion line" (start anchor) and "add a
// pivot waypoint" (end anchor). Only returns an end anchor when the role
// actually moved in the phase (end ≠ start).
function _edNearestPhaseAnchor(play, phase, px, py, maxDist) {
  const startMap = _edPhaseStartPositions(play, phase);
  const endMap   = _edPhaseEndPositions(play, phase);
  let best = null;
  for (const role of Object.keys(startMap)) {
    const p = startMap[role];
    const d = Math.hypot(p.x - px, p.y - py);
    if (d <= maxDist && (!best || d < best.dist)) best = { role, pos: p, dist: d, isEnd: false };
  }
  for (const role of Object.keys(endMap)) {
    const s = startMap[role];
    const p = endMap[role];
    if (!s || Math.hypot(p.x - s.x, p.y - s.y) < 0.3) continue;
    const d = Math.hypot(p.x - px, p.y - py);
    if (d <= maxDist && (!best || d < best.dist)) best = { role, pos: p, dist: d, isEnd: true };
  }
  return best;
}

// Session I — extend a role's existing motion step in the active phase with
// a new waypoint (authoring orientation — caller un-mirrors x for A-series).
// If the step is single-segment `{ role, toX, toY, dur }`, convert it to a
// waypoint step first so the existing geometry becomes waypoint[0] and the
// new target becomes waypoint[1]. If it's already a waypoint step, append.
// Returns true on success, false if the role has no prior motion step in
// this phase (caller should fall back to upsert / status hint).
function _edAppendWaypoint(play, phase, role, toX, toY, dur) {
  // Session J — if the role released the ball after their last motion, any
  // new drag-from-end-position is an OFF-BALL continuation, not a pivot of
  // the pre-pass carry. Refuse here and let the caller fall back to
  // _edUpsertPhaseStep, which appends a new top-level step in that case.
  if (_edRoleHasReleasedBallAfterLastMotion(play, phase, role)) return false;
  const info = _edLastMotionStepInfo(play, phase, role);
  if (!info || !info.step) return false;
  const step = info.step;
  const rx = Math.round(toX * 10) / 10;
  const ry = Math.round(toY * 10) / 10;
  const rd = Math.max(50, Math.round(dur / 50) * 50);
  if (Array.isArray(step.waypoints) && step.waypoints.length) {
    step.waypoints.push({ x: rx, y: ry, dur: rd });
    return true;
  }
  if ('toX' in step && 'toY' in step) {
    const firstDur = Math.max(50, Math.round((step.dur || 0) / 50) * 50);
    step.waypoints = [
      { x: step.toX, y: step.toY, dur: firstDur },
      { x: rx, y: ry, dur: rd }
    ];
    delete step.toX;
    delete step.toY;
    delete step.dur;
    return true;
  }
  return false;
}

// =====================================================================
// Session I — Motion Inspector
// Clicking a dotted motion connector in a motion phase opens an inline
// inspector that live-updates the step's speed (dur) and delay. Tier
// buttons (Dribble/Run/Sprint) snap to the canonical ms/u; Custom unlocks
// the slider. Waypoint steps scale each waypoint's dur proportionally.
// =====================================================================

const _ED_TIER_MS_LOOKUP = { dribble: 130, run: 110, sprint: 75 };
// Speed slider covers 30–300 ms/u. The slider's RAW value is 0..270 and is
// inverted at read/write time so dragging RIGHT means FASTER (lower ms/u).
// 30 ms/u → raw 270 (right end, very fast). 300 ms/u → raw 0 (left end, very slow).
const _ED_SPEED_MS_MIN = 30;
const _ED_SPEED_MS_MAX = 300;
const _ED_SPEED_SLIDER_STEP = 5;
const _ED_SPEED_SLIDER_SHIFT = 25;
// Inverse mapping — keep a single source of truth for the two directions.
function _edSpeedSliderFromMs(ms) { return Math.max(0, Math.min(_ED_SPEED_MS_MAX - _ED_SPEED_MS_MIN, _ED_SPEED_MS_MAX - ms)); }
function _edSpeedMsFromSlider(raw) { return Math.max(_ED_SPEED_MS_MIN, Math.min(_ED_SPEED_MS_MAX, _ED_SPEED_MS_MAX - raw)); }
const _ED_DELAY_SLIDER_STEP = 50;
const _ED_DELAY_SLIDER_SHIFT = 100;
const _ED_PAR_MAX_MS = 15000;     // par-total clamp for delay warning
const _ED_TIER_TOL = 6;           // ms/u tolerance for tier detection

// Session I — locate a specific SEGMENT of a motion step. A "segment" is the
// atomic unit the motion inspector edits: either the whole single-segment
// step (wpIdx === null) or one waypoint within a waypoint step (wpIdx >= 0).
// Returns { step, segment, segmentStart, segmentEnd, isWaypoint, wpIdx } — or
// null if the address doesn't resolve. `segment` is the object whose `dur`
// property represents that segment's duration (the step itself for single-
// segment, or the waypoint object for waypoint steps).
function _edLocateSegment(play, phase, topIdx, subIdx, wpIdx) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps) || topIdx < 0 || topIdx >= steps.length) return null;
  const startMap = _edPhaseStartPositions(play, phase);
  const cursor = {};
  for (const r in startMap) cursor[r] = { x: startMap[r].x, y: startMap[r].y };

  const isMotion = (s) => s && s.role && (('toX' in s && 'toY' in s) || (s.waypoints && s.waypoints.length));
  const applyMotion = (s) => {
    if (!isMotion(s)) return;
    if ('toX' in s && 'toY' in s) cursor[s.role] = { x: s.toX, y: s.toY };
    else {
      const last = s.waypoints[s.waypoints.length - 1];
      cursor[s.role] = { x: last.x, y: last.y };
    }
  };

  for (let ti = 0; ti < steps.length; ti++) {
    const step = steps[ti];
    if (step.par && Array.isArray(step.par)) {
      if (ti === topIdx && subIdx != null && subIdx >= 0 && subIdx < step.par.length) {
        return _edBuildSegmentInfo(step.par[subIdx], cursor, wpIdx);
      }
      step.par.forEach(applyMotion);
    } else {
      if (ti === topIdx && subIdx == null) {
        return _edBuildSegmentInfo(step, cursor, wpIdx);
      }
      applyMotion(step);
    }
  }
  return null;
}

function _edBuildSegmentInfo(step, cursor, wpIdx) {
  if (!step || !step.role) return null;
  const base = (cursor && cursor[step.role]) || { x: 50, y: 30 };
  // Single-segment step OR waypoint step with no wpIdx specified (fallback).
  if (wpIdx == null) {
    if ('toX' in step && 'toY' in step) {
      return {
        step, segment: step,
        segmentStart: { x: base.x, y: base.y },
        segmentEnd:   { x: step.toX, y: step.toY },
        isWaypoint: false, wpIdx: null
      };
    }
    if (Array.isArray(step.waypoints) && step.waypoints.length) {
      return _edBuildWpSegmentInfo(step, 0, base);
    }
    return null;
  }
  if (Array.isArray(step.waypoints) && wpIdx >= 0 && wpIdx < step.waypoints.length) {
    return _edBuildWpSegmentInfo(step, wpIdx, base);
  }
  return null;
}

function _edBuildWpSegmentInfo(step, i, base) {
  let px = base.x, py = base.y;
  for (let j = 0; j < i; j++) { px = step.waypoints[j].x; py = step.waypoints[j].y; }
  const w = step.waypoints[i];
  return {
    step, segment: w,
    segmentStart: { x: px, y: py },
    segmentEnd:   { x: w.x, y: w.y },
    isWaypoint: true, wpIdx: i
  };
}

// Session I — waypoint-aware delete. Deletes just the addressed segment. For
// single-segment steps (wpIdx === null) the whole step is removed. For
// waypoint steps, removes waypoints[wpIdx]; if the step has no waypoints left,
// the step itself is removed.
function _edDeletePhaseSegment(play, phase, topIdx, subIdx, wpIdx) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps) || topIdx < 0 || topIdx >= steps.length) return false;
  const top = steps[topIdx];
  let container, containerIdx, targetStep;
  if (subIdx == null) {
    container = steps; containerIdx = topIdx; targetStep = top;
  } else {
    if (!top.par || !Array.isArray(top.par)) return false;
    if (subIdx < 0 || subIdx >= top.par.length) return false;
    container = top.par; containerIdx = subIdx; targetStep = top.par[subIdx];
  }
  if (!targetStep) return false;
  if (wpIdx != null && Array.isArray(targetStep.waypoints) &&
      wpIdx >= 0 && wpIdx < targetStep.waypoints.length) {
    targetStep.waypoints.splice(wpIdx, 1);
    if (targetStep.waypoints.length === 0) {
      container.splice(containerIdx, 1);
      if (subIdx != null && top.par.length === 0) steps.splice(topIdx, 1);
    } else if (targetStep.waypoints.length === 1) {
      // Collapse one-waypoint step back to a single-segment shape.
      const w = targetStep.waypoints[0];
      targetStep.toX = w.x; targetStep.toY = w.y; targetStep.dur = w.dur || 0;
      delete targetStep.waypoints;
    }
    return true;
  }
  return _edDeletePhaseStep(play, phase, topIdx, subIdx);
}

// Find a specific step in a phase by (topIdx, subIdx). Returns { step, parent }
// or null. parent is the par sub-list if the step lives inside a par, else the
// phase steps array. Call sites can mutate `step` in place; the parent is only
// useful for par-bound total-ms checks.
function _edLocateStep(play, phase, topIdx, subIdx) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return null;
  if (topIdx < 0 || topIdx >= steps.length) return null;
  const top = steps[topIdx];
  if (subIdx == null) return { step: top, parent: steps, parSteps: null };
  if (!top.par || !Array.isArray(top.par)) return null;
  if (subIdx < 0 || subIdx >= top.par.length) return null;
  return { step: top.par[subIdx], parent: top.par, parSteps: top.par };
}

// Total straight-line distance covered by a motion step in authoring units.
// Starts from `startAuthored` (the role's phase-start in authoring orientation —
// caller supplies via _edPhaseStartPositions). For waypoints, sums per-segment.
function _edStepDistance(step, startAuthored) {
  if (!step) return 0;
  if ('toX' in step && 'toY' in step) {
    return Math.hypot(step.toX - startAuthored.x, step.toY - startAuthored.y);
  }
  if (step.waypoints && step.waypoints.length) {
    let prev = { x: startAuthored.x, y: startAuthored.y };
    let total = 0;
    for (const w of step.waypoints) {
      total += Math.hypot(w.x - prev.x, w.y - prev.y);
      prev = { x: w.x, y: w.y };
    }
    return total;
  }
  return 0;
}

// Total dur in ms for a motion step (single toX/toY dur, or sum of waypoint durs).
function _edStepTotalDur(step) {
  if (!step) return 0;
  if (step.waypoints && step.waypoints.length) {
    return step.waypoints.reduce((s, w) => s + (w.dur || 0), 0);
  }
  return step.dur || 0;
}

// Write a new total dur to a motion step. Single-segment: mutate step.dur.
// Waypoint: scale each waypoint's dur proportionally so inner boundary timing
// is preserved. Each waypoint's dur is rounded to nearest 50 ms with a floor
// of 50 ms. Returns the final dur actually written (which may differ from
// requested due to flooring).
function _edStepSetTotalDur(step, totalDurMs) {
  const targetMs = Math.max(50, Math.round(totalDurMs));
  if (step.waypoints && step.waypoints.length) {
    const cur = step.waypoints.reduce((s, w) => s + (w.dur || 0), 0);
    if (cur <= 0) {
      // Distribute evenly.
      const each = Math.max(50, Math.round((targetMs / step.waypoints.length) / 50) * 50);
      step.waypoints.forEach(w => { w.dur = each; });
    } else {
      const scale = targetMs / cur;
      step.waypoints.forEach(w => {
        const raw = (w.dur || 0) * scale;
        w.dur = Math.max(50, Math.round(raw / 50) * 50);
      });
    }
    return step.waypoints.reduce((s, w) => s + (w.dur || 0), 0);
  }
  step.dur = targetMs;
  return step.dur;
}

// Infer which tier a segment or step is closest to. Accepts either a numeric
// dur (ms) OR a step object (for backward compat — falls back to total dur).
function _edInferTier(durOrStep, distance) {
  const dur = typeof durOrStep === 'number' ? durOrStep : _edStepTotalDur(durOrStep);
  if (distance <= 0 || dur <= 0) return 'custom';
  const ratio = dur / distance;
  let best = null;
  for (const [name, ms] of Object.entries(_ED_TIER_MS_LOOKUP)) {
    const d = Math.abs(ratio - ms);
    if (!best || d < best.d) best = { d, name };
  }
  if (best && best.d <= _ED_TIER_TOL) return best.name;
  return 'custom';
}

// Parent par's total ms (including delays) so the delay clamp warning is
// informed. Returns null when the step lives at the phase top level.
function _edStepParMs(parSteps) {
  if (!Array.isArray(parSteps) || !parSteps.length) return null;
  let max = 0;
  for (const s of parSteps) {
    max = Math.max(max, (s.delay || 0) + _edStepMs(s));
  }
  return max;
}

// Single-vs-double click resolver for step lines (motion connectors + ball
// arrows). Single-click fires after a short delay so a following click within
// the window upgrades the gesture to a double-click.
//   Motion — single: open Motion Inspector. Double: delete step.
//   Ball   — single: status hint (no destructive action). Double: delete step.
// A click on a different step while one is pending cancels the pending action.
let _edStepClickPending = null;
const _ED_DBLCLICK_MS = 320;

function _edHandleStepClick(info) {
  const now = Date.now();
  // Match on full address — motion clicks include wpIdx so different segments
  // of the same waypoint step are treated as separate targets.
  const matches = _edStepClickPending &&
    _edStepClickPending.top === info.top &&
    _edStepClickPending.sub === info.sub &&
    _edStepClickPending.wp  === info.wp &&
    _edStepClickPending.kind === info.kind;

  if (matches && (now - _edStepClickPending.time < _ED_DBLCLICK_MS)) {
    clearTimeout(_edStepClickPending.timerId);
    _edStepClickPending = null;
    edCloseMotionInspector();
    _edPushHistory();
    // For motion segments, delete just the targeted segment (waypoint-aware).
    // For ball arrows, delete the whole step.
    let okDel;
    if (info.kind === 'motion') {
      okDel = _edDeletePhaseSegment(ed.play, ed.activePhase, info.top, info.sub, info.wp);
    } else {
      okDel = _edDeletePhaseStep(ed.play, ed.activePhase, info.top, info.sub);
    }
    if (okDel) {
      const status = document.getElementById('ed-tool-status');
      if (status) {
        status.textContent = 'Deleted ' + (info.kind === 'ball' ? 'ball event' : 'motion segment');
        status.style.color = 'rgba(140,220,160,0.95)';
      }
      renderEditorSVG();
    }
    return;
  }

  if (_edStepClickPending && !matches) {
    clearTimeout(_edStepClickPending.timerId);
    _edStepClickPending = null;
  }

  const timerId = setTimeout(() => {
    _edStepClickPending = null;
    if (info.kind === 'motion') {
      edOpenMotionInspector(info.top, info.sub, info.wp, info.clientX, info.clientY);
    } else if (info.kind === 'ball') {
      edOpenBallInspector(info.top, info.sub, info.clientX, info.clientY);
    }
  }, _ED_DBLCLICK_MS);

  _edStepClickPending = {
    top: info.top, sub: info.sub, wp: info.wp, kind: info.kind,
    clientX: info.clientX, clientY: info.clientY,
    time: now, timerId
  };
}

// Remove any open Motion Inspector. Safe to call when none is open.
function edCloseMotionInspector() {
  const ex = document.getElementById('ed-motion-inspector');
  if (ex && ex.parentNode) ex.parentNode.removeChild(ex);
  if (window._edMotionEsc) {
    document.removeEventListener('keydown', window._edMotionEsc, true);
    window._edMotionEsc = null;
  }
  ed._motionInspector = null;
}

// Open the inspector for a specific motion SEGMENT. (topIdx, subIdx, wpIdx)
// come from the segment's data attributes. wpIdx is null for single-segment
// steps, numeric for a specific waypoint within a waypoint step.
function edOpenMotionInspector(topIdx, subIdx, wpIdx, clientX, clientY) {
  edCloseMotionInspector();
  if (!ed.play || typeof ed.activePhase !== 'number' || ed.activePhase < 0) return;
  const info = _edLocateSegment(ed.play, ed.activePhase, topIdx, subIdx, wpIdx);
  if (!info || !info.step || !info.segment) return;
  const distance = Math.hypot(info.segmentEnd.x - info.segmentStart.x,
                              info.segmentEnd.y - info.segmentStart.y);
  if (distance < 0.1) return;

  const wrap = document.createElement('div');
  wrap.className = 'ed-motion-insp';
  wrap.id = 'ed-motion-inspector';

  const roleLabel = info.step.role === 'DY' ? 'YOU' : info.step.role;
  const segKind = info.isWaypoint
    ? `segment ${info.wpIdx + 1} of ${info.step.waypoints.length}`
    : 'single segment';

  wrap.innerHTML = `
    <div class="hdr">
      <div>
        <div class="title">Motion · ${roleLabel}</div>
        <div class="sub">phase ${ed.activePhase} · ${segKind} · ${distance.toFixed(1)}u</div>
      </div>
      <button class="close-btn" data-action="close" title="Close">×</button>
    </div>
    <div class="seg" data-seg="tier">
      <button data-tier="dribble" title="Jog — 130 ms/u (speed only; line color is determined by action)">Jog</button>
      <button data-tier="run"     title="Run — 110 ms/u (speed only; line color is determined by action)">Run</button>
      <button data-tier="sprint"  title="Sprint — 75 ms/u (speed only; line color is determined by action)">Sprint</button>
      <button data-tier="custom"  title="Custom ms/u">Custom</button>
    </div>
    <div class="row">
      <label title="Drag right for faster">Speed</label>
      <input type="range" id="ed-mi-speed-slider"
             min="0" max="${_ED_SPEED_MS_MAX - _ED_SPEED_MS_MIN}" step="${_ED_SPEED_SLIDER_STEP}"
             title="Left: slower · Right: faster">
      <div class="numwrap">
        <input type="text" id="ed-mi-speed-text" inputmode="numeric">
        <span class="unit">ms/u</span>
      </div>
    </div>
    <div class="row">
      <label>Delay</label>
      <input type="range" id="ed-mi-delay-slider"
             min="0" max="0" step="${_ED_DELAY_SLIDER_STEP}">
      <div class="numwrap">
        <input type="text" id="ed-mi-delay-text" inputmode="numeric">
        <span class="unit">ms</span>
      </div>
    </div>
    <div class="meta" id="ed-mi-meta">dur — ms · phase — ms</div>
    <div class="warn" id="ed-mi-warn"></div>
  `;
  document.body.appendChild(wrap);

  const pw = wrap.getBoundingClientRect().width || 290;
  const ph = wrap.getBoundingClientRect().height || 230;
  const vw = window.innerWidth || 1024, vh = window.innerHeight || 768;
  let x = (clientX || 100) + 14, y = (clientY || 100) - 10;
  if (x + pw > vw - 8) x = Math.max(8, (clientX || 100) - pw - 14);
  if (y + ph > vh - 8) y = Math.max(8, vh - ph - 8);
  if (y < 8) y = 8;
  wrap.style.left = x + 'px';
  wrap.style.top = y + 'px';

  const ctx = {
    topIdx, subIdx, wpIdx,
    distance,
    isSegment: true,
    // Resolve fresh each call (the ed.play tree can mutate).
    getInfo()   { return _edLocateSegment(ed.play, ed.activePhase, topIdx, subIdx, wpIdx); },
    getStep()   { const i = this.getInfo(); return i ? i.step : null; },
    getSegment(){ const i = this.getInfo(); return i ? i.segment : null; },
    // Used by the per-par warning check. The par sub-list is only relevant
    // when subIdx is a number.
    getParSteps() {
      const steps = _edPhaseSteps(ed.play, ed.activePhase);
      if (!Array.isArray(steps) || subIdx == null) return null;
      const top = steps[topIdx];
      return top && Array.isArray(top.par) ? top.par : null;
    }
  };
  ed._motionInspector = ctx;

  _edMotionInspectorSync(ctx);
  _edMotionInspectorWire(wrap, ctx);

  const onEsc = function (e) {
    if (e.key === 'Escape') { e.preventDefault(); edCloseMotionInspector(); }
  };
  document.addEventListener('keydown', onEsc, true);
  window._edMotionEsc = onEsc;
}

// Read the current step and push values into the inspector's controls.
// Called on open, after every write (so sliders + text boxes stay in sync),
// and after tier-button changes.
function _edMotionInspectorSync(ctx) {
  const info = ctx.getInfo && ctx.getInfo();
  if (!info) { edCloseMotionInspector(); return; }
  const segment = info.segment;
  const step = info.step;
  const dur = segment.dur || 0;
  const msPerU = ctx.distance > 0 ? Math.round((dur / ctx.distance) * 10) / 10 : 0;
  // Session J — per-segment delay for waypoint segments 2+. Segment 1 (single
  // segment OR waypoint[0]) reads step.delay; subsequent waypoint segments
  // read their own .delay. See _edMotionInspectorSetDelay for the write side.
  const delay = (info.isWaypoint && info.wpIdx > 0)
    ? (segment.delay || 0)
    : (step.delay || 0);

  const tier = _edInferTier(dur, ctx.distance);
  document.querySelectorAll('#ed-motion-inspector .seg button').forEach(b => {
    b.classList.toggle('active', b.dataset.tier === tier);
  });

  const speedSlider = document.getElementById('ed-mi-speed-slider');
  const speedText   = document.getElementById('ed-mi-speed-text');
  const delaySlider = document.getElementById('ed-mi-delay-slider');
  const delayText   = document.getElementById('ed-mi-delay-text');
  const meta        = document.getElementById('ed-mi-meta');

  // Clamp slider display to supported range. Slider is inverted — right end is
  // faster (lower ms/u). The text box still shows the raw ms/u for clarity.
  const clampedMs = Math.max(_ED_SPEED_MS_MIN, Math.min(_ED_SPEED_MS_MAX,
    Math.round(msPerU / _ED_SPEED_SLIDER_STEP) * _ED_SPEED_SLIDER_STEP));
  if (speedSlider) speedSlider.value = String(_edSpeedSliderFromMs(clampedMs));
  if (speedText)   speedText.value   = String(Math.round(msPerU));

  // Delay slider max = current phase total ms.
  const phaseSteps = _edPhaseSteps(ed.play, ed.activePhase) || [];
  const phaseMs = _edPhaseMs(phaseSteps);
  if (delaySlider) {
    delaySlider.max = String(Math.max(_ED_DELAY_SLIDER_STEP, phaseMs));
    delaySlider.value = String(Math.max(0, Math.min(parseInt(delaySlider.max, 10), Math.round(delay / _ED_DELAY_SLIDER_STEP) * _ED_DELAY_SLIDER_STEP)));
  }
  if (delayText) delayText.value = String(delay);

  if (meta) {
    meta.textContent = `dur ${dur} ms · phase ${phaseMs} ms · ${ctx.distance.toFixed(1)}u`;
  }

  // Warning — par-total clamp.
  _edMotionInspectorCheckWarn(ctx);
}

// Attach listeners. Centralised so open() reads cleanly.
function _edMotionInspectorWire(wrap, ctx) {
  wrap.querySelector('[data-action=close]').addEventListener('click', () => edCloseMotionInspector());

  wrap.querySelectorAll('.seg button[data-tier]').forEach(btn => {
    btn.addEventListener('click', () => _edMotionInspectorSetTier(ctx, btn.dataset.tier));
  });

  const speedSlider = wrap.querySelector('#ed-mi-speed-slider');
  const speedText   = wrap.querySelector('#ed-mi-speed-text');
  const delaySlider = wrap.querySelector('#ed-mi-delay-slider');
  const delayText   = wrap.querySelector('#ed-mi-delay-text');

  speedSlider.addEventListener('pointerdown', () => _edPushHistory());
  speedSlider.addEventListener('input', (e) => {
    let raw = parseInt(speedSlider.value, 10);
    if (e.shiftKey) raw = Math.round(raw / _ED_SPEED_SLIDER_SHIFT) * _ED_SPEED_SLIDER_SHIFT;
    _edMotionInspectorSetSpeed(ctx, _edSpeedMsFromSlider(raw), /*fromTier*/ false);
  });
  speedSlider.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
      const cur = parseInt(speedSlider.value, 10);
      // Right arrow → higher raw → faster. Left arrow → slower.
      const nxt = e.key === 'ArrowRight' ? cur + _ED_SPEED_SLIDER_SHIFT : cur - _ED_SPEED_SLIDER_SHIFT;
      const max = _ED_SPEED_MS_MAX - _ED_SPEED_MS_MIN;
      speedSlider.value = String(Math.max(0, Math.min(max, nxt)));
      _edMotionInspectorSetSpeed(ctx, _edSpeedMsFromSlider(parseInt(speedSlider.value, 10)), false);
      e.preventDefault();
    }
  });
  const commitSpeedText = () => {
    const raw = speedText.value.trim();
    if (!/^\d+$/.test(raw)) { _edMotionInspectorSync(ctx); return; }
    const v = parseInt(raw, 10);
    if (v < _ED_SPEED_MS_MIN || v > _ED_SPEED_MS_MAX) {
      _edMotionInspectorSync(ctx); return;
    }
    _edPushHistory();
    _edMotionInspectorSetSpeed(ctx, v, false);
  };
  speedText.addEventListener('blur', commitSpeedText);
  speedText.addEventListener('keydown', (e) => { if (e.key === 'Enter') { commitSpeedText(); speedText.blur(); } });

  delaySlider.addEventListener('pointerdown', () => _edPushHistory());
  delaySlider.addEventListener('input', (e) => {
    let v = parseInt(delaySlider.value, 10);
    if (e.shiftKey) v = Math.round(v / _ED_DELAY_SLIDER_SHIFT) * _ED_DELAY_SLIDER_SHIFT;
    _edMotionInspectorSetDelay(ctx, v);
  });
  delaySlider.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
      const cur = parseInt(delaySlider.value, 10);
      const nxt = e.key === 'ArrowRight' ? cur + _ED_DELAY_SLIDER_SHIFT : cur - _ED_DELAY_SLIDER_SHIFT;
      delaySlider.value = String(Math.max(0, Math.min(parseInt(delaySlider.max, 10), nxt)));
      _edMotionInspectorSetDelay(ctx, parseInt(delaySlider.value, 10));
      e.preventDefault();
    }
  });
  const commitDelayText = () => {
    const raw = delayText.value.trim();
    if (!/^\d+$/.test(raw)) { _edMotionInspectorSync(ctx); return; }
    const v = parseInt(raw, 10);
    const phaseSteps = _edPhaseSteps(ed.play, ed.activePhase) || [];
    const phaseMs = _edPhaseMs(phaseSteps);
    const maxAllowed = Math.max(_ED_DELAY_SLIDER_STEP, phaseMs);
    if (v < 0 || v > maxAllowed) { _edMotionInspectorSync(ctx); return; }
    _edPushHistory();
    _edMotionInspectorSetDelay(ctx, v);
  };
  delayText.addEventListener('blur', commitDelayText);
  delayText.addEventListener('keydown', (e) => { if (e.key === 'Enter') { commitDelayText(); delayText.blur(); } });
}

// Tier button pressed: if tier is a canonical speed, recompute dur as
// distance × tier rounded to 50 ms. If 'custom', no dur change — just flip
// the active state (user will drive the slider manually).
function _edMotionInspectorSetTier(ctx, tierName) {
  const segment = ctx.getSegment ? ctx.getSegment() : null;
  if (!segment) return;
  _edPushHistory();
  if (tierName !== 'custom' && _ED_TIER_MS_LOOKUP[tierName] != null) {
    const tier = _ED_TIER_MS_LOOKUP[tierName];
    const raw = ctx.distance * tier;
    segment.dur = Math.max(50, Math.round(raw / 50) * 50);
  }
  renderEditorSVG();
  // Phase auto-sizing — adding a slower action extends the phase block, a
  // faster action shrinks it. Session J rule: phase duration follows its
  // content by default; the manual slider only scales when dragged.
  renderPhaseTimeline();
  _edMotionInspectorSync(ctx);
}

// Generic speed write — targets only the segment's own dur (waypoint or
// single-segment step). Tier label in Sync reflects this segment's ratio.
function _edMotionInspectorSetSpeed(ctx, msPerU, fromTier) {
  const segment = ctx.getSegment ? ctx.getSegment() : null;
  if (!segment) return;
  const raw = ctx.distance * msPerU;
  segment.dur = Math.max(50, Math.round(raw));
  renderEditorSVG();
  renderPhaseTimeline();
  _edMotionInspectorSync(ctx);
}

function _edMotionInspectorSetDelay(ctx, delayMs) {
  const info = ctx.getInfo ? ctx.getInfo() : null;
  if (!info || !info.step) return;
  const step = info.step;
  const segment = info.segment;
  // Session J — target per-segment delay for waypoint segments 2+ (wpIdx > 0).
  // Segment 1 (single-segment step OR waypoint[0]) writes step.delay, which is
  // the pause before segment 1 begins. Subsequent waypoint segments write
  // waypoint.delay, which pauses at the previous waypoint before moving to
  // this one.
  const phaseSteps = _edPhaseSteps(ed.play, ed.activePhase) || [];
  const phaseMs = _edPhaseMs(phaseSteps);
  const clamped = Math.max(0, Math.min(Math.max(_ED_DELAY_SLIDER_STEP, phaseMs), Math.round(delayMs)));
  const target = (info.isWaypoint && info.wpIdx > 0) ? segment : step;
  if (clamped === 0) { delete target.delay; }
  else { target.delay = clamped; }
  renderEditorSVG();
  renderPhaseTimeline();
  _edMotionInspectorSync(ctx);
}

// If the step is inside a par and increasing delay would push par total past
// 15 s, show a warning (the delay has already been clamped by the slider max
// or text-input range check).
function _edMotionInspectorCheckWarn(ctx) {
  const warn = document.getElementById('ed-mi-warn');
  if (!warn) return;
  const step = ctx.getStep();
  const parSteps = ctx.getParSteps();
  if (!step || !parSteps) {
    warn.classList.remove('show');
    warn.textContent = '';
    return;
  }
  const parMs = _edStepParMs(parSteps);
  if (parMs && parMs > _ED_PAR_MAX_MS) {
    warn.textContent = `par total ${parMs} ms exceeds 15 s — tighten durations or delay.`;
    warn.classList.add('show');
  } else {
    warn.classList.remove('show');
    warn.textContent = '';
  }
}

// =====================================================================
// Ball Inspector — single-click on a ball arrow.
// Edits step.ball.dur (speed, ms/u) and step.delay (step-level delay).
// The ball's distance is from the `from` role's position AT EVENT TIME
// (post-motion cursor) to the ball's target — matching the rendered
// line. Shares slider math + helper functions with the Motion Inspector.
// =====================================================================

// Resolve the ball's rendered from→to distance for a given (topIdx, subIdx)
// in the active phase. Uses the same cursor walk that drives the ball-line
// rendering, so distance agrees with what's drawn.
function _edBallEventGeometry(play, phase, topIdx, subIdx) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return null;
  const startMap = _edPhaseStartPositions(play, phase);
  const endMap = _edPhaseEndPositions(play, phase);
  const posCursor = {};
  for (const r in startMap) posCursor[r] = { x: startMap[r].x, y: startMap[r].y };
  const applyMotion = (s) => {
    if (!s || !s.role) return;
    if ('toX' in s && 'toY' in s) posCursor[s.role] = { x: s.toX, y: s.toY };
    else if (s.waypoints && s.waypoints.length) {
      const last = s.waypoints[s.waypoints.length - 1];
      posCursor[s.role] = { x: last.x, y: last.y };
    }
  };
  let found = null;
  for (let ti = 0; ti < steps.length; ti++) {
    const step = steps[ti];
    if (step.par && Array.isArray(step.par)) {
      step.par.forEach(sub => applyMotion(sub));
      for (let si = 0; si < step.par.length; si++) {
        const sub = step.par[si];
        if (sub.ball || sub.ballFly || sub.ballTo) {
          if (ti === topIdx && si === subIdx) {
            found = { step: sub, fromRole: (sub.ball && sub.ball.from) || null };
            break;
          }
        }
      }
    } else {
      applyMotion(step);
      if (step.ball || step.ballFly || step.ballTo) {
        if (ti === topIdx && subIdx == null) {
          found = { step, fromRole: (step.ball && step.ball.from) || null };
        }
      }
    }
    if (found) break;
  }
  if (!found) return null;
  const b = found.step.ball || {};
  const fromPos = found.fromRole && posCursor[found.fromRole];
  if (!fromPos) return null;
  let toPos = null;
  if (b.kind === 'shot' || b.kind === 'clear') {
    if (b.toX != null && b.toY != null) toPos = { x: b.toX, y: b.toY };
  } else if (b.kind === 'intercept') {
    toPos = b.interceptedBy ? (endMap[b.interceptedBy] || startMap[b.interceptedBy]) : null;
  } else {
    toPos = b.to ? (endMap[b.to] || startMap[b.to]) : null;
  }
  if (!toPos) return null;
  const distance = Math.hypot(toPos.x - fromPos.x, toPos.y - fromPos.y);
  return { step: found.step, distance, fromRole: found.fromRole, toPos, fromPos, kind: b.kind };
}

function edOpenBallInspector(topIdx, subIdx, clientX, clientY) {
  edCloseMotionInspector();
  if (!ed.play || typeof ed.activePhase !== 'number' || ed.activePhase < 0) return;
  const geo = _edBallEventGeometry(ed.play, ed.activePhase, topIdx, subIdx);
  if (!geo || !geo.step.ball) return; // only the typed ball construct is editable
  if (geo.distance < 0.1) return;

  const wrap = document.createElement('div');
  wrap.className = 'ed-motion-insp';
  wrap.id = 'ed-motion-inspector';
  const b = geo.step.ball;
  const label = `${(geo.fromRole === 'DY' ? 'YOU' : geo.fromRole) || '?'} → ${b.to ? (b.to === 'DY' ? 'YOU' : b.to) : (b.kind === 'shot' ? 'goal' : (b.kind === 'clear' ? 'out' : '?'))}`;

  wrap.innerHTML = `
    <div class="hdr">
      <div>
        <div class="title">Ball · ${b.kind || 'pass'}</div>
        <div class="sub">phase ${ed.activePhase} · ${label} · ${geo.distance.toFixed(1)}u</div>
      </div>
      <button class="close-btn" data-action="close" title="Close">×</button>
    </div>
    <div class="row">
      <label title="Drag right for faster">Speed</label>
      <input type="range" id="ed-bi-speed-slider"
             min="0" max="${_ED_SPEED_MS_MAX - _ED_SPEED_MS_MIN}" step="${_ED_SPEED_SLIDER_STEP}"
             title="Left: slower · Right: faster">
      <div class="numwrap">
        <input type="text" id="ed-bi-speed-text" inputmode="numeric">
        <span class="unit">ms/u</span>
      </div>
    </div>
    <div class="row">
      <label>Delay</label>
      <input type="range" id="ed-bi-delay-slider" min="0" max="0" step="${_ED_DELAY_SLIDER_STEP}">
      <div class="numwrap">
        <input type="text" id="ed-bi-delay-text" inputmode="numeric">
        <span class="unit">ms</span>
      </div>
    </div>
    <div class="meta" id="ed-bi-meta">dur — ms · phase — ms</div>
    <div class="warn" id="ed-bi-warn"></div>
  `;
  document.body.appendChild(wrap);

  const pw = wrap.getBoundingClientRect().width || 290;
  const ph = wrap.getBoundingClientRect().height || 180;
  const vw = window.innerWidth || 1024, vh = window.innerHeight || 768;
  let x = (clientX || 100) + 14, y = (clientY || 100) - 10;
  if (x + pw > vw - 8) x = Math.max(8, (clientX || 100) - pw - 14);
  if (y + ph > vh - 8) y = Math.max(8, vh - ph - 8);
  if (y < 8) y = 8;
  wrap.style.left = x + 'px';
  wrap.style.top = y + 'px';

  const ctx = {
    topIdx, subIdx,
    distance: geo.distance,
    isBall: true,
    getStep() {
      const g = _edBallEventGeometry(ed.play, ed.activePhase, topIdx, subIdx);
      return g ? g.step : null;
    }
  };
  ed._motionInspector = ctx;

  _edBallInspectorSync(ctx);
  _edBallInspectorWire(wrap, ctx);

  const onEsc = (e) => { if (e.key === 'Escape') { e.preventDefault(); edCloseMotionInspector(); } };
  document.addEventListener('keydown', onEsc, true);
  window._edMotionEsc = onEsc;
}

function _edBallInspectorSync(ctx) {
  const step = ctx.getStep();
  if (!step || !step.ball) { edCloseMotionInspector(); return; }
  const dur = step.ball.dur || 0;
  const msPerU = ctx.distance > 0 ? Math.round((dur / ctx.distance) * 10) / 10 : 0;
  const delay = step.delay || 0;

  const speedSlider = document.getElementById('ed-bi-speed-slider');
  const speedText   = document.getElementById('ed-bi-speed-text');
  const delaySlider = document.getElementById('ed-bi-delay-slider');
  const delayText   = document.getElementById('ed-bi-delay-text');
  const meta        = document.getElementById('ed-bi-meta');

  const clampedMs = Math.max(_ED_SPEED_MS_MIN, Math.min(_ED_SPEED_MS_MAX,
    Math.round(msPerU / _ED_SPEED_SLIDER_STEP) * _ED_SPEED_SLIDER_STEP));
  if (speedSlider) speedSlider.value = String(_edSpeedSliderFromMs(clampedMs));
  if (speedText)   speedText.value   = String(Math.round(msPerU));

  const phaseSteps = _edPhaseSteps(ed.play, ed.activePhase) || [];
  const phaseMs = _edPhaseMs(phaseSteps);
  if (delaySlider) {
    delaySlider.max = String(Math.max(_ED_DELAY_SLIDER_STEP, phaseMs));
    delaySlider.value = String(Math.max(0, Math.min(parseInt(delaySlider.max, 10),
      Math.round(delay / _ED_DELAY_SLIDER_STEP) * _ED_DELAY_SLIDER_STEP)));
  }
  if (delayText) delayText.value = String(delay);

  if (meta) meta.textContent = `dur ${dur} ms · phase ${phaseMs} ms · ${ctx.distance.toFixed(1)}u`;
}

function _edBallInspectorWire(wrap, ctx) {
  wrap.querySelector('[data-action=close]').addEventListener('click', () => edCloseMotionInspector());

  const speedSlider = wrap.querySelector('#ed-bi-speed-slider');
  const speedText   = wrap.querySelector('#ed-bi-speed-text');
  const delaySlider = wrap.querySelector('#ed-bi-delay-slider');
  const delayText   = wrap.querySelector('#ed-bi-delay-text');

  speedSlider.addEventListener('pointerdown', () => _edPushHistory());
  speedSlider.addEventListener('input', (e) => {
    let raw = parseInt(speedSlider.value, 10);
    if (e.shiftKey) raw = Math.round(raw / _ED_SPEED_SLIDER_SHIFT) * _ED_SPEED_SLIDER_SHIFT;
    _edBallInspectorSetSpeed(ctx, _edSpeedMsFromSlider(raw));
  });
  const commitSpeedText = () => {
    const raw = speedText.value.trim();
    if (!/^\d+$/.test(raw)) { _edBallInspectorSync(ctx); return; }
    const v = parseInt(raw, 10);
    if (v < _ED_SPEED_MS_MIN || v > _ED_SPEED_MS_MAX) { _edBallInspectorSync(ctx); return; }
    _edPushHistory();
    _edBallInspectorSetSpeed(ctx, v);
  };
  speedText.addEventListener('blur', commitSpeedText);
  speedText.addEventListener('keydown', (e) => { if (e.key === 'Enter') { commitSpeedText(); speedText.blur(); } });

  delaySlider.addEventListener('pointerdown', () => _edPushHistory());
  delaySlider.addEventListener('input', (e) => {
    let v = parseInt(delaySlider.value, 10);
    if (e.shiftKey) v = Math.round(v / _ED_DELAY_SLIDER_SHIFT) * _ED_DELAY_SLIDER_SHIFT;
    _edBallInspectorSetDelay(ctx, v);
  });
  const commitDelayText = () => {
    const raw = delayText.value.trim();
    if (!/^\d+$/.test(raw)) { _edBallInspectorSync(ctx); return; }
    const v = parseInt(raw, 10);
    const phaseMs = _edPhaseMs(_edPhaseSteps(ed.play, ed.activePhase) || []);
    const maxAllowed = Math.max(_ED_DELAY_SLIDER_STEP, phaseMs);
    if (v < 0 || v > maxAllowed) { _edBallInspectorSync(ctx); return; }
    _edPushHistory();
    _edBallInspectorSetDelay(ctx, v);
  };
  delayText.addEventListener('blur', commitDelayText);
  delayText.addEventListener('keydown', (e) => { if (e.key === 'Enter') { commitDelayText(); delayText.blur(); } });
}

function _edBallInspectorSetSpeed(ctx, msPerU) {
  const step = ctx.getStep();
  if (!step || !step.ball) return;
  step.ball.dur = Math.max(50, Math.round(ctx.distance * msPerU));
  renderEditorSVG();
  renderPhaseTimeline();
  _edBallInspectorSync(ctx);
}

function _edBallInspectorSetDelay(ctx, delayMs) {
  const step = ctx.getStep();
  if (!step || !step.ball) return;
  const phaseMs = _edPhaseMs(_edPhaseSteps(ed.play, ed.activePhase) || []);
  const clamped = Math.max(0, Math.min(Math.max(_ED_DELAY_SLIDER_STEP, phaseMs), Math.round(delayMs)));
  if (clamped === 0) { delete step.delay; } else { step.delay = clamped; }
  renderEditorSVG();
  renderPhaseTimeline();
  _edBallInspectorSync(ctx);
}

// =====================================================================
// Session I — Undo / Redo for play-designer edits.
// Each coarse user gesture (drag-down, tier click, text commit, delete)
// pushes the pre-mutation `ed.play` onto ed.history. Undo moves current
// to ed.historyFuture and applies the last history entry. Redo reverses.
// Loading a play (or a play draft) resets history.
// =====================================================================
const ED_HISTORY_CAP = 50;

function _edPushHistory() {
  if (!ed.playMode || !ed.play) return;
  if (!Array.isArray(ed.history)) ed.history = [];
  if (!Array.isArray(ed.historyFuture)) ed.historyFuture = [];
  const snap = JSON.stringify(ed.play);
  if (ed.history.length && ed.history[ed.history.length - 1] === snap) return;
  ed.history.push(snap);
  while (ed.history.length > ED_HISTORY_CAP) ed.history.shift();
  ed.historyFuture = [];
  _edRenderUndoRedo();
}

function _edUndo() {
  if (!ed.playMode || !ed.play) return;
  if (!ed.history || !ed.history.length) return;
  if (!ed.historyFuture) ed.historyFuture = [];
  ed.historyFuture.push(JSON.stringify(ed.play));
  const prev = ed.history.pop();
  _edApplyPlaySnapshot(prev);
}

function _edRedo() {
  if (!ed.playMode || !ed.play) return;
  if (!ed.historyFuture || !ed.historyFuture.length) return;
  if (!ed.history) ed.history = [];
  ed.history.push(JSON.stringify(ed.play));
  const next = ed.historyFuture.pop();
  _edApplyPlaySnapshot(next);
}

function _edApplyPlaySnapshot(json) {
  ed.play = JSON.parse(json);
  delete ed.play.phases;
  if (typeof _plCompilePhases === 'function') _plCompilePhases(ed.play);
  edCloseMotionInspector();
  renderPhaseTimeline();
  renderEditorSVG();
  _edRenderUndoRedo();
}

function _edResetHistory() {
  ed.history = [];
  ed.historyFuture = [];
  _edRenderUndoRedo();
}

function _edRenderUndoRedo() {
  const u = document.getElementById('ed-undo-btn');
  const r = document.getElementById('ed-redo-btn');
  if (u) u.disabled = !(ed.history && ed.history.length);
  if (r) r.disabled = !(ed.historyFuture && ed.historyFuture.length);
}

function edLoadPlay(playId) {
  const raw = CORRECT_PLAYS.find(p => p.id === playId);
  if (!raw) return;
  ed.play = JSON.parse(JSON.stringify(raw));
  // Deep-clone detached phases[] from prePlay/payoff (JSON.stringify duplicates
  // both paths, so they're no longer reference-equal). Rebuild phases from the
  // clone's prePlay+payoff so edits via phases[] also land in the legacy arrays
  // until Slice 5 removes them.
  delete ed.play.phases;
  _plCompilePhases(ed.play);
  ed.designMode = 'play';
  ed.playMode = true;
  ed.activePhase = 'setup';
  // Clear legacy scenario state so stale markers don't bleed through.
  ed.placed = {};
  ed.choices = ED_CHOICES_DEF();
  ed.lines = [];
  ed.category = '';
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('ed-id', raw.id);
  set('ed-question', raw.description || '');
  set('ed-exp-1', ''); set('ed-exp-2', ''); set('ed-exp-3', '');
  set('ed-exp-4', ''); set('ed-exp-5', '');
  _edTogglePlayModeUI();
  renderPhaseTimeline();
  renderEditorSVG();
  _edResetHistory();
}

function edExitPlayMode() {
  ed.playMode = false;
  ed.play = null;
  ed.activePhase = 'setup';
  // designMode stays as-is — user toggled it, not the load action
  edCloseMotionInspector();
  _edTogglePlayModeUI();
  renderPhaseTimeline();
}

// Show/hide sidebar sections based on ed.designMode ('scenario' | 'play').
// Called whenever designMode changes or a play/scenario is loaded.
function _edTogglePlayModeUI() {
  const isPlay = ed.designMode === 'play';

  // Sections visible in Scenarios mode only
  const scenarioOnly = ['ed-category-section', 'ed-concept-section',
                        'ed-choices-section', 'ed-explanations-section',
                        'ed-drafts-section'];
  scenarioOnly.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = isPlay ? 'none' : '';
  });

  // Play-only tool row (Preview button)
  const playRow = document.getElementById('ed-play-tools-row');
  if (playRow) playRow.style.display = isPlay ? '' : 'none';

  // Dribble and Run are always visible in both modes.

  // Play-only drafts section (mirrors the scenario drafts section).
  const playDrafts = document.getElementById('ed-play-drafts-section');
  if (playDrafts) playDrafts.style.display = isPlay ? '' : 'none';
  if (isPlay) renderPlayDraftsList();

  // Relabel ID field and Coach Question / Description
  const idLabel = document.getElementById('ed-id-label');
  if (idLabel) idLabel.textContent = isPlay ? 'Play ID' : 'Scenario ID';
  const idField = document.getElementById('ed-id');
  if (idField) idField.placeholder = isPlay ? 'e.g. L1-A1 or L1-P3' : 'e.g. GO-09 or SP-03';
  const qLabel = document.getElementById('ed-question-label');
  if (qLabel) qLabel.textContent = isPlay ? 'Description' : 'Coach Question';
  const qField = document.getElementById('ed-question');
  if (qField) qField.placeholder = isPlay
    ? 'Edit the play description — shown to kids in the Play Library'
    : 'e.g. Your teammate has the ball. Where should you go?';

  // Toggle button highlight
  const scenBtn = document.getElementById('ed-mode-scenario-btn');
  const playBtn = document.getElementById('ed-mode-play-btn');
  if (scenBtn) scenBtn.classList.toggle('active', !isPlay);
  if (playBtn) playBtn.classList.toggle('active', isPlay);

  // Refresh load dropdown so it only shows relevant entries
  refreshLoadDropdown();
  // Timeline always visible in Play Designer mode, hidden in Scenario mode
  renderPhaseTimeline();
}

// Session G — accepts either a numeric phase index (-1 = setup, 0..N-1 = motion)
// or a legacy string ('setup' | 'prePlay' | 'payoff'). Stored as whatever was
// passed; downstream helpers resolve both forms via _edPhaseSteps / _edPhaseIdx.
function edSetActivePhase(phase) {
  if (!ed.playMode) return;
  if (typeof phase !== 'number' && phase !== 'setup' && phase !== 'prePlay' && phase !== 'payoff') return;
  ed.activePhase = phase;
  // Changing the active phase invalidates the inspector's step reference.
  edCloseMotionInspector();
  renderPhaseTimeline();
  renderEditorSVG();
}

// Session G — N-phase timeline. Setup is a fixed ~5% sliver on the left; every
// motion phase (0..N-1) gets a proportional block sized to its ms duration. A
// drag handle sits on the trailing edge of each motion phase; dragging
// proportionally rescales every step.dur in that phase (_edScalePhase clamps to
// 50ms per step). Click a block to make it active.
function renderPhaseTimeline() {
  let tl = document.getElementById('ed-phase-timeline');
  const wrap = document.querySelector('.ed-field-wrap');
  if (!wrap) return;

  if (ed.designMode !== 'play') {
    if (tl) tl.style.display = 'none';
    return;
  }

  if (!tl) {
    tl = document.createElement('div');
    tl.id = 'ed-phase-timeline';
    tl.className = 'ed-phase-timeline';
    wrap.insertBefore(tl, wrap.firstChild);
  }
  tl.style.display = '';

  const noPlay = !ed.playMode || !ed.play;
  const disAttr = noPlay ? ' disabled' : '';
  const title = noPlay ? 'Load a play to begin editing' : `${ed.play.id} — ${ed.play.name}`;

  // Compute per-phase ms and proportional widths.
  const SETUP_PCT = 9;
  const DYN_PCT   = 100 - SETUP_PCT;
  const phaseCount = noPlay ? 2 : _edPhaseCount(ed.play);
  const phaseMs = [];
  let totalMs = 0;
  if (!noPlay) {
    for (let i = 0; i < phaseCount; i++) {
      const ms = _edPhaseMs(_edPhaseSteps(ed.play, i) || []);
      phaseMs.push(ms);
      totalMs += ms;
    }
  }
  // Session I — trailing "End Play" block. Dead time after all phases; no
  // motion happens here. Sits in the same proportional budget as the motion
  // phases so it visually shrinks/grows alongside them, and has its own
  // resize handle. Excluded from the total-play-time label per Amy's ask.
  //
  // A virtual floor keeps End Play visible even at 0 ms (otherwise phases
  // claim the entire 95% budget and the End Play segment overflows the
  // `overflow: hidden` bar-wrap). The floor is used ONLY for segment sizing;
  // the real endPause value is what gets stored/exported.
  const endPauseMs = noPlay ? 0 : Math.max(0, ed.play.endPause || 0);
  const ENDPLAY_MIN_VIS_MS = 800;
  const endForSizing = Math.max(endPauseMs, ENDPLAY_MIN_VIS_MS);
  const dynamicMs = (totalMs + endForSizing) || 1;
  // Active phase resolution — supports legacy strings and numbers.
  const activeIdx = noPlay ? -99 : _edPhaseIdx(ed.play, ed.activePhase);
  const setupActive = (!noPlay && activeIdx === -1) ? ' active' : '';

  // Build control buttons: one per motion phase + All. Setup button removed —
  // clicking the Setup segment in the timeline bar selects it.
  const phaseLabel = (i) => `Phase ${i + 1}`;
  let ctrlsHtml = '';
  for (let i = 0; i < phaseCount; i++) {
    ctrlsHtml += `<button class="ed-tl-btn ed-tl-btn-phase" data-preview="${i}"${disAttr}>▶ ${phaseLabel(i)}</button>`;
  }
  ctrlsHtml += `<button class="ed-tl-btn ed-tl-btn-all" data-preview="all"${disAttr}>▶ All</button>`;

  // Build timeline segments: setup sliver + N motion blocks + End Play block.
  let segsHtml = `<div class="ed-tl-seg ed-tl-seg-setup${setupActive}" style="flex:0 0 ${SETUP_PCT}%" data-phase-idx="-1"><span class="ed-tl-seg-label">Setup</span></div>`;
  for (let i = 0; i < phaseCount; i++) {
    const pct = noPlay
      ? (DYN_PCT * 0.45)
      : Math.max(5, (phaseMs[i] / dynamicMs) * DYN_PCT);
    const isActive = (!noPlay && activeIdx === i) ? ' active' : '';
    const durLabel = noPlay ? '' : `<span class="ed-tl-seg-dur">${phaseMs[i]} ms</span>`;
    segsHtml +=
      `<div class="ed-tl-seg ed-tl-seg-phase${isActive}" data-phase-idx="${i}" style="flex:0 0 ${pct.toFixed(2)}%">` +
        `<span class="ed-tl-seg-label">${phaseLabel(i)}</span>${durLabel}` +
      `</div>`;
    // Trailing-edge drag handle — resizes phase i.
    segsHtml +=
      `<div class="ed-tl-handle" data-handle-phase="${i}" title="Drag to rescale ${phaseLabel(i)} duration"` +
      (noPlay ? ' style="pointer-events:none;opacity:0.3"' : '') + `></div>`;
  }
  // End Play segment (dead time) + its own trailing handle. Uses `endForSizing`
  // so it gets a visible slot even at 0 ms; the displayed duration is the
  // real value.
  if (!noPlay) {
    const endPct = (endForSizing / dynamicMs) * DYN_PCT;
    segsHtml +=
      `<div class="ed-tl-seg ed-tl-seg-endplay" style="flex:0 0 ${endPct.toFixed(2)}%" title="Dead time at the end of the play — no motion">` +
        `<span class="ed-tl-seg-label">End${endPauseMs > 0 ? '<br>' + endPauseMs + ' ms' : '<br>Play'}</span>` +
      `</div>`;
    segsHtml +=
      `<div class="ed-tl-handle ed-tl-handle-endplay" data-handle-endpause="1" title="Drag to rescale End Play (dead time after the play)"></div>`;
  }

  // Total play time — sum of phase durations, excluding End Play.
  const totalLabelHtml = noPlay
    ? `<div class="ed-tl-total">—</div>`
    : `<div class="ed-tl-total" title="Total time of all phases (excludes End Play)">Total: <strong>${totalMs}</strong> ms</div>`;

  // Session I — undo/redo pair, left of the Setup segment. Always rendered in
  // play-designer mode so Amy sees the affordance even before loading a play.
  // Disabled state is recomputed by _edRenderUndoRedo().
  const undoRedoHtml = `
    <div class="ed-tl-undo-redo">
      <button id="ed-undo-btn" class="ed-tl-ur-btn" title="Undo last change" disabled>↺</button>
      <button id="ed-redo-btn" class="ed-tl-ur-btn" title="Redo" disabled>↻</button>
    </div>`;

  tl.innerHTML = `
    <div class="ed-tl-header">
      <div class="ed-tl-title">${title}</div>
      <div class="ed-tl-controls">${ctrlsHtml}</div>
      <div></div>
    </div>
    <div class="ed-tl-bar-outer">
      ${undoRedoHtml}
      <div class="ed-tl-bar-wrap">
        <div class="ed-tl-bar" id="ed-tl-bar">
          ${segsHtml}
          <div class="ed-tl-playhead" id="ed-tl-playhead"></div>
        </div>
      </div>
      ${totalLabelHtml}
    </div>`;

  // Click a segment to make it active.
  tl.querySelectorAll('.ed-tl-seg[data-phase-idx]').forEach(seg => {
    seg.addEventListener('click', () => {
      if (noPlay) return;
      edSetActivePhase(parseInt(seg.dataset.phaseIdx, 10));
    });
  });

  // Preview buttons.
  tl.querySelectorAll('.ed-tl-btn[data-preview]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = btn.dataset.preview;
      edPreviewPhase(p === 'all' ? 'all' : parseInt(p, 10));
    });
  });

  // Edge-drag resize per phase.
  if (!noPlay) {
    tl.querySelectorAll('.ed-tl-handle[data-handle-phase]').forEach(h => {
      _edWireTimelineDrag(h, parseInt(h.dataset.handlePhase, 10));
    });
    const endH = tl.querySelector('.ed-tl-handle-endplay[data-handle-endpause]');
    if (endH) _edWireEndPauseDrag(endH);
  }
  // Undo/redo buttons render in both play-loaded and empty states — wire
  // regardless of noPlay. Disabled until history has entries.
  const undoB = tl.querySelector('#ed-undo-btn');
  if (undoB) undoB.addEventListener('click', _edUndo);
  const redoB = tl.querySelector('#ed-redo-btn');
  if (redoB) redoB.addEventListener('click', _edRedo);
  _edRenderUndoRedo();
}

// Animate the playhead from startPct% to endPct% over durationMs.
function _edStartPlayhead(startPct, endPct, durationMs) {
  const ph = document.getElementById('ed-tl-playhead');
  if (!ph) return;
  ph.classList.add('active');
  ph.style.transition = 'none';
  ph.style.left = startPct + '%';
  // Force reflow so transition starts fresh
  void ph.offsetLeft;
  ph.style.transition = `left ${Math.round(durationMs)}ms linear`;
  ph.style.left = endPct + '%';
  // Remove active after animation completes (pause 200ms so it rests at end briefly)
  clearTimeout(ph._playheadTimer);
  ph._playheadTimer = setTimeout(() => {
    ph.style.transition = 'none';
    ph.classList.remove('active');
  }, durationMs + 400);
}

// Session H (Slice 4) — in-place preview on the designer SVG. Animates the
// selected phase (or all phases) directly on #ed-svg so authored arrows stay
// visible during playback. Reuses the Play Library engine (_plRunFull,
// _plMovePlayer, _plRunBallStep) by giving designer player/ball elements the
// same pl-* IDs the engine expects. The Play Library overlay is NOT opened.
function edPreviewPhase(which) {
  if (!ed.play) return;
  const rawPlay = ed.play;
  const phaseCount = _edPhaseCount(rawPlay);
  const phaseMs = [];
  let totalMs = 0;
  for (let i = 0; i < phaseCount; i++) {
    const ms = _edPhaseMs(_edPhaseSteps(rawPlay, i) || []);
    phaseMs.push(ms); totalMs += ms;
  }
  const SETUP_PCT = 9, DYN_PCT = 91;

  // Resolve target → phase index, or 'all'.
  let target;
  if (which === 'all') target = 'all';
  else if (which === 'setup') target = -1;
  else if (which === 'prePlay') target = 0;
  else if (which === 'payoff')  target = Math.max(0, phaseCount - 1);
  else if (typeof which === 'number') target = which;
  else target = 'all';

  // Playhead bounds per phase.
  const phaseStartPct = [SETUP_PCT];
  for (let i = 0; i < phaseCount; i++) {
    const pct = totalMs ? (phaseMs[i] / totalMs) * DYN_PCT : (DYN_PCT / phaseCount);
    phaseStartPct.push(phaseStartPct[phaseStartPct.length - 1] + pct);
  }

  // Make sure no stale Play Library DOM is around and no prior animation is in flight.
  closePlayLibrary();
  _plClear();

  // Mirror the play for A-series (designer shows x-flipped coords).
  const mirroredPlay = _plTransformPlay(rawPlay);

  // Build the phase-filtered play for the engine to iterate.
  let synPlay, headStart, headEnd, animMs, startPhaseIdx;
  if (target === 'all') {
    synPlay   = Object.assign({}, mirroredPlay);
    startPhaseIdx = 0;
    headStart = 0; headEnd = 100; animMs = totalMs || 800;
  } else if (target === -1) {
    // Static setup — no motion. Just ensure the designer is rendered at setup
    // positions and sweep the playhead across the setup sliver.
    synPlay = Object.assign({}, mirroredPlay, { phases: [[]], prePlay: [], payoff: [] });
    startPhaseIdx = -1;
    headStart = 0; headEnd = SETUP_PCT; animMs = 800;
  } else {
    synPlay = Object.assign({}, mirroredPlay, {
      phases: [_edPhaseSteps(mirroredPlay, target) || []],
      prePlay: [], payoff: [],
    });
    startPhaseIdx = target;
    headStart = phaseStartPct[target];
    headEnd   = phaseStartPct[target + 1];
    animMs    = phaseMs[target] || 800;
  }

  // Render the designer at this phase's START positions (player circles carry
  // pl-* IDs so _plRunFull animates them). Save activePhase and temporarily
  // flip to target so renderPlayModeSVG puts each role at the right start.
  // Session J — when previewing "all", suppress the authoring overlay so the
  // animation matches the Play Library render (no dotted lines, no end
  // circles, no arrows). Per-phase previews keep the overlay visible.
  const savedPhase = ed.activePhase;
  if (startPhaseIdx >= 0) ed.activePhase = startPhaseIdx;
  else if (startPhaseIdx === -1) ed.activePhase = -1;
  const hideArrows = (target === 'all');
  renderPlayModeSVG({ hideArrows });
  ed.activePhase = savedPhase;

  // Set engine state so ball glue and cardinal lookups work from frame 1.
  _plActionTeam = rawPlay.actionTeam || 'A';
  _plBallHolder = _edPhaseBallHolder(mirroredPlay, startPhaseIdx >= 0 ? startPhaseIdx : 0);
  _plDirs = {};
  _plJustIntercepted = null;

  _edStartPlayhead(headStart, headEnd, animMs);

  // Animate in-place. _plRunFull reads phases[] (prefer) and mutates the
  // pl-* DOM directly — which now lives inside #ed-svg.
  _plRunFull(synPlay, 1);

  // After the animation completes, re-render the designer against the user's
  // active phase so the editing view comes back clean. Tracked in _plTimeouts
  // so _plClear cancels it if the user kicks off a new preview mid-run.
  const restoreMs = Math.max(400, (animMs || 0) + 300);
  const restoreId = setTimeout(() => { renderPlayModeSVG(); }, restoreMs);
  _plTimeouts.push(restoreId);
}

// Session H — wire drag-to-resize on one phase's trailing-edge handle.
// pointermove/pointerup are attached to DOCUMENT (not the handle) so the drag
// survives the timeline DOM rebuild that happens on every rescale. If we
// attached to the handle, renderPhaseTimeline() destroys it mid-drag and
// pointer capture releases. Dragging right extends the phase; left shrinks
// it. Total timeline expands/contracts with the drag (other phases are not
// squeezed). Rescale is proportional across every step in the phase;
// _edScalePhase floors each step at 50ms.
// Copy dur / delay / waypoint-dur / ball.dur / ball.delay / pause values from
// a deep-cloned snapshot into the live step tree, applying a scale factor.
// Assumes snapshot and live have the same structure (they do — snapshot was
// JSON-cloned from the same steps and the live array's shape isn't mutated
// during drag). Prevents the compounding that made the handle "fly off".
function _edApplyDurSnapshot(live, snap, factor) {
  if (!Array.isArray(live) || !Array.isArray(snap)) return;
  const len = Math.min(live.length, snap.length);
  const r50 = v => Math.max(50, Math.round(v * factor / 50) * 50);
  const r50d = v => Math.max(0, Math.round(v * factor / 50) * 50);
  for (let i = 0; i < len; i++) {
    const L = live[i], S = snap[i];
    if (!L || !S) continue;
    if ('dur' in S && 'dur' in L && typeof S.dur === 'number') L.dur = r50(S.dur);
    if ('delay' in S && typeof S.delay === 'number') L.delay = r50d(S.delay);
    if (S.par && L.par) _edApplyDurSnapshot(L.par, S.par, factor);
    if (S.waypoints && L.waypoints) {
      const wn = Math.min(L.waypoints.length, S.waypoints.length);
      for (let j = 0; j < wn; j++) {
        if (typeof S.waypoints[j].dur === 'number') L.waypoints[j].dur = r50(S.waypoints[j].dur);
      }
    }
    if (S.ball && L.ball) {
      if (typeof S.ball.dur === 'number')   L.ball.dur   = r50(S.ball.dur);
      if (typeof S.ball.delay === 'number') L.ball.delay = r50d(S.ball.delay);
    }
    if (typeof S.pause === 'number' && typeof L.pause === 'number') {
      L.pause = r50(S.pause);
    }
  }
}

function _edWireTimelineDrag(handle, phaseIdx) {
  let startX = 0;
  let startPhaseMs = 0;
  let startTotalMs = 0;
  let barWidth = 0;
  let activePointer = null;
  let snapshot = null; // deep clone of the phase's steps captured on pointerdown
  // Sensitivity controls how much the phase scales across a full-bar drag.
  // At 3.0, a full-bar drag to the right scales the phase by 4x; a full-bar
  // drag left shrinks by 0.33x (clamped below to 0.2x). A 10% drag gives
  // factor ≈ 1.3 — responsive without being twitchy.
  const SENSITIVITY = 3.0;

  function onMove(e) {
    if (e.pointerId !== activePointer || !ed.play || !snapshot) return;
    if (startPhaseMs < 50 || startTotalMs < 100) return;
    const dynamicW = barWidth * 0.95;
    const deltaX   = e.clientX - startX;
    const deltaPct = deltaX / dynamicW;
    // Linear growth tied to original phase duration, not total. Dragging the
    // handle across the full bar scales the phase by (1 + SENSITIVITY), or
    // shrinks to (1 - SENSITIVITY). Clamped at 0.2x to 5x to avoid runaway.
    const factor = Math.max(0.2, Math.min(5.0, 1 + deltaPct * SENSITIVITY));
    const newPhaseMs = Math.max(200, startPhaseMs * factor);
    const actualFactor = newPhaseMs / startPhaseMs;
    const liveSteps = _edPhaseSteps(ed.play, phaseIdx);
    _edApplyDurSnapshot(liveSteps, snapshot, actualFactor);
    renderPhaseTimeline();
    renderEditorSVG();
  }
  function onEnd(e) {
    if (e.pointerId !== activePointer) return;
    activePointer = null;
    snapshot = null;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onEnd);
    document.removeEventListener('pointercancel', onEnd);
  }

  handle.addEventListener('pointerdown', e => {
    if (!ed.play) return;
    const steps = _edPhaseSteps(ed.play, phaseIdx);
    if (!steps) return;
    _edPushHistory();
    activePointer = e.pointerId;
    startX = e.clientX;
    startPhaseMs = _edPhaseMs(steps);
    startTotalMs = 0;
    const n = _edPhaseCount(ed.play);
    for (let i = 0; i < n; i++) startTotalMs += _edPhaseMs(_edPhaseSteps(ed.play, i) || []);
    barWidth = document.getElementById('ed-tl-bar')?.getBoundingClientRect().width || 400;
    // Deep-clone the phase's steps so each pointermove scales from the ORIGINAL
    // durs — not from the already-mutated ones. Without this, every frame
    // compounds on the previous and the phase rapidly balloons off-screen.
    snapshot = JSON.parse(JSON.stringify(steps));
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onEnd);
    document.addEventListener('pointercancel', onEnd);
    e.preventDefault();
    e.stopPropagation();
  });
}

// Session I — End Play handle. Drags resize ed.play.endPause, the trailing
// dead-time block on the timeline. Uses the SAME factor model as per-phase
// handles (_edWireTimelineDrag). When endPause = 0 we substitute a 1000ms
// reference so the factor still has something to scale — otherwise factor ×
// 0 would always be 0 and the handle would never engage from zero.
function _edWireEndPauseDrag(handle) {
  let startX = 0;
  let startMs = 0;
  let barWidth = 0;
  let activePointer = null;
  const SENSITIVITY = 3.0;

  function onMove(e) {
    if (e.pointerId !== activePointer || !ed.play) return;
    const dynamicW = barWidth * 0.95;
    const deltaX   = e.clientX - startX;
    const deltaPct = deltaX / dynamicW;
    const factor   = Math.max(0.0, Math.min(5.0, 1 + deltaPct * SENSITIVITY));
    // Reference ms for the factor. From 0: use a 1000ms bootstrap so dragging
    // right actually produces motion; subtract that same 1000ms afterward so
    // the left extreme returns to 0. From >0: scale directly from startMs.
    let newMs;
    if (startMs <= 0) {
      newMs = Math.max(0, 1000 * factor - 1000);
    } else {
      newMs = Math.max(0, startMs * factor);
    }
    newMs = Math.round(newMs / 50) * 50;
    ed.play.endPause = newMs;
    renderPhaseTimeline();
    renderEditorSVG();
  }
  function onEnd(e) {
    if (e.pointerId !== activePointer) return;
    activePointer = null;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onEnd);
    document.removeEventListener('pointercancel', onEnd);
  }

  handle.addEventListener('pointerdown', e => {
    if (!ed.play) return;
    _edPushHistory();
    activePointer = e.pointerId;
    startX = e.clientX;
    startMs = Math.max(0, ed.play.endPause || 0);
    barWidth = document.getElementById('ed-tl-bar')?.getBoundingClientRect().width || 400;
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onEnd);
    document.addEventListener('pointercancel', onEnd);
    e.preventDefault();
    e.stopPropagation();
  });
}

// Scale all step dur values in a phase by a factor. Mutates ed.play in place.
function _edScalePhase(play, phase, factor) {
  if (!factor || factor <= 0) return;
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return;
  function scaleStep(s) {
    if (!s) return;
    if (s.dur) s.dur = Math.max(50, Math.round(s.dur * factor / 50) * 50);
    if (s.delay) s.delay = Math.max(0, Math.round(s.delay * factor / 50) * 50);
    if (s.par) s.par.forEach(scaleStep);
    if (s.waypoints) s.waypoints.forEach(wp => {
      if (wp.dur) wp.dur = Math.max(50, Math.round(wp.dur * factor / 50) * 50);
    });
    if (s.ball) {
      if (s.ball.dur)   s.ball.dur   = Math.max(50, Math.round(s.ball.dur   * factor / 50) * 50);
