            const ex = finalX + rd.ox;
            const ey = finalY + rd.oy;
            _plBallHolder = null; // detach from carrier so ball flies freely
            // Compute how long after ball arrival before receiver finishes their animation
            // During that gap, ball stays at destination and receiver runs into it (no snap)
            const rcvrLastStep = receiverSteps.slice(-1)[0];
            const rcvrEndMs = rcvrLastStep ? ((rcvrLastStep.delay || 0) + rcvrLastStep.dur) * speedMult : 0;
            const ballArrivalMs = delay + dur;
            const deferMs = Math.max(0, rcvrEndMs - ballArrivalMs);
            const fc = Math.max(1, Math.round(dur / 16));
            let f = 0;
            const iId = setInterval(() => {
              f++;
              const p = f / fc;
              const t = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
              ball.setAttribute('x', sx + (ex-sx)*t);
              ball.setAttribute('y', sy + (ey-sy)*t);
              if (f >= fc) {
                clearInterval(iId);
                _plIntervals = _plIntervals.filter(i => i !== iId);
                ball.setAttribute('x', ex); ball.setAttribute('y', ey);
                // Defer _plBallHolder until receiver finishes running — creates "run into it" visual
                if (deferMs > 0) {
                  const dtId = setTimeout(() => { _plBallHolder = s.ballFly; }, deferMs);
                  _plTimeouts.push(dtId);
                } else {
                  _plBallHolder = s.ballFly;
                }
              }
            }, 16);
            _plIntervals.push(iId);
          }, delay);
          _plTimeouts.push(tId);
        } else if (Array.isArray(s.waypoints)) {
          const scaled = s.waypoints.map(w => ({ ...w, dur: (w.dur || 0) * speedMult }));
          const tId = setTimeout(() => _plMovePlayerWaypoints(s.role, scaled), delay);
          _plTimeouts.push(tId);
        } else {
          const tId = setTimeout(() => _plMovePlayer(s.role, s.toX, s.toY, dur), delay);
          _plTimeouts.push(tId);
        }
      });
      const tId = setTimeout(runNext, maxMs + 20);
      _plTimeouts.push(tId);
    } else if (step.pause) {
      const tId = setTimeout(runNext, step.pause * speedMult);
      _plTimeouts.push(tId);
    } else if (step.flashText) {
      _plShowTextFlash(step.flashText);
      runNext();
    } else if (Array.isArray(step.waypoints)) {
      const delay = (step.delay || 0) * speedMult;
      const scaled = step.waypoints.map(w => ({ ...w, dur: (w.dur || 0) * speedMult }));
      const tId = setTimeout(() => _plMovePlayerWaypoints(step.role, scaled, runNext), delay);
      _plTimeouts.push(tId);
    } else {
      const delay = (step.delay || 0) * speedMult;
      const dur   = (step.dur   || 800) * speedMult;
      const tId = setTimeout(() => _plMovePlayer(step.role, step.toX, step.toY, dur, runNext), delay);
      _plTimeouts.push(tId);
    }
  }
  runNext();
}

// ============================================================
// SCENARIO AUDIT (runs once at boot)
// ============================================================
function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - ax, py - ay);
  let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function auditScenarios() {
  const issues = [];
  SCENARIOS.forEach(s => {
    const you = s.players.find(p => p.id === "you");
    const teammates = s.players.filter(p => p.team === "home" && !p.goalie && p.id !== "you");
    const opponents = s.players.filter(p => p.team === "away" && !p.goalie);
    const goalies = s.players.filter(p => p.goalie);
    const ball = s.players.find(p => p.hasBall);
    const attackDir = (s.attackDir === "left") ? -1 : 1;

    if (s.players.length < 3 || s.players.length > 14) issues.push(`${s.id}: player count ${s.players.length} (expected 3-14)`);
    if (teammates.length < 1) issues.push(`${s.id}: no home teammates`);
    if (opponents.length < 1) issues.push(`${s.id}: no opponents`);
    if (goalies.length > 2) issues.push(`${s.id}: goalie count ${goalies.length} (expected 0-2)`);
    if (!you) issues.push(`${s.id}: missing YOU`);
    if (!ball) issues.push(`${s.id}: no ball carrier`);
    // YOU has no heading in DPS by design. T1 has no heading in GO by design —
    // auto-derivation points at the correct answer; only explicit template headings are shown.
    const _carrierHeadingOptional = (s.you_has_ball && ball.id === "you") ||
      (s.category === "get_open" && ball.id === "t1");
    if (ball && !ball.heading && !s.no_headings && !_carrierHeadingOptional) issues.push(`${s.id}: ball carrier ${ball.id} has no heading`);
    if (ball && ball.heading && ball.heading.x * attackDir < 0) {
      issues.push(`${s.id}: ball carrier ${ball.id} heading points toward own goal (x=${ball.heading.x})`);
    }
    if (s.you_has_ball ? (s.choices.length < 3 || s.choices.length > 5) : s.choices.length !== 3) {
      issues.push(`${s.id}: choice count ${s.choices.length} (expected ${s.you_has_ball ? '3–5' : '3'})`);
    }
    const correct = s.choices.filter(c => c.correct).length;
    if (correct !== 1) issues.push(`${s.id}: correct choices ${correct} (expected 1)`);

    // outcome.by / outcome.teammate / followUp.to must resolve to real player ids.
    const pids = new Set(s.players.map(p => p.id));
    s.choices.forEach(c => {
      if (c.outcome && c.outcome.by) {
        const refs = Array.isArray(c.outcome.by) ? c.outcome.by : [c.outcome.by];
        refs.forEach(pid => {
          if (!pids.has(pid)) issues.push(`${s.id}: choice ${c.id} outcome.by '${pid}' is not a player id`);
        });
      }
      if (c.outcome && c.outcome.teammate && !pids.has(c.outcome.teammate)) {
        issues.push(`${s.id}: choice ${c.id} outcome.teammate '${c.outcome.teammate}' is not a player id`);
      }
      if (c.followUp) {
        const fuSteps = Array.isArray(c.followUp) ? c.followUp : [c.followUp];
        fuSteps.forEach((step, si) => {
          if (step.to && !pids.has(step.to)) {
            issues.push(`${s.id}: choice ${c.id} followUp[${si}].to '${step.to}' is not a player id`);
          }
        });
      }
      // stayStill choice should sit at YOU's position (renderer rings YOU).
      if (c.stayStill && you && (c.x !== you.x || c.y !== you.y)) {
        issues.push(`${s.id}: stayStill choice ${c.id} pos (${c.x},${c.y}) does not match YOU (${you.x},${you.y})`);
      }
    });

    // ALREADY OPEN: for get_open scenarios where the correct choice requires movement,
    // verify at least one opponent threatens the direct carrier→YOU pass lane.
    // If no defender is within 4.5 units of that line, the player can already receive
    // in place and there is no tactical reason to move first.
    if (s.category === "get_open" && ball && you) {
      const correctChoice = s.choices.find(c => c.correct);
      if (correctChoice && !correctChoice.stayStill) {
        const defenders = s.players.filter(p => p.team === "away" && !p.goalie);
        const minDist = defenders.reduce((min, d) => {
          const dist = ptSegDist(d.x, d.y, ball.x, ball.y, you.x, you.y);
          return dist < min ? dist : min;
        }, Infinity);
        // Only applies when YOU is at or ahead of the carrier. If YOU starts behind
        // the carrier, passing there would be backward — the run forward is justified
        // regardless of lane clarity.
        const youAheadOfCarrier = you.x >= ball.x - 3;
        if (minDist > 4.5 && youAheadOfCarrier) {
          issues.push(`${s.id}: ALREADY OPEN — no defender threatens direct carrier→YOU pass lane (min dist ${minDist.toFixed(2)}). Add a defender to the lane or redesign. Also review the correct-choice explanation to reference why movement is necessary.`);
        }
      }
    }

    // CORRECT PASS LANE: the ball must fly through clear space on a successful pass.
    // Minimum 5.0 units perpendicular clearance from any opponent to the carrier→target line.
    // At < 5.0 units the ball appears to pass through a player, which confuses young users.
    // Only fires for correct non-stayStill choices where the carrier passes to a target.
    // DPS correct pass choices checked separately below.
    if (ball && !s.you_has_ball && !s.attacker_has_ball) {
      const correctPass = s.choices.find(c => c.correct && !c.stayStill);
      if (correctPass && correctPass.target) {
        const to = correctPass.target;
        const dx = to.x - ball.x, dy = to.y - ball.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        if (len > 0) {
          for (const opp of opponents) {
            const px = opp.x - ball.x, py = opp.y - ball.y;
            const t = (px*dx + py*dy) / (len*len);
            const perp = Math.abs(px*dy - py*dx) / len;
            if (t > 0.05 && t < 0.95 && perp < 5.0) {
              issues.push(`${s.id}: CORRECT PASS LANE — ${opp.id}(${opp.x},${opp.y}) is ${perp.toFixed(1)} units from correct pass lane (min 5.0). Move the defender clear of the pass lane so the ball visually flies through open space.`);
            }
          }
        }
      }
    }

    // YOU TOO CLOSE: flag if any field defender starts within 5 units of YOU.
    // Circles touch at 3.4 units (2 × radius); at 4.5 they crowd each other visually.
    // 5 units is the minimum for clear visual separation at scenario start.
    if (you) {
      const fieldOpps2 = s.players.filter(p => p.team === "away" && !p.goalie);
      for (const d of fieldOpps2) {
        const dist = Math.hypot(d.x - you.x, d.y - you.y);
        if (dist < 5) {
          issues.push(`${s.id}: YOU TOO CLOSE — ${d.id}(${d.x},${d.y}) starts ${dist.toFixed(2)} units from YOU(${you.x},${you.y}). Minimum is 5 units (circles overlap below 3.4). Move the defender away from YOU's starting position.`);
        }
      }
    }

    // PLAYER OVERLAP: no two players should be closer than 4.2 units (25% max circle overlap at r=2.8).
    // Fully overlapping circles are confusing for young users — each player must be visually distinct.
    {
      const allP = s.players;
      for (let pi = 0; pi < allP.length; pi++) {
        for (let pj = pi + 1; pj < allP.length; pj++) {
          const dist = Math.hypot(allP[pi].x - allP[pj].x, allP[pi].y - allP[pj].y);
          if (dist < 4.2) {
            issues.push(`${s.id}: PLAYER OVERLAP — ${allP[pi].id}(${allP[pi].x},${allP[pi].y}) and ${allP[pj].id}(${allP[pj].x},${allP[pj].y}) are ${dist.toFixed(2)} units apart (min 4.2 for 25% max overlap). Move one player to create clear visual separation.`);
          }
        }
      }
    }

    // ── DP LESSON CHECKS (you_has_ball scenarios) ──────────────────────────────
    if (s.you_has_ball && you) {
      const attackDir = (s.attackDir === "left") ? -1 : 1;

      // CHOICE TYPE COVERAGE: all 3 choices should not be the same type.
      // A scenario where all choices are passes teaches nothing about when to dribble or shoot.
      const types = new Set(s.choices.map(c => c.choice_type).filter(Boolean));
      if (types.size < 2) {
        issues.push(`${s.id}: DP CHOICE COVERAGE — all choices share choice_type (${[...types][0] || 'none'}). Include at least 2 distinct types (dribble/pass/shoot).`);
      }

      // DRIBBLE FORWARD: correct dribble choice must advance toward the opponent goal.
      const correctDP = s.choices.find(c => c.correct);
      if (correctDP && correctDP.choice_type === "dribble" && !correctDP.stayStill) {
        if (attackDir === 1 && correctDP.x <= you.x) {
          issues.push(`${s.id}: DP DRIBBLE FORWARD — correct dribble target x=${correctDP.x} does not advance past YOU x=${you.x}. Dribble must move forward.`);
        }
      }

      // SHOOT RANGE: shoot must happen within 25 units of goal center.
      // Checks direct shoot choices (from YOU's start) AND correct dribble choices
      // whose followUp contains a shoot step (shot fires from dribble endpoint).
      const goalX = attackDir === 1 ? 100 : 0;
      // Only flag correct shoot choices — wrong shoot choices are intentional "bad ideas"
      // and their range is irrelevant (explaining why the shot is wrong is the lesson).
      const shootChoices = s.choices.filter(c => c.choice_type === "shoot" && c.correct);
      for (const sc of shootChoices) {
        const dist = Math.hypot(you.x - goalX, you.y - 30);
        if (dist > 25) {
          issues.push(`${s.id}: DP SHOOT RANGE — YOU(${you.x},${you.y}) is ${dist.toFixed(1)} units from goal. Correct shoot choice requires YOU within 25 units.`);
        }
      }
      // Correct dribble with followUp shoot: check distance from dribble endpoint to goal.
      const correctDribble = s.choices.find(c => c.correct && c.choice_type === "dribble" && c.followUp);
      if (correctDribble) {
        const fuSteps = Array.isArray(correctDribble.followUp) ? correctDribble.followUp : [correctDribble.followUp];
        const hasShoot = fuSteps.some(st => st.type === "shoot");
        if (hasShoot) {
          // Dribble endpoint = last dribble step endX/endY, or correctDribble.x/y if no dribble step
          let endX = correctDribble.x, endY = correctDribble.y;
          for (const st of fuSteps) {
            if (st.type === "dribble" && st.endX != null) { endX = st.endX; endY = st.endY; }
          }
          const dist = Math.hypot(endX - goalX, endY - 30);
          if (dist > 25) {
            issues.push(`${s.id}: DP SHOOT RANGE (followUp) — dribble endpoint (${endX},${endY}) is ${dist.toFixed(1)} units from goal. Move the dribble target closer before shooting.`);
          }
        }
      }

      // WRONG PASS COVERAGE: each wrong pass choice should have a defender on the pass lane.
      // A blocked pass with no defender on the lane is visually unsupported.
      const wrongPasses = s.choices.filter(c => !c.correct && c.choice_type === "pass" && !c.stayStill);
      for (const wp of wrongPasses) {
        if (wp.x === undefined) continue;
        const fieldOpp = s.players.filter(p => p.team === "away" && !p.goalie);
        const minLaneDist = fieldOpp.reduce((mn, d) => {
          const dist = ptSegDist(d.x, d.y, you.x, you.y, wp.x, wp.y);
          return dist < mn ? dist : mn;
        }, Infinity);
        if (minLaneDist > 4.5 && wp.outcome?.type !== 'covered') {
          issues.push(`${s.id}: DP PASS UNCOVERED — wrong pass choice ${wp.id} to (${wp.x},${wp.y}) has no defender within 4.5 of lane (min ${minLaneDist.toFixed(2)}). Add a defender to visually justify the blocked pass.`);
        }
      }

      // WRONG PASS INTERCEPT BEYOND TARGET: for wrong pass choices with intercept outcome,
      // the intercepting defender must be BETWEEN YOU and the pass target (t in 0.05..0.95).
      // If t > 0.95 the defender is at or beyond the target — even with the ball-stop-at-
      // defender animation fix, the ball would fly past them before stopping. Move the
      // defender back toward YOU or adjust the pass target.
      for (const wp of wrongPasses.filter(c => c.outcome && c.outcome.type === "intercept")) {
        if (wp.x === undefined) continue;
        const iDef = s.players.find(p => p.id === wp.outcome.by);
        if (!iDef) continue;
        const dx = wp.x - you.x, dy = wp.y - you.y;
        const lenSq = dx*dx + dy*dy;
        if (lenSq === 0) continue;
        const t = ((iDef.x - you.x)*dx + (iDef.y - you.y)*dy) / lenSq;
        if (t > 0.95) {
          issues.push(`${s.id}: WRONG PASS INTERCEPT BEYOND TARGET — ${wp.outcome.by} is at t=${t.toFixed(2)} on choice ${wp.id} pass lane; ball would fly past them before the intercept. Move defender between YOU and target (t must be < 0.95).`);
        }
      }

      // FOLLOWUP DRIBBLE DIST: any dribble step in the correct choice's followUp that
      // exceeds 18 units from the receive position is unrealistic — the player looks like
      // they teleport across the field. Receive position = correct choice target for pass,
      // or player's starting position for a direct dribble followUp.
      const correctFU = s.choices.find(c => c.correct);
      if (correctFU && correctFU.followUp) {
        const fuSteps = Array.isArray(correctFU.followUp) ? correctFU.followUp : [correctFU.followUp];
        let prevX = correctFU.x != null ? correctFU.x : (you ? you.x : 0);
        let prevY = correctFU.y != null ? correctFU.y : (you ? you.y : 0);
        let useStart = true;
        fuSteps.forEach((step, si) => {
          if (step.type === 'dribble' && step.endX != null && step.endY != null) {
            const dist = Math.hypot(step.endX - prevX, step.endY - prevY);
            if (dist > 18) {
              issues.push(`${s.id}: FOLLOWUP DRIBBLE DIST — step ${si} dribble is ${dist.toFixed(1)} units (max 18). Shorten the endpoint or move the receive position further forward.`);
            }
            prevX = step.endX; prevY = step.endY; useStart = false;
          } else if (step.type === 'pass') {
            useStart = true;
          }
        });
      }
    }
    // ── END DP LESSON CHECKS ────────────────────────────────────────────────────

    // ── INTERCEPT GEOMETRY (GO + SP wrong intercept choices) ────────────────────
    // For get_open and set_pieces wrong choices with intercept outcome, the interceptor
    // must be geometrically on the carrier→target pass lane:
    //   perp < 4.5 (close enough to cut the ball)
    //   t in 0.05..0.95 (between carrier and target, not at or beyond the destination)
    // Defend wrong choices are excluded — their outcome.by is a free attacker who receives,
    // not a defender intercepting a pass. DPS is already covered in the block above.
    if (!s.you_has_ball && !s.attacker_has_ball) {
      const lanePasser = s.players.find(p => p.hasBall);
      if (lanePasser) {
        const wrongInterceptsGO = s.choices.filter(c => !c.correct && c.outcome && c.outcome.type === "intercept");
        for (const wc of wrongInterceptsGO) {
          if (wc.x == null) continue;
          const iDef = s.players.find(p => p.id === wc.outcome.by);
          if (!iDef) continue;
          const dx = wc.x - lanePasser.x, dy = wc.y - lanePasser.y;
          const lenSq = dx*dx + dy*dy;
          if (lenSq === 0) continue;
          const t = ((iDef.x - lanePasser.x)*dx + (iDef.y - lanePasser.y)*dy) / lenSq;
          const perp = ptSegDist(iDef.x, iDef.y, lanePasser.x, lanePasser.y, wc.x, wc.y);
          if (perp > 4.5) {
            issues.push(`${s.id}: INTERCEPT OFF LANE — ${iDef.id} is ${perp.toFixed(1)} units from carrier→target lane for wrong choice ${wc.id}. Use "covered" outcome instead, or move the defender onto the lane.`);
          } else if (t > 0.95) {
            issues.push(`${s.id}: INTERCEPT BEYOND TARGET — ${iDef.id} is at t=${t.toFixed(2)} on wrong choice ${wc.id} pass lane; ball would fly past before intercept fires. Move defender between carrier and target (t < 0.95).`);
          }
        }
      }
    }

    // ── FOLLOWUP DRIBBLE DIST (GO, Defend, SP) ──────────────────────────────────
    // Same 18-unit limit as DPS, extended to all other lessons.
    // DPS is already checked in the block above.
    if (!s.you_has_ball) {
      const correctFUAll = s.choices.find(c => c.correct);
      if (correctFUAll && correctFUAll.followUp) {
        const fuStepsAll = Array.isArray(correctFUAll.followUp) ? correctFUAll.followUp : [correctFUAll.followUp];
        let prevXAll = correctFUAll.x != null ? correctFUAll.x : (you ? you.x : 0);
        let prevYAll = correctFUAll.y != null ? correctFUAll.y : (you ? you.y : 0);
        fuStepsAll.forEach((step, si) => {
          if (step.type === 'dribble' && step.endX != null && step.endY != null) {
            const dist = Math.hypot(step.endX - prevXAll, step.endY - prevYAll);
            if (dist > 18) {
              issues.push(`${s.id}: FOLLOWUP DRIBBLE DIST — step ${si} dribble is ${dist.toFixed(1)} units (max 18). Shorten the endpoint or move the receive position further forward.`);
            }
            prevXAll = step.endX; prevYAll = step.endY;
          }
        });
      }
    }

    // DRIBBLE TOWARD DEFENDER: for correct-choice YOU dribbles in follow-up animation,
    // flag if YOU dribbles toward a defender (endpoint within 10 units and angle < 45°).
    // Indicates YOU is carrying into a defender's zone when open space exists elsewhere.
    if (you) {
      const correctChoice = s.choices.find(c => c.correct);
      if (correctChoice && correctChoice.followUp) {
        const steps = Array.isArray(correctChoice.followUp) ? correctChoice.followUp : [correctChoice.followUp];
        let pos = { x: correctChoice.x, y: correctChoice.y };
        for (const step of steps) {
          if (step.type === "dribble" && !step.by && step.endX !== undefined) {
            const endpt = { x: step.endX, y: step.endY };
            const dv = { x: endpt.x - pos.x, y: endpt.y - pos.y };
            const dvMag = Math.hypot(dv.x, dv.y);
            if (dvMag > 0) {
              const fieldOpps = s.players.filter(p => p.team === "away" && !p.goalie);
              for (const d of fieldOpps) {
                const endDist = Math.hypot(endpt.x - d.x, endpt.y - d.y);
                if (endDist < 10) {
                  const toD = { x: d.x - pos.x, y: d.y - pos.y };
                  const cos = (dv.x * toD.x + dv.y * toD.y) / (dvMag * Math.hypot(toD.x, toD.y));
                  const angle = Math.acos(Math.min(1, Math.max(-1, cos))) * 180 / Math.PI;
                  if (angle < 45) {
                    issues.push(`${s.id}: DRIBBLE TOWARD DEFENDER — endpoint (${endpt.x},${endpt.y}) is ${endDist.toFixed(1)} from ${d.id} and dribble points toward them (${angle.toFixed(0)}°). Redirect toward open space. Also update the correct-choice explanation to describe why that direction is the right run.`);
                  }
                }
              }
              // DRIBBLE THROUGH TEAMMATE: flag if any home non-carrier non-YOU player
              // is within 4.5 units of the YOU dribble path. YOU running through their
              // own teammate looks broken in animation.
              const homeTeammates = s.players.filter(p => p.team === "home" && !p.goalie && p.id !== "you" && !p.hasBall);
              for (const tm of homeTeammates) {
                const pathDist = ptSegDist(tm.x, tm.y, pos.x, pos.y, endpt.x, endpt.y);
                if (pathDist < 4.5) {
                  issues.push(`${s.id}: DRIBBLE THROUGH TEAMMATE — ${tm.id}(${tm.x},${tm.y}) is ${pathDist.toFixed(1)} from YOU dribble path (${pos.x},${pos.y})→(${endpt.x},${endpt.y}). Move the teammate or adjust the dribble route.`);
                }
              }
            }
            pos = endpt;
          }
        }
      }
    }

    // OFFSIDE: flag if the correct-choice target is beyond the last outfield defender
    // AND beyond the ball carrier (you cannot be offside if behind the ball).
    // Last outfield defender = away field player with highest x (sets the offside line).
    // OFFSIDE: flag if the correct-choice target is beyond the last outfield defender.
    // For DPS (you_has_ball) scenarios: only applies to pass choices — a dribble target
    // is where YOU goes with the ball (cannot be offside), and a shoot target is the goal
    // area (irrelevant to offside). For all other scenarios: the correct target is where
    // YOU runs to, so the check applies unconditionally.
    if (you) {
      const correctChoice = s.choices.find(c => c.correct);
      const offsideApplies = correctChoice && !correctChoice.stayStill && ball &&
        (!s.you_has_ball || correctChoice.choice_type === "pass");
      if (offsideApplies) {
        const attackDir = (s.attackDir === "left") ? -1 : 1;
        if (attackDir === 1) {  // attacking left-to-right
          const fieldOpp = s.players.filter(p => p.team === "away" && !p.goalie);
          if (fieldOpp.length > 0) {
            const lastDef = fieldOpp.reduce((max, p) => p.x > max.x ? p : max, fieldOpp[0]);
            // For DPS pass choices: compile-time drift moves the target to the teammate's
            // drift destination (9 units forward). Offside is judged at the moment the ball
            // is played — use the recipient's starting position, not the compiled target.
            let checkX = correctChoice.x;
            if (s.you_has_ball && correctChoice.choice_type === "pass") {
              const homeTeam = s.players.filter(p => p.team === "home" && !p.goalie && p.id !== "you");
              if (homeTeam.length > 0) {
                const recipient = homeTeam.reduce((nearest, tm) => {
                  const d = Math.hypot(tm.x - correctChoice.x, tm.y - correctChoice.y);
                  const dn = Math.hypot(nearest.x - correctChoice.x, nearest.y - correctChoice.y);
                  return d < dn ? tm : nearest;
                }, homeTeam[0]);
                checkX = recipient.x; // starting position when ball was played
              }
            }
            if (checkX > lastDef.x && checkX > ball.x) {
              issues.push(`${s.id}: OFFSIDE — recipient starts at x=${checkX} beyond last defender x=${lastDef.x} (${lastDef.id}). Move the last defender forward or pull the teammate back.`);
            }
          }
        }
      }
    }

    // ── DEFEND LESSON CHECKS (attacker_has_ball scenarios) ─────────────────────
    if (s.attacker_has_ball) {
      const _o1 = s.players.find(p => p.id === "o1");
      const _t1 = s.players.find(p => p.id === "t1");
      const _t2 = s.players.find(p => p.id === "t2");

      // ATTACKER IN RANGE: o1 should be in or approaching the home defensive half (x 30–62).
      if (_o1 && (_o1.x < 30 || _o1.x > 62)) {
        issues.push(`${s.id}: ATTACKER IN RANGE — o1.x=${_o1.x} outside 30–62. Attackers should be crossing into or approaching the home half.`);
      }
      // DEFENDER GOALSIDE: t1 and t2 should be goalside of o1 (lower x in attackDir:"left").
      if (_o1 && _t1 && _t1.x > _o1.x + 5) {
        issues.push(`${s.id}: DEFENDER GOALSIDE — t1.x=${_t1.x} is ahead of o1.x=${_o1.x}. Home defenders should be goalside (lower x) of the attacker.`);
      }
      if (_o1 && _t2 && _t2.x > _o1.x + 5) {
        issues.push(`${s.id}: DEFENDER GOALSIDE — t2.x=${_t2.x} is ahead of o1.x=${_o1.x}. Home defenders should be goalside (lower x) of the attacker.`);
      }
      // YOU GOALSIDE: YOU should start goalside of or level with o1.
      if (_o1 && you && you.x > _o1.x + 8) {
        issues.push(`${s.id}: YOU GOALSIDE — you.x=${you.x} is too far ahead of o1.x=${_o1.x}. YOU should start goalside or level with the attacker.`);
      }
      // FREE ATTACKER: each wrong non-stayStill choice needs an away field player as outcome.by.
      s.choices.filter(c => !c.correct && !c.stayStill).forEach(wc => {
        if (!wc.outcome || !wc.outcome.by) {
          issues.push(`${s.id}: FREE ATTACKER — wrong choice ${wc.id} missing outcome.by. Defend wrong choices need a free attacker to receive o1's pass.`);
        } else {
          const recv = s.players.find(p => p.id === wc.outcome.by);
          if (!recv) {
            issues.push(`${s.id}: FREE ATTACKER — wrong choice ${wc.id} outcome.by '${wc.outcome.by}' not found.`);
          } else if (recv.team !== "away" || recv.goalie) {
            issues.push(`${s.id}: FREE ATTACKER — wrong choice ${wc.id} outcome.by '${wc.outcome.by}' must be an away field player.`);
          }
        }
      });
      // CLEAR SAFETY: clear endpoint should not be in front of own goal (x<20, y 15–45).
      const _cFU = s.choices.find(c => c.correct);
      if (_cFU && _cFU.followUp) {
        const _fuS = Array.isArray(_cFU.followUp) ? _cFU.followUp : [_cFU.followUp];
        _fuS.forEach(step => {
          if (step.type === "clear" && step.endX != null) {
            if (step.endX < 20 && step.endY > 15 && step.endY < 45) {
              issues.push(`${s.id}: CLEAR SAFETY — clear endpoint (${step.endX},${step.endY}) is in front of own goal. Clear to touchline (y<10 or y>50) instead.`);
            }
          }
        });
      }
    }
    // ── END DEFEND LESSON CHECKS ─────────────────────────────────────────────────

    // CLOSER TEAMMATE: flag if any non-carrier teammate is closer to the correct-choice
    // target than YOU are. If a teammate is within 70% of YOUR distance, they are the
    // more natural runner and the scenario may be asking the wrong player to make the move.
    // Not applicable in DPS (you_has_ball) scenarios: YOU is the passer/dribbler, not a runner —
    // teammates being near the pass target is correct and expected.
    if (you && !s.you_has_ball) {
      const correctChoice = s.choices.find(c => c.correct);
      if (correctChoice && !correctChoice.stayStill) {
        const youDist = Math.hypot(correctChoice.x - you.x, correctChoice.y - you.y);
        const nonCarrierTeammates = s.players.filter(p => p.team === "home" && !p.goalie && p.id !== "you" && !p.hasBall);
        for (const tm of nonCarrierTeammates) {
          const tmDist = Math.hypot(correctChoice.x - tm.x, correctChoice.y - tm.y);
          if (tmDist < youDist * 0.7) {
            issues.push(`${s.id}: CLOSER TEAMMATE — ${tm.id} is ${tmDist.toFixed(1)} from correct target vs YOU at ${youDist.toFixed(1)} (ratio ${(tmDist/youDist).toFixed(2)}). Consider whether YOU is the right player to make this run. Also review explanation to clarify why YOU makes this move instead of the closer teammate.`);
          }
        }
      }
    }
  });
  if (issues.length) console.warn("Scenario audit issues:\n  " + issues.join("\n  "));
  else console.log("Scenario audit clean.");
}

// ============================================================
// PLAY LIBRARY AUDIT (Session Y — Invariants 4, 5, 6, 7)
// ============================================================
// Helper — collect every ball construct in a play's sequential + par steps.
function _plCollectBallConstructs(play) {
  const out = [];
  const walk = steps => {
    for (const s of steps || []) {
      if (!s || typeof s !== 'object') continue;
      if (s.ball) out.push(s.ball);
      if (Array.isArray(s.par)) walk(s.par);
    }
  };
  walk((play.prePlay || []).concat(play.payoff || []));
  return out;
}

// Helper — proper segment intersection test. Returns true when segment a1→a2
// strictly crosses segment b1→b2 (endpoints touching return false).
function _plSegmentsCross(a1, a2, b1, b2) {
  const cross = (p, q, r) => (q.x - p.x) * (r.y - p.y) - (q.y - p.y) * (r.x - p.x);
  const d1 = cross(b1, b2, a1);
  const d2 = cross(b1, b2, a2);
  const d3 = cross(a1, a2, b1);
  const d4 = cross(a1, a2, b2);
  return ((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0)) &&
         ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0));
}

function auditPlays() {
  const issues = [];
  const DEF_ALLOWCROSS_ENUM = new Set(['scramble_recovery', 'mark_switch', 'tactical_rotation']);
  const MIN_SPACING = 4.2;
  const MOTION_FLOOR = 4.0;          // Raised from 2.0 — drifts under 4u read as inert to kids.
  const FRAMES = 10;
  const RELEASE_OPP_PERP = 4.5;      // Opponent this close to pass/shot/clear/throw lane fails.
  const MATE_BLOCK_PERP = 2.0;       // Teammate this close reads as "ball through own player."
  const SWAP_END_DIST = 4.0;         // Same-team end-position mirror within this flags as swap.
  const FLIGHT_SAMPLES = 5;          // Frames per ball flight sampled for lane audits.

  const BALL_KINDS = new Set(['pass', 'shot', 'clear', 'throw', 'intercept']);
  const LANE_KINDS = new Set(['pass', 'shot', 'clear', 'throw']);

  for (const play of CORRECT_PLAYS) {
    const pid = play.id;
    const setup = play.setup || {};
    const roles = Object.keys(setup);

    // === Ball construct shape validation (Session X / Y) ===
    // Structural only: kind in enum, from resolves to setup role, to resolves when required,
    // interceptedBy resolves for intercept. Speed-floor check is disabled — short passes in
    // the Play Library deliberately run faster than the 50ms/u pass tier to keep pace readable.
    for (const b of _plCollectBallConstructs(play)) {
      if (!BALL_KINDS.has(b.kind)) issues.push(`${pid}: ball.kind "${b.kind}" not in {${[...BALL_KINDS].join(',')}}`);
      if (b.from && !roles.includes(b.from)) issues.push(`${pid}: ball.from "${b.from}" not in setup`);
      if ((b.kind === 'pass' || b.kind === 'throw' || b.kind === 'intercept') && b.to && !roles.includes(b.to)) {
        issues.push(`${pid}: ball.to "${b.to}" not in setup`);
      }
      if (b.kind === 'intercept' && (!b.interceptedBy || !roles.includes(b.interceptedBy))) {
        issues.push(`${pid}: ball.interceptedBy "${b.interceptedBy}" missing or not in setup`);
      }
    }

    // === Invariant 7 — concept_steps binding ===
    if (Array.isArray(play.concept_steps)) {
      const balls = _plCollectBallConstructs(play);
      for (const s of play.concept_steps) {
        if (!roles.includes(s.actor)) {
          issues.push(`${pid}: concept_step actor "${s.actor}" not in setup`);
        }
        if (s.target && !roles.includes(s.target)) {
          issues.push(`${pid}: concept_step target "${s.target}" not in setup`);
        }
        if (s.action === 'scores') {
          const paired = balls.some(b => b.kind === 'shot' && (b.from === s.actor || b.to === s.actor));
          if (!paired) issues.push(`${pid}: concept_step "${s.actor} scores" unpaired with any kind:"shot" construct`);
        }
      }
    }

    // Determine same-team groupings for no-swap rule.
    const defenderRoles = new Set();
    const attackerRoles = new Set();
    for (const r of roles) {
      if (r === 'GK') continue;
      if (play.actionTeam === 'A') {
        if (r.startsWith('A') || r === 'DY') attackerRoles.add(r); else defenderRoles.add(r);
      } else {
        if (r.startsWith('D') || r === 'DY') defenderRoles.add(r); else attackerRoles.add(r);
      }
    }

    // Walk steps cumulatively. For each par block, run Inv 4 and Inv 5.
    const positions = {};
    for (const r of roles) positions[r] = { x: setup[r].x, y: setup[r].y };

    const allSteps = (play.prePlay || []).concat(play.payoff || []);
    for (const step of allSteps) {
      const subSteps = step.par ? step.par : [step];

      // Par duration = max(delay + dur) across movement, ball, hold, pause, and waypoints.
      let parDur = 0;
      for (const s of subSteps) {
        const delay = s.delay || 0;
        let d = s.dur || 0;
        if (Array.isArray(s.waypoints)) d = s.waypoints.reduce((a, w) => a + (w.dur || 0), 0);
        if (s.ball && s.ball.dur) d = Math.max(d, s.ball.dur);
        if (s.pause) d = Math.max(d, s.pause);
        if (delay + d > parDur) parDur = delay + d;
      }

      // Build trajectories: start pos, end pos, delay, dur, allowCross, optional path (waypoints).
      const trajectories = {};
      for (const r of roles) {
        trajectories[r] = { start: { ...positions[r] }, end: { ...positions[r] }, delay: 0, dur: 0, allowCross: null, path: null };
      }
      for (const s of subSteps) {
        if (s.role && s.toX !== undefined && s.toY !== undefined) {
          trajectories[s.role] = {
            start: { ...positions[s.role] },
            end: { x: s.toX, y: s.toY },
            delay: s.delay || 0,
            dur: s.dur || 0,
            allowCross: s.allowCross || null,
            path: null,
          };
        } else if (s.role && Array.isArray(s.waypoints) && s.waypoints.length) {
          let cum = 0;
          const path = [];
          for (const wp of s.waypoints) { cum += (wp.dur || 0); path.push({ x: wp.x, y: wp.y, cum }); }
          const last = path[path.length - 1];
          trajectories[s.role] = {
            start: { ...positions[s.role] },
            end: { x: last.x, y: last.y },
            delay: s.delay || 0,
            dur: cum,
            allowCross: s.allowCross || null,
            path,
          };
        }
      }

      // Roles authored with allowOverlap on any sub-step of this par may come within
      // MIN_SPACING of other roles for intentional contact (tackle, press, intercept).
      // Suppression applies to pairs where EITHER role has allowOverlap set.
      const allowOverlapRoles = new Set();
      for (const s of subSteps) {
        if (s.allowOverlap && s.role) allowOverlapRoles.add(s.role);
      }

      // === Invariant 4 — per-frame overlap sampling ===
      // Skip t=0 to avoid double-counting with the previous par's t=parDur sample.
      // Skip pars where no role actually moves (pure ball/hold steps) since there's nothing to sample.
      const anyMotion = Object.values(trajectories).some(t => t.dur > 0);
      if (parDur > 0 && anyMotion) {
        outer: for (let f = 1; f <= FRAMES; f++) {
          const t = (f / FRAMES) * parDur;
          const interp = {};
          for (const r of roles) {
            const tj = trajectories[r];
            if (tj.dur <= 0) { interp[r] = { ...tj.start }; continue; }
            const local = (t - tj.delay) / tj.dur;
            if (local <= 0) interp[r] = { ...tj.start };
            else if (local >= 1) interp[r] = { ...tj.end };
            else if (tj.path) {
              const localTime = local * tj.dur;
              let prevX = tj.start.x, prevY = tj.start.y, prevCum = 0;
              let placed = false;
              for (const seg of tj.path) {
                if (localTime <= seg.cum) {
                  const segDur = seg.cum - prevCum;
                  const lt = segDur > 0 ? (localTime - prevCum) / segDur : 0;
                  interp[r] = { x: prevX + (seg.x - prevX) * lt, y: prevY + (seg.y - prevY) * lt };
                  placed = true;
                  break;
                }
                prevX = seg.x; prevY = seg.y; prevCum = seg.cum;
              }
              if (!placed) interp[r] = { x: prevX, y: prevY };
            } else {
              const e = local < 0.5 ? 2 * local * local : -1 + (4 - 2 * local) * local;
              interp[r] = {
                x: tj.start.x + (tj.end.x - tj.start.x) * e,
                y: tj.start.y + (tj.end.y - tj.start.y) * e,
              };
            }
          }
          for (let i = 0; i < roles.length; i++) {
            for (let j = i + 1; j < roles.length; j++) {
              if (allowOverlapRoles.has(roles[i]) || allowOverlapRoles.has(roles[j])) continue;
              const a = interp[roles[i]], b = interp[roles[j]];
              const d = Math.hypot(a.x - b.x, a.y - b.y);
              if (d < MIN_SPACING) {
                issues.push(`${pid}: per-frame overlap ${roles[i]}/${roles[j]} @ t=${Math.round(t)}ms dist=${d.toFixed(2)}u`);
                break outer;
              }
            }
          }
        }
      }

      // === Invariant 5 — no-swap rule for same-team pairs ===
      // Covers two swap shapes:
      //  (a) strict segment crossing — trajectories physically intersect
      //  (b) end-position swap — A ends near B.start AND B ends near A.start (mirror swap)
      //      even when segments don't cross (e.g., looping paths around each other)
      const pairCheck = (rolesSet, isDefSide) => {
        const arr = [...rolesSet];
        for (let i = 0; i < arr.length; i++) {
          for (let j = i + 1; j < arr.length; j++) {
            const A = trajectories[arr[i]], B = trajectories[arr[j]];
            if (A.dur <= 0 || B.dur <= 0) continue;
            const crosses = _plSegmentsCross(A.start, A.end, B.start, B.end);
            const aToBStart = Math.hypot(A.end.x - B.start.x, A.end.y - B.start.y);
            const bToAStart = Math.hypot(B.end.x - A.start.x, B.end.y - A.start.y);
            const swaps = (aToBStart < SWAP_END_DIST && bToAStart < SWAP_END_DIST);
            if (!crosses && !swaps) continue;
            const ac = A.allowCross || B.allowCross;
            const shape = crosses ? 'same-team crossing' : 'same-team end-pos swap';
            if (!ac) {
              issues.push(`${pid}: ${shape} ${arr[i]}/${arr[j]} has no allowCross`);
            } else if (isDefSide) {
              const level = play.level || 1;
              if (level <= 2) {
                issues.push(`${pid}: defender allowCross "${ac}" forbidden at level ${level}`);
              } else if (!DEF_ALLOWCROSS_ENUM.has(ac)) {
                issues.push(`${pid}: defender allowCross "${ac}" not in enum {scramble_recovery,mark_switch,tactical_rotation}`);
              }
            }
          }
        }
      };
      pairCheck(defenderRoles, true);
      pairCheck(attackerRoles, false);

      // === Rule A — release geometry (opponent perp of flight line) ===
      // === Rule F — pass-through-teammate ===
      // For every ball construct in the par with kind ∈ {pass, shot, clear, throw},
      // sample the flight at 5 points. An opponent within 4.5u perp of the ball's
      // current lane position fails release geometry (reauthor as kind:"intercept" or
      // reposition). A non-sender non-receiver teammate within 2.0u reads as the ball
      // flying through own player and must be rerouted.
      const rolePosAtT = (role, t) => {
        const start = positions[role];
        if (!start) return null;
        // Collect both simple {toX,toY} steps and waypoint polylines.
        const rSteps = [];
        for (const s of subSteps) {
          if (s.role !== role) continue;
          if (s.toX !== undefined && s.toY !== undefined) {
            rSteps.push({ delay: s.delay || 0, dur: s.dur || 0, isEased: true, end: { x: s.toX, y: s.toY } });
          } else if (Array.isArray(s.waypoints) && s.waypoints.length) {
            let cum = 0;
            const path = [];
            for (const wp of s.waypoints) { cum += (wp.dur || 0); path.push({ x: wp.x, y: wp.y, cum }); }
            rSteps.push({ delay: s.delay || 0, dur: cum, isEased: false, path });
          }
        }
        rSteps.sort((a, b) => a.delay - b.delay);
        let cx = start.x, cy = start.y;
        for (const st of rSteps) {
          if (t <= st.delay) return { x: cx, y: cy };
          if (t >= st.delay + st.dur) {
            if (st.isEased) { cx = st.end.x; cy = st.end.y; }
            else { const last = st.path[st.path.length - 1]; cx = last.x; cy = last.y; }
            continue;
          }
          const localTime = t - st.delay;
          if (st.isEased) {
            const local = localTime / st.dur;
            const e = local < 0.5 ? 2 * local * local : -1 + (4 - 2 * local) * local;
            return { x: cx + (st.end.x - cx) * e, y: cy + (st.end.y - cy) * e };
          } else {
            let prevX = cx, prevY = cy, prevCum = 0;
            for (const seg of st.path) {
              if (localTime <= seg.cum) {
                const segDur = seg.cum - prevCum;
                const localT = segDur > 0 ? (localTime - prevCum) / segDur : 0;
                return { x: prevX + (seg.x - prevX) * localT, y: prevY + (seg.y - prevY) * localT };
              }
              prevX = seg.x; prevY = seg.y; prevCum = seg.cum;
            }
            return { x: prevX, y: prevY };
          }
        }
        return { x: cx, y: cy };
      };
      for (const s of subSteps) {
        if (!s.ball || !LANE_KINDS.has(s.ball.kind)) continue;
        const b = s.ball;
        const bDelay = s.delay || 0;
        const bDur = b.dur || 540;
        const fromP = rolePosAtT(b.from, bDelay);
        if (!fromP) continue;
        let toP;
        if (b.toX !== undefined && b.toY !== undefined) toP = { x: b.toX, y: b.toY };
        else if (b.to) toP = rolePosAtT(b.to, bDelay + bDur);
        if (!toP) continue;
        const fromIsAtk = attackerRoles.has(b.from);
        const oppRoles  = fromIsAtk ? defenderRoles : attackerRoles;
        const mateRoles = fromIsAtk ? attackerRoles : defenderRoles;
        // Session AE — Rule A no longer respects allowOverlap:'pass_through' /
        // 'intentional_press'. Those suppressed genuine ball-through-defender visuals.
        // CLAUDE.md Invariant 1: release geometry requires kind:"intercept" with
        // interceptedBy for any defender on the lane, or reposition. No bypass.
        for (const opp of oppRoles) {
          let flagged = false;
          for (let k = 1; k <= FLIGHT_SAMPLES; k++) {
            const frac = k / FLIGHT_SAMPLES;
            const tAt = bDelay + bDur * frac;
            const oppP = rolePosAtT(opp, tAt);
            if (!oppP) continue;
            const bx = fromP.x + (toP.x - fromP.x) * frac;
            const by = fromP.y + (toP.y - fromP.y) * frac;
            if (Math.hypot(oppP.x - bx, oppP.y - by) < RELEASE_OPP_PERP) {
              const lane = b.to ? `${b.from}→${b.to}` : `${b.from}→(${b.toX},${b.toY})`;
              issues.push(`${pid}: RELEASE GEOMETRY — opponent ${opp} within ${RELEASE_OPP_PERP}u of ${b.kind} lane ${lane} at flight t=${(frac*100).toFixed(0)}%; author as kind:"intercept" with interceptedBy:"${opp}" or reposition`);
              flagged = true;
              break;
            }
          }
          if (flagged) break;
        }
        for (const mate of mateRoles) {
          if (mate === b.from || mate === b.to) continue;
          let flagged = false;
          for (let k = 1; k <= FLIGHT_SAMPLES; k++) {
            const frac = k / FLIGHT_SAMPLES;
            const tAt = bDelay + bDur * frac;
            const mateP = rolePosAtT(mate, tAt);
            if (!mateP) continue;
            const bx = fromP.x + (toP.x - fromP.x) * frac;
            const by = fromP.y + (toP.y - fromP.y) * frac;
            if (Math.hypot(mateP.x - bx, mateP.y - by) < MATE_BLOCK_PERP) {
              const lane = b.to ? `${b.from}→${b.to}` : `${b.from}→(${b.toX},${b.toY})`;
              issues.push(`${pid}: PASS THROUGH TEAMMATE — ${mate} within ${MATE_BLOCK_PERP}u of ${b.kind} lane ${lane} at flight t=${(frac*100).toFixed(0)}%; reroute or reposition teammate`);
              flagged = true;
              break;
            }
          }
          if (flagged) break;
        }
      }

      // === Rule I — pass-meets-receiver timing ===
      // For every pass/throw, ensure the receiver's trajectory puts them AT the ball landing
      // position within 300ms of the ball arriving. Typed ball constructs aimed via
      // resolveRoleAtT are tautologically clean. This catches legacy ballFly uses (which
      // target final destination, not arrival-time position) and any typed construct where
      // the receiver's trajectory doesn't actually pass through the ball landing coordinates.
      // Exempt: if the receiver has no movement in this par, they're stationary and meeting
      // the ball at their start position is fine.
      const TIMING_GAP_MS = 300;
      const TIMING_DIST_U = 4.0;
      const TIMING_SAMPLES = 20;
      for (const s of subSteps) {
        if (!s.ball) continue;
        const b = s.ball;
        if (b.kind !== 'pass' && b.kind !== 'throw') continue;
        if (!b.to) continue;
        const bDelay = s.delay || 0;
        const bDur = b.dur || 540;
        const bArrival = bDelay + bDur;

        let landX, landY;
        if (b.toX !== undefined && b.toY !== undefined) { landX = b.toX; landY = b.toY; }
        else {
          const tp = rolePosAtT(b.to, bArrival);
          if (!tp) continue;
          landX = tp.x; landY = tp.y;
        }

        // Detect whether receiver actually has motion in this par. If not, skip timing check.
        const receiverHasMotion = subSteps.some(ss => ss.role === b.to && (
          (ss.toX !== undefined && ss.toY !== undefined) ||
          (Array.isArray(ss.waypoints) && ss.waypoints.length)
        ));
        if (!receiverHasMotion) continue;

        // Sample receiver's trajectory, find closest approach time.
        let bestT = 0, bestDist = Infinity;
        for (let k = 0; k <= TIMING_SAMPLES; k++) {
          const tSample = (k / TIMING_SAMPLES) * parDur;
          const p = rolePosAtT(b.to, tSample);
          if (!p) continue;
          const d = Math.hypot(p.x - landX, p.y - landY);
          if (d < bestDist) { bestDist = d; bestT = tSample; }
        }
        if (bestDist > TIMING_DIST_U) {
          issues.push(`${pid}: TIMING — ${b.kind} ${b.from}→${b.to} lands at (${landX.toFixed(1)},${landY.toFixed(1)}); receiver ${b.to} closest approach ${bestDist.toFixed(1)}u (> ${TIMING_DIST_U}u). Receiver trajectory does not reach ball landing.`);
          continue;
        }
        const gap = Math.abs(bestT - bArrival);
        if (gap > TIMING_GAP_MS) {
          issues.push(`${pid}: TIMING — ${b.kind} ${b.from}→${b.to} arrives at t=${Math.round(bArrival)}ms; receiver reaches landing at t=${Math.round(bestT)}ms (gap ${Math.round(gap)}ms > ${TIMING_GAP_MS}ms). Adjust ball.dur or receiver.delay.`);
        }
      }

      // Commit end positions for the next sequential step.
      for (const r of roles) {
        if (trajectories[r].dur > 0) positions[r] = { ...trajectories[r].end };
      }
    }

    // === Invariant 6 — meaningful motion ===
    const motionRoles = new Set();
    const ballTouchRoles = new Set();
    const holdRoles = new Set();
    const pos2 = {};
    for (const r of roles) pos2[r] = { x: setup[r].x, y: setup[r].y };

    const walkForMotion = (steps) => {
      for (const s of steps || []) {
        if (!s || typeof s !== 'object') continue;
        if (Array.isArray(s.par)) {
          const roleEnds = {};
          for (const ss of s.par) {
            if (ss.ball) {
              if (ss.ball.from) ballTouchRoles.add(ss.ball.from);
              if (ss.ball.to) ballTouchRoles.add(ss.ball.to);
              if (ss.ball.interceptedBy) ballTouchRoles.add(ss.ball.interceptedBy);
            }
            if (ss.ballFly) ballTouchRoles.add(ss.ballFly);
            if (ss.ballTo) ballTouchRoles.add(ss.ballTo);
            if (ss.hold && ss.role) holdRoles.add(ss.role);
            if (ss.role && ss.toX !== undefined && ss.toY !== undefined) {
              roleEnds[ss.role] = { x: ss.toX, y: ss.toY };
            } else if (ss.role && Array.isArray(ss.waypoints) && ss.waypoints.length) {
              const last = ss.waypoints[ss.waypoints.length - 1];
              roleEnds[ss.role] = { x: last.x, y: last.y };
            }
          }
          for (const r of Object.keys(roleEnds)) {
            const d = Math.hypot(roleEnds[r].x - pos2[r].x, roleEnds[r].y - pos2[r].y);
            if (d >= MOTION_FLOOR) motionRoles.add(r);
            pos2[r] = { ...roleEnds[r] };
          }
          continue;
        }
        if (s.ball) {
          if (s.ball.from) ballTouchRoles.add(s.ball.from);
          if (s.ball.to) ballTouchRoles.add(s.ball.to);
          if (s.ball.interceptedBy) ballTouchRoles.add(s.ball.interceptedBy);
        }
        if (s.ballFly) ballTouchRoles.add(s.ballFly);
        if (s.ballTo) ballTouchRoles.add(s.ballTo);
        if (s.hold && s.role) holdRoles.add(s.role);
        if (s.role && s.toX !== undefined && s.toY !== undefined) {
          const d = Math.hypot(s.toX - pos2[s.role].x, s.toY - pos2[s.role].y);
          if (d >= MOTION_FLOOR) motionRoles.add(s.role);
          pos2[s.role] = { x: s.toX, y: s.toY };
        } else if (s.role && Array.isArray(s.waypoints) && s.waypoints.length) {
          const last = s.waypoints[s.waypoints.length - 1];
          const d = Math.hypot(last.x - pos2[s.role].x, last.y - pos2[s.role].y);
          if (d >= MOTION_FLOOR) motionRoles.add(s.role);
          pos2[s.role] = { x: last.x, y: last.y };
        }
      }
    };
    walkForMotion((play.prePlay || []).concat(play.payoff || []));

    for (const r of roles) {
      if (r === 'GK') continue; // GK may be stationary unless involved in a shot/save; not a style bug.
      if (!motionRoles.has(r) && !ballTouchRoles.has(r) && !holdRoles.has(r)) {
        issues.push(`${pid}: role "${r}" is inert (no motion ≥ ${MOTION_FLOOR}u, no ball interaction, no hold)`);
      }
    }

    // === Rule K — defender-motivation tied to concept_steps ===
    // For each concept_step action that implies a tactical decision, require geometry that
    // justifies it. Runs at setup positions (a sufficient heuristic — play layouts are
    // authored so the concept is visible from frame 0). Skips plays without concept_steps.
    // Actions checked:
    //   passes_to / crosses_to — opponent within 4.5u of pass lane OR within 6u of actor's
    //                            back shoulder (pressure is the reason to pass)
    //   runs_behind / runs_into_space / runs_far_post / runs_near_post / runs_channel —
    //                            opponent exists that the run beats (runner ends > 4u ahead
    //                            of that opponent in attack direction)
    //   drops_back             — opponent within 6u of actor's forward path (closing down
    //                            from behind is why the actor drops)
    //   carries_forward / drives_inside — actor has ≥ 8u of forward space to nearest opponent
    if (Array.isArray(play.concept_steps)) {
      // Per-actor forward direction. Raw coords: attackers (whoever they are) attack toward
      // x=0; defenders' forward (if they won the ball) is toward x=100. A-series plays get
      // x-flipped at render via _plTransformPlay, so this is purely a raw-data convention.
      const forwardDirFor = (actor) => attackerRoles.has(actor) ? -1 : 1;
      const MOT_LANE_PERP = 4.5;
      const MOT_BACK_DIST = 6.0;
      const MOT_CLOSING_FWD = 6.0;
      const MOT_CARRY_CLEAR = 8.0;
      const MOT_RUN_BEATEN_MARGIN = 4.0;

      // Final-position lookup for an actor (walks all steps).
      const finalPosOf = (actor) => {
        if (!setup[actor]) return null;
        let fp = { x: setup[actor].x, y: setup[actor].y };
        const walk = (steps) => {
          for (const s of steps || []) {
            if (!s || typeof s !== 'object') continue;
            if (Array.isArray(s.par)) { walk(s.par); continue; }
            if (s.role === actor) {
              if (s.toX !== undefined && s.toY !== undefined) fp = { x: s.toX, y: s.toY };
              else if (Array.isArray(s.waypoints) && s.waypoints.length) {
                const last = s.waypoints[s.waypoints.length - 1];
                fp = { x: last.x, y: last.y };
              }
            }
          }
        };
        walk((play.prePlay || []).concat(play.payoff || []));
        return fp;
      };

      for (const cs of play.concept_steps) {
        const actor = cs.actor;
        if (!setup[actor]) continue;
        const aPos = setup[actor];
        const actorIsAttacker = attackerRoles.has(actor);
        const oppRoles = actorIsAttacker ? defenderRoles : attackerRoles;
        const forwardDir = forwardDirFor(actor);

        // passes_to: tactical reason to release the ball (pressure). Not crosses_to —
        // a cross is motivated by runners arriving in the box, which the runs_* audits
        // cover structurally.
        if (cs.action === 'passes_to' && cs.target && setup[cs.target]) {
          const tPos = setup[cs.target];
          const dx = tPos.x - aPos.x, dy = tPos.y - aPos.y;
          const len = Math.hypot(dx, dy);
          let justified = false;
          for (const opp of oppRoles) {
            const oPos = setup[opp];
            if (!oPos) continue;
            if (len > 0) {
              const t = ((oPos.x - aPos.x) * dx + (oPos.y - aPos.y) * dy) / (len * len);
              const perp = Math.abs((oPos.x - aPos.x) * dy - (oPos.y - aPos.y) * dx) / len;
              if (t > -0.1 && t < 1.1 && perp < MOT_LANE_PERP) { justified = true; break; }
            }
            // Back shoulder: opponent in the anti-forward direction within 6u.
            const backward = (oPos.x - aPos.x) * forwardDir < 0;
            if (backward && Math.hypot(oPos.x - aPos.x, oPos.y - aPos.y) < MOT_BACK_DIST) {
              justified = true; break;
            }
          }
          if (!justified) {
            issues.push(`${pid}: MOTIVATION — concept_step "${actor} passes_to ${cs.target}" has no opponent within ${MOT_LANE_PERP}u of pass lane or ${MOT_BACK_DIST}u of ${actor}'s back shoulder. Add pressure or reconsider the action.`);
          }
        } else if (cs.action === 'runs_behind' || cs.action === 'runs_into_space' ||
                   cs.action === 'runs_far_post' || cs.action === 'runs_near_post' ||
                   cs.action === 'runs_channel') {
          const fp = finalPosOf(actor);
          if (!fp) continue;
          let justified = false;
          for (const opp of oppRoles) {
            const oPos = setup[opp];
            if (!oPos) continue;
            const beatenBy = (fp.x - oPos.x) * forwardDir;
            if (beatenBy > MOT_RUN_BEATEN_MARGIN) { justified = true; break; }
          }
          if (!justified) {
            issues.push(`${pid}: MOTIVATION — concept_step "${actor} ${cs.action}" has no opponent that the run beats (finalPos should end > ${MOT_RUN_BEATEN_MARGIN}u past some defender in attack direction).`);
          }
        } else if (cs.action === 'drops_back') {
          let justified = false;
          for (const opp of oppRoles) {
            const oPos = setup[opp];
            if (!oPos) continue;
            const fwd = (oPos.x - aPos.x) * forwardDir;
            if (fwd > 0 && fwd < MOT_CLOSING_FWD && Math.abs(oPos.y - aPos.y) < 10) { justified = true; break; }
          }
          if (!justified) {
            issues.push(`${pid}: MOTIVATION — concept_step "${actor} drops_back" has no opponent within ${MOT_CLOSING_FWD}u of forward path (no one closing down).`);
          }
        } else if (cs.action === 'carries_forward' || cs.action === 'drives_inside' || cs.action === 'carries_wide') {
          let nearestFwd = Infinity;
          for (const opp of oppRoles) {
            const oPos = setup[opp];
            if (!oPos) continue;
            const fwd = (oPos.x - aPos.x) * forwardDir;
            if (fwd > 0 && Math.abs(oPos.y - aPos.y) < 8) nearestFwd = Math.min(nearestFwd, fwd);
          }
          if (nearestFwd < MOT_CARRY_CLEAR) {
            issues.push(`${pid}: MOTIVATION — concept_step "${actor} ${cs.action}" has opponent within ${nearestFwd.toFixed(1)}u forward (need ≥ ${MOT_CARRY_CLEAR}u clear). Reposition or change the action.`);
          }
        }
      }
    }
  }

  if (issues.length) console.warn(`Play audit issues (${issues.length}):\n  ` + issues.join('\n  '));
  else console.log('Play audit clean.');
}

// ============================================================
// BOOT
// ============================================================
auditScenarios();
auditPlays();
initEditor();
addGearButton();
addPlayLibraryButton();
renderStart();
</script>

<script>
// Landscape lock for PWA / Add to Home Screen on mobile & tablet
(function() {
  function lockLandscape() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function() {});
    }
  }
  // Try on load and on any orientation change
  lockLandscape();
  window.addEventListener('orientationchange', lockLandscape);

})();
</script>
