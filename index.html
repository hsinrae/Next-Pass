      const ring = el('circle', { cx, cy, r:'5.8', fill:'rgba(255,255,255,0.06)', stroke: c.correct ? '#1f7a3a' : '#1f5e2e', 'stroke-width':'0.55', 'stroke-dasharray':'1.6 1.2' });
      g.appendChild(ring);
    }
    const fill = c.correct ? '#1f7a3a' : 'rgba(255,255,255,0.85)';
    const stroke = c.correct ? 'white' : '#1f5e2e';
    const textFill = c.correct ? 'white' : '#1f5e2e';
    const badge = el('circle', { cx, cy, r:'2.5', fill, stroke, 'stroke-width':'0.45' });
    const num = el('text', { x:cx, y:cy, 'font-size':'2.4', 'font-weight':'800', 'text-anchor':'middle', 'dominant-baseline':'central', fill:textFill, 'pointer-events':'none' });
    num.textContent = String(c.num);
    g.appendChild(badge);
    g.appendChild(num);
    dyn.appendChild(g);
  });
}

function initEditorSVGEvents(svg) {
  let dragType = null, dragId = null, dragOffX = 0, dragOffY = 0;
  let dragStartX = 0, dragStartY = 0, hasDragged = false;

  svg.addEventListener('pointerdown', e => {
    if (e.button && e.button !== 0) return;
    const pt = edSvgPt(svg, e.clientX, e.clientY);
    dragStartX = pt.x; dragStartY = pt.y; hasDragged = false;

    // 1. Heading handle (check element directly)
    if (e.target.dataset && e.target.dataset.hdgHandle) {
      dragType = 'hdg'; dragId = e.target.dataset.hdgHandle;
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 2. Placed player group
    const roleEl = e.target.closest ? e.target.closest('[data-role]') : null;
    if (roleEl && roleEl.dataset.role) {
      dragType = 'placed'; dragId = roleEl.dataset.role;
      const p = ed.placed[dragId];
      if (p) { dragOffX = pt.x - p.x; dragOffY = pt.y - p.y; }
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 3. Choice marker group
    const choiceEl = e.target.closest ? e.target.closest('[data-choice]') : null;
    if (choiceEl && choiceEl.dataset.choice) {
      const cid = choiceEl.dataset.choice;
      const ch = ed.choices.find(c => c.id === cid);
      if (ch && !ch.stayStill && ch.x != null) {
        dragOffX = pt.x - ch.x; dragOffY = pt.y - ch.y;
      }
      dragType = 'choice'; dragId = cid;
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 4. Empty area — line draw or deselect
    dragType = 'line';
    svg.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  svg.addEventListener('pointermove', e => {
    if (!dragType) return;
    const pt = edSvgPt(svg, e.clientX, e.clientY);
    if (Math.hypot(pt.x - dragStartX, pt.y - dragStartY) > 1.5) hasDragged = true;

    if (dragType === 'placed') {
      const c = edClamp(pt.x - dragOffX, pt.y - dragOffY);
      ed.placed[dragId] = Object.assign({}, ed.placed[dragId], { x:c.x, y:c.y });
      renderEditorSVG();
    } else if (dragType === 'choice') {
      const ch = ed.choices.find(c => c.id === dragId);
      if (ch && !ch.stayStill) {
        const c = edClamp(pt.x - dragOffX, pt.y - dragOffY);
        ch.x = c.x; ch.y = c.y;
        renderEditorSVG();
      }
    } else if (dragType === 'hdg') {
      const p = ed.placed[dragId];
      if (p) {
        const dx = pt.x - p.x, dy = pt.y - p.y, len = Math.hypot(dx,dy)||1;
        ed.placed[dragId] = Object.assign({}, p, { heading:{ x:dx/len, y:dy/len } });
        renderEditorSVG();
      }
    } else if (dragType === 'line' && hasDragged) {
      // Draw preview line
      let pl = document.getElementById('ed-preview-line');
      if (!pl) {
        pl = document.createElementNS('http://www.w3.org/2000/svg','line');
        pl.id = 'ed-preview-line'; pl.setAttribute('pointer-events','none');
        svg.appendChild(pl);
      }
      const c = ed.lineTool ? '#f5c400' : 'rgba(255,255,255,0.55)';
      pl.setAttribute('x1',dragStartX); pl.setAttribute('y1',dragStartY);
      pl.setAttribute('x2',pt.x); pl.setAttribute('y2',pt.y);
      pl.setAttribute('stroke',c); pl.setAttribute('stroke-width','0.65');
      pl.setAttribute('stroke-dasharray','1.5 1.5'); pl.setAttribute('stroke-linecap','round');
    }
  });

  svg.addEventListener('pointerup', e => {
    if (!dragType) return;
    const pt = edSvgPt(svg, e.clientX, e.clientY);

    if (dragType === 'choice' && !hasDragged) {
      // Cycle: default → correct → stayStill → remove
      const ch = ed.choices.find(c => c.id === dragId);
      if (ch) {
        if (!ch.correct && !ch.stayStill) {
          ed.choices.forEach(c => c.correct = false); ch.correct = true;
        } else if (ch.correct) {
          ch.correct = false; ch.stayStill = true;
        } else {
          ch.stayStill = false; ch.x = null; ch.y = null;
        }
      }
    } else if (dragType === 'line') {
      const pl = document.getElementById('ed-preview-line');
      if (pl) pl.remove();
      if (hasDragged && ed.lineTool) {
        ed.lines.push({ type:ed.lineTool, x1:dragStartX, y1:dragStartY, x2:pt.x, y2:pt.y });
      }
    }

    try { svg.releasePointerCapture(e.pointerId); } catch(e){}
    dragType = null; dragId = null; hasDragged = false;
    renderEditorSVG();
  });

  // Right-click on placed ball or player → remove from field
  svg.addEventListener('contextmenu', e => {
    e.preventDefault();
    const roleEl = e.target.closest ? e.target.closest('[data-role]') : null;
    if (roleEl && roleEl.dataset.role) {
      delete ed.placed[roleEl.dataset.role];
      renderEditorSVG();
    }
  });
}

function initEdDragFromPalette() {
  const overlay = document.getElementById('ed-overlay');
  if (!overlay) return;

  function makeDraggable(tok, onDrop) {
    tok.style.touchAction = 'none';
    tok.addEventListener('pointerdown', e => {
      if (e.button && e.button !== 0) return;
      const ghost = document.createElement('div');
      ghost.textContent = tok.textContent;
      ghost.style.cssText = `position:fixed;width:42px;height:42px;border-radius:50%;background:${tok.style.background||'rgba(255,255,255,0.88)'};color:${tok.classList.contains('ed-choice-tok')?'#1f5e2e':'white'};font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10000;opacity:0.88;transform:translate(-50%,-50%);left:${e.clientX}px;top:${e.clientY}px;border:2px solid rgba(0,0,0,0.2);box-shadow:0 4px 16px rgba(0,0,0,0.5);`;
      document.body.appendChild(ghost);
      function onMove(ev) { ghost.style.left=ev.clientX+'px'; ghost.style.top=ev.clientY+'px'; }
      function onUp(ev) {
        ghost.remove();
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        const svg = document.getElementById('ed-svg');
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        if (ev.clientX >= rect.left && ev.clientX <= rect.right && ev.clientY >= rect.top && ev.clientY <= rect.bottom) {
          const pt = edSvgPt(svg, ev.clientX, ev.clientY);
          onDrop(edClamp(pt.x, pt.y));
        }
      }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      e.preventDefault();
    });
  }

  overlay.querySelectorAll('[data-pal-role]').forEach(tok => {
    makeDraggable(tok, ({x, y}) => {
      const role = tok.dataset.palRole;
      const existing = ed.placed[role] || {};
      ed.placed[role] = Object.assign({}, existing, { x, y });
      // Default heading: rightward for all except you/gk roles
      if (!ed.placed[role].heading && role !== 'you' && !role.startsWith('gk')) {
        ed.placed[role].heading = { x:1, y:0 };
      }
      renderEditorSVG();
    });
  });

  overlay.querySelectorAll('[data-pal-choice]').forEach(tok => {
    makeDraggable(tok, ({x, y}) => {
      const ch = ed.choices.find(c => c.id === tok.dataset.palChoice);
      if (ch) { ch.x = x; ch.y = y; ch.stayStill = false; renderEditorSVG(); }
    });
  });

  // Ball token — drag to field to set explicit ball position
  const ballTok = overlay.querySelector('[data-pal-ball]');
  if (ballTok) {
    makeDraggable(ballTok, ({x, y}) => {
      ed.placed['ball'] = { x, y };
      renderEditorSVG();
    });
  }
}

function edLoadScenario(scenarioId) {
  const s = SCENARIOS.find(sc => sc.id === scenarioId);
  if (!s) return;
  ed.placed = {}; ed.lines = []; ed.choices = ED_CHOICES_DEF();
  s.players.forEach(p => {
    const role = PID_TO_ROLE_ED[p.id];
    if (!role) return;
    ed.placed[role] = { x:p.x, y:p.y };
    if (p.heading) ed.placed[role].heading = { x:p.heading.x, y:p.heading.y };
  });
  s.choices.forEach(c => {
    const ec = ed.choices.find(ec => ec.id === c.id);
    if (!ec) return;
    ec.x = c.x; ec.y = c.y; ec.correct = !!c.correct; ec.stayStill = !!c.stayStill;
  });
  // Populate text fields
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('ed-id', s.id);
  set('ed-question', s.question);
  s.choices.forEach(c => set(`ed-exp-${c.id}`, c.explanation || ''));
  renderEditorSVG();
}

function edLoadFromJSON(jsonStr) {
  try {
    const t = JSON.parse(jsonStr);
    ed.placed = {}; ed.lines = []; ed.choices = ED_CHOICES_DEF();
    if (t.roles) {
      Object.entries(t.roles).forEach(([role, pos]) => {
        if (pos && pos.x != null) {
          ed.placed[role] = { x:pos.x, y:pos.y };
          if (!role.startsWith('gk') && role !== 'you') ed.placed[role].heading = { x:1, y:0 };
        }
      });
    }
    if (t.choices) {
      t.choices.forEach(c => {
        const ec = ed.choices.find(ec => ec.id === c.id);
        if (!ec) return;
        if (c.stayStill) { ec.stayStill = true; const you = ed.placed['you']; if (you) { ec.x = you.x; ec.y = you.y; } }
        else if (c.target) { ec.x = c.target.x; ec.y = c.target.y; }
        ec.correct = !!c.correct;
      });
    }
    renderEditorSVG();
    return true;
  } catch(err) { alert('Invalid JSON: ' + err.message); return false; }
}

function edReadFields() {
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  return {
    id:       g('ed-id') || 'NEW-01',
    question: g('ed-question'),
    exp1:     g('ed-exp-1'),
    exp2:     g('ed-exp-2'),
    exp3:     g('ed-exp-3'),
  };
}

function edBuildTemplate(fields, placed, choices, concept) {
  const roles = {};
  // Determine explicit ball carrier from placed ball position (nearest player)
  let ballCarrier = null;
  if (placed['ball']) {
    const bx = placed['ball'].x, by = placed['ball'].y;
    let minDist = Infinity;
    Object.entries(placed).forEach(([role, p]) => {
      if (role === 'ball') return;
      const d = Math.hypot(p.x - bx, p.y - by);
      if (d < minDist) { minDist = d; ballCarrier = role; }
    });
  }
  // Build roles (exclude the virtual ball entry; include T3/D4 as extra players)
  Object.entries(placed).forEach(([role, p]) => {
    if (role === 'ball') return;
    roles[role] = { x: Math.round(p.x*10)/10, y: Math.round(p.y*10)/10 };
    if (p.heading) roles[role].heading = { x: Math.round(p.heading.x*100)/100, y: Math.round(p.heading.y*100)/100 };
  });
  const exps = { '1': fields.exp1||'', '2': fields.exp2||'', '3': fields.exp3||'' };
  const builtChoices = choices.filter(c => c.x != null || c.stayStill).map(c => {
    const obj = { id:c.id, correct:c.correct };
    if (c.stayStill) { obj.stayStill = true; }
    else { obj.target = { x: Math.round(c.x*10)/10, y: Math.round(c.y*10)/10 }; }
    obj.explanation = exps[c.id] || '';
    return obj;
  });
  const conceptInfo = concept ? ED_CONCEPTS.find(c => c.key === concept) : null;
  const out = {
    id: fields.id,
    category: 'get_open',
    difficulty: 'Easy',
    concept: conceptInfo ? conceptInfo.label.replace(' (exists)','') : '',
    question: fields.question,
    roles,
    choices: builtChoices
  };
  if (ballCarrier) out.ball_carrier = ballCarrier;
  return out;
}

function generateEditorJSON() {
  return JSON.stringify(edBuildTemplate(edReadFields(), ed.placed, ed.choices, ed.concept), null, 2);
}

function edSaveDraft() {
  const fields = edReadFields();
  const draft = {
    id: fields.id,
    concept: ed.concept,
    question: fields.question,
    explanations: { '1': fields.exp1, '2': fields.exp2, '3': fields.exp3 },
    placed: JSON.parse(JSON.stringify(ed.placed)),
    choices: ed.choices.map(c => Object.assign({}, c)),
    lines: ed.lines.slice()
  };
  const idx = ed.drafts.findIndex(d => d.id === draft.id);
  if (idx >= 0) ed.drafts[idx] = draft; else ed.drafts.push(draft);
  renderDraftsList();
  refreshLoadDropdown();
  const btn = document.getElementById('ed-save-btn');
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save Draft'; }, 1400); }
}

function edLoadDraft(draftId) {
  const draft = ed.drafts.find(d => d.id === draftId);
  if (!draft) return;
  ed.placed = JSON.parse(JSON.stringify(draft.placed));
  ed.choices = draft.choices.map(c => Object.assign({}, c));
  ed.lines = draft.lines.slice();
  ed.concept = draft.concept || null;
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('ed-id', draft.id);
  set('ed-question', draft.question);
  set('ed-exp-1', (draft.explanations||{})['1']);
  set('ed-exp-2', (draft.explanations||{})['2']);
  set('ed-exp-3', (draft.explanations||{})['3']);
  const cSel = document.getElementById('ed-concept-sel');
  if (cSel) cSel.value = draft.concept || '';
  const info = draft.concept ? ED_CONCEPTS.find(c => c.key === draft.concept) : null;
  const desc = document.getElementById('ed-concept-desc');
  if (desc) desc.textContent = info ? info.desc : 'Pick a concept above to see what to design.';
  renderEditorSVG();
}

function renderDraftsList() {
  const list = document.getElementById('ed-drafts-list');
  if (!list) return;
  if (!ed.drafts.length) {
    list.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.28);padding:4px 0">No drafts saved yet.</div>';
    return;
  }
  list.innerHTML = ed.drafts.map((d, i) => {
    const label = d.concept ? ((ED_CONCEPTS.find(c=>c.key===d.concept)||{label:d.concept}).label.split(' (')[0]) : 'Draft';
    return `<div style="display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06)">

function edExportAllDrafts() {
  if (!ed.drafts.length) return '// No drafts saved.';
  const templates = ed.drafts.map(d => {
    const fields = { id: d.id, question: d.question||'', exp1: (d.explanations||{})['1']||'', exp2: (d.explanations||{})['2']||'', exp3: (d.explanations||{})['3']||'' };
    return edBuildTemplate(fields, d.placed, d.choices, d.concept);
  });
  return JSON.stringify(templates, null, 2);
}

function refreshLoadDropdown() {
  const sel = document.getElementById('ed-load-sel');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '';
  const add = (val, text, disabled) => {
    const o = document.createElement('option');
    o.value = val; o.textContent = text; if (disabled) o.disabled = true;
    sel.appendChild(o);
  };
  add('', '── Game Scenarios ──', true);
  SCENARIOS.forEach(s => add(s.id, `${s.id} — ${s.concept}`));
  if (ed.drafts.length) {
    add('', '── My Drafts ──', true);
    ed.drafts.forEach(d => {
      const label = d.concept ? (ED_CONCEPTS.find(c=>c.key===d.concept)||{label:d.concept}).label.split(' (')[0] : 'Draft';
      add(`draft:${d.id}`, `${d.id} — ${label}`);
    });
  }
  if (prev) { const m = sel.querySelector(`option[value="${CSS.escape(prev)}"]`); if (m) sel.value = prev; }
}

          <textarea class="ed-textarea" id="ed-json-out" readonly placeholder="JSON will appear here..."></textarea>
          <button class="ed-btn" id="ed-copy-btn">Copy to Clipboard</button>
          <div class="ed-workflow-hint">Copy → paste into chat. I'll add any missing commentary and wire into the game.</div>
        </div>
        <div>
          <button class="ed-btn ed-btn-danger" id="ed-clear-btn">Clear Field</button>
        </div>
      </div>
      <div class="ed-field-wrap">
        <svg id="ed-svg" class="ed-svg" viewBox="-10 -6 120 72" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect x="-10" y="-6" width="120" height="72" fill="#2a7a48"/>
          <rect x="0" y="0" width="100" height="60" fill="#3ba563"/>
          ${stripes}
          <g stroke="rgba(255,255,255,0.95)" stroke-width="0.5" fill="none">
            <rect x="0" y="0" width="100" height="60"/>
            <line x1="50" y1="0" x2="50" y2="60"/>
            <circle cx="50" cy="30" r="9"/>
            <rect x="0" y="12" width="16.5" height="36"/>
            <rect x="83.5" y="12" width="16.5" height="36"/>
            <rect x="0" y="22" width="5.5" height="16"/>
            <rect x="94.5" y="22" width="5.5" height="16"/>
            <path d="M 16.5 26.5 A 6 6 0 0 1 16.5 33.5"/>
            <path d="M 83.5 26.5 A 6 6 0 0 0 83.5 33.5"/>
            <path d="M 0 1 A 1 1 0 0 0 1 0"/>
            <path d="M 0 59 A 1 1 0 0 1 1 60"/>
            <path d="M 100 1 A 1 1 0 0 1 99 0"/>
            <path d="M 100 59 A 1 1 0 0 0 99 60"/>
          </g>
          <g fill="rgba(255,255,255,0.95)">
            <circle cx="50" cy="30" r="0.6"/>
            <circle cx="11" cy="30" r="0.5"/>
            <circle cx="89" cy="30" r="0.5"/>
          </g>
          <g stroke="rgba(255,255,255,0.95)" stroke-width="0.5">
            <rect x="-2" y="25" width="2" height="10" fill="rgba(255,255,255,0.14)"/>
            <rect x="100" y="25" width="2" height="10" fill="rgba(255,255,255,0.14)"/>
          </g>
          <g id="ed-dyn"></g>
        </svg>
        <div class="ed-field-hint">Drag player and choice tokens onto the field. Drag the white arrow handle to set direction. Use Pass / Score tools to draw lines.</div>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('ed-close').addEventListener('click', closeEditor);

  document.getElementById('ed-concept-sel').addEventListener('change', function() {
    ed.concept = this.value || null;
    const info = ed.concept ? ED_CONCEPTS.find(c => c.key === ed.concept) : null;
    const desc = document.getElementById('ed-concept-desc');
    if (desc) desc.textContent = info ? info.desc : 'Pick a concept above to see what to design.';
  });

  document.getElementById('ed-save-btn').addEventListener('click', edSaveDraft);

  document.getElementById('ed-export-all-btn').addEventListener('click', () => {
    document.getElementById('ed-json-out').value = edExportAllDrafts();
  });

  document.getElementById('ed-load-btn').addEventListener('click', () => {
    const v = document.getElementById('ed-load-sel').value;
    if (!v) return;
    if (v.startsWith('draft:')) edLoadDraft(v.replace('draft:', ''));
    else edLoadScenario(v);
  });
  document.getElementById('ed-json-load-btn').addEventListener('click', () => {
    const txt = document.getElementById('ed-json-in').value.trim();
    if (txt) edLoadFromJSON(txt);
  });
  document.getElementById('ed-gen-btn').addEventListener('click', () => {
    document.getElementById('ed-json-out').value = generateEditorJSON();
  });
  document.getElementById('ed-copy-btn').addEventListener('click', () => {
    const txt = document.getElementById('ed-json-out').value;
    if (!txt) return;
    navigator.clipboard.writeText(txt).then(() => {}).catch(() => {
      try { document.getElementById('ed-json-out').select(); document.execCommand('copy'); } catch(e){}
    });
  });
  document.getElementById('ed-clear-btn').addEventListener('click', () => {
    ed.placed = {}; ed.lines = []; ed.choices = ED_CHOICES_DEF();
    renderEditorSVG();
  });

  let lineTool = null;
  function updateToolUI() {
    const status = document.getElementById('ed-tool-status');
    document.getElementById('ed-pass-tool').classList.toggle('active', lineTool === 'pass');
    document.getElementById('ed-score-tool').classList.toggle('active', lineTool === 'score');
    ed.lineTool = lineTool;
    if (!lineTool) { if (status) { status.textContent = 'No tool — drag on field to draw'; status.style.color = 'rgba(255,255,255,0.35)'; } }
    else { if (status) { status.textContent = (lineTool === 'pass' ? 'Pass' : 'Score') + ' line active — drag on field'; status.style.color = lineTool === 'score' ? '#f5c400' : 'rgba(255,255,255,0.8)'; } }
  }
  document.getElementById('ed-pass-tool').addEventListener('click', () => { lineTool = lineTool === 'pass' ? null : 'pass'; updateToolUI(); });
  document.getElementById('ed-score-tool').addEventListener('click', () => { lineTool = lineTool === 'score' ? null : 'score'; updateToolUI(); });
  document.getElementById('ed-line-clear').addEventListener('click', () => { ed.lines = []; renderEditorSVG(); });

  refreshLoadDropdown();
  initEditorSVGEvents(document.getElementById('ed-svg'));
  setTimeout(initEdDragFromPalette, 0);
}
ed.lineTool = null;  // initialized before initEditor runs

function addGearButton() {
  const btn = document.createElement('button');
  btn.id = 'gear-btn'; btn.className = 'gear-btn';
  btn.setAttribute('aria-label', 'Open Scenario Designer');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
  btn.addEventListener('click', openEditor);
  document.body.appendChild(btn);
}

// ============================================================
// SCENARIO AUDIT (runs once at boot)
// ============================================================
function auditScenarios() {
  const issues = [];
  SCENARIOS.forEach(s => {
    const you = s.players.find(p => p.id === "you");
    const teammates = s.players.filter(p => p.team === "home" && !p.goalie && p.id !== "you");
    const opponents = s.players.filter(p => p.team === "away" && !p.goalie);
    const goalies = s.players.filter(p => p.goalie);
    const ball = s.players.find(p => p.hasBall);
    const attackDir = (s.attackDir === "left") ? -1 : 1;

    if (s.players.length < 3 || s.players.length > 14) issues.push(`${s.id}: player count ${s.players.length} (expected 3-14)`);
    if (teammates.length < 1) issues.push(`${s.id}: no home teammates`);
    if (opponents.length < 1) issues.push(`${s.id}: no opponents`);
    if (goalies.length > 2) issues.push(`${s.id}: goalie count ${goalies.length} (expected 0-2)`);
    if (!you) issues.push(`${s.id}: missing YOU`);
    if (!ball) issues.push(`${s.id}: no ball carrier`);
    if (ball && !ball.heading && !s.no_headings) issues.push(`${s.id}: ball carrier ${ball.id} has no heading`);
    if (ball && ball.heading && ball.heading.x * attackDir < 0) {
      issues.push(`${s.id}: ball carrier ${ball.id} heading points toward own goal (x=${ball.heading.x})`);
    }
    if (s.choices.length !== 3) issues.push(`${s.id}: choice count ${s.choices.length} (expected 3)`);
    const correct = s.choices.filter(c => c.correct).length;
    if (correct !== 1) issues.push(`${s.id}: correct choices ${correct} (expected 1)`);

    // outcome.by / outcome.teammate / followUp.to must resolve to real player ids.
    const pids = new Set(s.players.map(p => p.id));
    s.choices.forEach(c => {
      if (c.outcome && c.outcome.by) {
        const refs = Array.isArray(c.outcome.by) ? c.outcome.by : [c.outcome.by];
        refs.forEach(pid => {
          if (!pids.has(pid)) issues.push(`${s.id}: choice ${c.id} outcome.by '${pid}' is not a player id`);
        });
      }
      if (c.outcome && c.outcome.teammate && !pids.has(c.outcome.teammate)) {
        issues.push(`${s.id}: choice ${c.id} outcome.teammate '${c.outcome.teammate}' is not a player id`);
      }
      if (c.followUp) {
        const fuSteps = Array.isArray(c.followUp) ? c.followUp : [c.followUp];
        fuSteps.forEach((step, si) => {
          if (step.to && !pids.has(step.to)) {
            issues.push(`${s.id}: choice ${c.id} followUp[${si}].to '${step.to}' is not a player id`);
          }
        });
      }
      // stayStill choice should sit at YOU's position (renderer rings YOU).
      if (c.stayStill && you && (c.x !== you.x || c.y !== you.y)) {
        issues.push(`${s.id}: stayStill choice ${c.id} pos (${c.x},${c.y}) does not match YOU (${you.x},${you.y})`);
      }
    });
  });
  if (issues.length) console.warn("Scenario audit issues:\n  " + issues.join("\n  "));
  else console.log("Scenario audit clean.");
}

// ============================================================
// BOOT
// ============================================================
auditScenarios();
initEditor();
addGearButton();
renderStart();
</script>

<script>
// Landscape lock for PWA / Add to Home Screen on mobile & tablet
(function() {
  function lockLandscape() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function() {});
    }
  }
  // Try on load and on any orientation change
  lockLandscape();
  window.addEventListener('orientationchange', lockLandscape);

  // Portrait overlay: show a nudge if user is in portrait on a small screen
  function checkOrientation() {
    var isPortrait = window.innerHeight > window.innerWidth;
    var isMobile = Math.min(screen.width, screen.height) < 900;
    var overlay = document.getElementById('np-portrait-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'np-portrait-overlay';
      overlay.style.cssText = [
        'display:none',
        'position:fixed',
        'inset:0',
        'background:rgba(13,13,13,0.92)',
        'color:#fff',
        'font-family:system-ui,sans-serif',
        'font-size:1.2rem',
        'font-weight:600',
        'text-align:center',
        'align-items:center',
        'justify-content:center',
        'flex-direction:column',
        'gap:1rem',
        'z-index:99999',
        'padding:2rem'
      ].join(';');
      overlay.innerHTML = '<div style="font-size:3rem">&#8635;</div><div>Rotate your device to landscape to play Next Pass</div>';
      document.body.appendChild(overlay);
    }
    overlay.style.display = (isPortrait && isMobile) ? 'flex' : 'none';
  }
  checkOrientation();
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', checkOrientation);
})();
</script>
