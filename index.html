// Arrow renderer with truncation against other player circles.
// Shaft is shortened to just before the nearest player circle it would cross.
// If the remaining shaft is shorter than the arrowhead, hide the arrow entirely.
function svgArrow(p, s) {
  let h = p.heading;
  // Engine rule: ball carrier's heading cannot point toward own goal.
  // For attacking right (+x), clamp hx to at least a small positive value.
  if (p.hasBall) {
    const attackDir = (s && s.attackDir === "left") ? -1 : 1;
    if (h.x * attackDir < 0.05) {
      h = { x: 0.25 * attackDir, y: h.y };
    }
  }
  const hlen = Math.hypot(h.x, h.y) || 1;
  const ux = h.x / hlen, uy = h.y / hlen;
  const playerR = 2.8;
  const startOffset = playerR + 0.4;     // just outside player circle
  const intendedLen = 4.6;
  const headSize = 1.4;
  const minShaft = 0.3;
  const margin = 0.5;                    // gap between arrow tip and obstacle

  const sx = p.x + ux * startOffset;
  const sy = p.y + uy * startOffset;

  // Find nearest intersection along the ray to any OTHER player's circle.
  let maxLen = intendedLen;
  let suppress = false;
  if (s && s.players) {
    for (const o of s.players) {
      if (o.id === p.id) continue;
      const dx = sx - o.x, dy = sy - o.y;
      const dotU = dx * ux + dy * uy;
      const lenD2 = dx * dx + dy * dy;
      const disc = dotU * dotU - (lenD2 - playerR * playerR);
      if (disc < 0) continue;
      const sqd = Math.sqrt(disc);
      const tEnter = -dotU - sqd;
      const tExit  = -dotU + sqd;
      if (tEnter <= 0 && tExit > 0) { suppress = true; break; } // start already inside another circle
      if (tEnter > 0 && tEnter < maxLen + margin) {
        maxLen = Math.min(maxLen, tEnter - margin);
      }
    }
  }
  if (suppress) return "";
  if (maxLen < minShaft + headSize) return ""; // too crowded, suppress

  const shaftLen = maxLen;
  const ex = sx + ux * shaftLen;
  const ey = sy + uy * shaftLen;
  const perpX = -uy, perpY = ux;
  const bx1 = ex - ux * headSize + perpX * (headSize * 0.55);
  const by1 = ey - uy * headSize + perpY * (headSize * 0.55);
  const bx2 = ex - ux * headSize - perpX * (headSize * 0.55);
  const by2 = ey - uy * headSize - perpY * (headSize * 0.55);
  return `<g class="arrow-group">
            <line class="arrow-shaft" x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" />
            <polygon class="arrow-head" points="${ex},${ey} ${bx1},${by1} ${bx2},${by2}" />
          </g>`;
}

// Nudge a non-stay choice position away from any player whose circle would
// overlap the choice marker by more than 50%.
// minDist = playerR(2.8) + choiceR(3.4)*0.5 = 4.5
function nudgeChoicePos(pos, players) {
  const minDist = 4.5;
  let x = pos.x, y = pos.y;
  for (let pass = 0; pass < 4; pass++) {
    let moved = false;
    for (const p of players) {
      const dx = x - p.x;
      const dy = y - p.y;
      const d = Math.hypot(dx, dy);
      if (d < minDist) {
        if (d < 0.01) { y -= minDist; } // directly on top — push up
        else { const sc = minDist / d; x = p.x + dx * sc; y = p.y + dy * sc; }
        moved = true;
      }
    }
    if (!moved) break;
  }
  x = Math.max(5, Math.min(95, x));
  y = Math.max(5, Math.min(55, y));
  return { x, y };
}

// Render choices.
// stayStill choices render as a dashed ring around YOU only.
// All other choices render as normal numbered markers, nudged clear of players
// and clear of each other. For you_has_ball scenarios, labels are D/P/S.
function renderChoices(s) {
  const ringR = 5.8;
  const badgeR = 2.0;
  const choiceR = 3.4;
  const labelSize = 3.5;
  const you = s.players.find(p => p.role === "YOU");

  // D/P/S label map for you_has_ball scenarios.
  const DPS_LABEL = { dribble: "D", pass: "P", shoot: "S" };

  // Phase 1: compute positions for all non-stayStill choices, nudging each
  // away from players. Collect into array so we can run inter-choice spacing.
  const positions = [];
  s.choices.forEach((c, i) => {
    if (c.kind !== "position" || c.stayStill === true) {
      positions.push(null);
    } else {
      positions.push(nudgeChoicePos({ x: c.x, y: c.y }, s.players));
    }
  });

  // Phase 2: push non-null positions apart from each other.
  // minDist = 2 * choiceR + small margin
  const minChoiceDist = choiceR * 2 + 1.5;
  for (let pass = 0; pass < 6; pass++) {
    let moved = false;
    for (let a = 0; a < positions.length; a++) {
      if (!positions[a]) continue;
      for (let b = a + 1; b < positions.length; b++) {
        if (!positions[b]) continue;
        const dx = positions[b].x - positions[a].x;
        const dy = positions[b].y - positions[a].y;
        const d = Math.hypot(dx, dy);
        if (d < minChoiceDist) {
          const push = (minChoiceDist - d) / 2 + 0.01;
          if (d < 0.01) {
            positions[a].y -= push; positions[b].y += push;
          } else {
            const nx = dx / d; const ny = dy / d;
            positions[a].x -= nx * push; positions[a].y -= ny * push;
            positions[b].x += nx * push; positions[b].y += ny * push;
          }
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
  // Clamp after inter-choice spacing.
  positions.forEach(p => {
    if (!p) return;
    p.x = Math.max(5, Math.min(95, p.x));
    p.y = Math.max(5, Math.min(55, p.y));
  });

  return s.choices.map((c, i) => {
    if (c.kind !== "position") return "";
    const num = i + 1;
    if (c.stayStill === true) {
      // Dashed ring around YOU.
      if (!you) return "";
      const bx = you.x + ringR * 0.72;
      const by = you.y - ringR * 0.72;
      return `<g class="choice around" id="choice-${c.id}" data-choice="${c.id}">
                <circle class="ring-bg" cx="${you.x}" cy="${you.y}" r="${ringR}" />
                <circle class="hit" cx="${you.x}" cy="${you.y}" r="${ringR + 0.2}" />
                <circle class="badge-bg" cx="${bx}" cy="${by}" r="${badgeR}" />
                <text x="${bx}" y="${by + 0.2}" font-size="2.4">${num}</text>
              </g>`;
    }
    const pos = positions[i];
    const label = s.you_has_ball ? (DPS_LABEL[c.choice_type] || String(num)) : String(num);
    return `<g class="choice" id="choice-${c.id}" data-choice="${c.id}" transform="translate(${pos.x} ${pos.y})">
              <circle class="ring-bg" cx="0" cy="0" r="${choiceR}" />
              <text x="0" y="0.3" font-size="${labelSize}">${label}</text>
            </g>`;
  }).join("");
}

function attachChoiceHandlers(s) {
  s.choices.forEach(c => {
    const el = document.getElementById(`choice-${c.id}`);
    if (el) el.addEventListener("click", () => onChoice(s, c.id));
  });
}

// ============================================================
// POSITIONS / LIVE STATE
// ============================================================
function initLivePos(s) {
  state.livePos = {};
  s.players.forEach(p => { state.livePos[p.id] = { x: p.x, y: p.y }; });
}
function livePosOf(id) { return state.livePos[id]; }
function writeLivePos(id, x, y) { state.livePos[id] = { x, y }; }

function setPlayerRender(pid, x, y) {
  const g = document.getElementById(`player-${pid}`);
  if (g) g.setAttribute("transform", `translate(${x} ${y})`);
}
function setBallRender(x, y) {
  const b = document.getElementById("ball");
  if (b) { b.setAttribute("x", x); b.setAttribute("y", y); }
}

// ============================================================
// ANIMATION PRIMITIVES
// ============================================================
function easeOut(t) { return 1 - Math.pow(1 - t, 2); }
function animate(duration, step, done) {
  const t0 = performance.now();
  function frame(now) {
    const t = Math.min(1, (now - t0) / duration);
    step(easeOut(t));
    if (t < 1) requestAnimationFrame(frame); else if (done) done();
  }
  requestAnimationFrame(frame);
}
function movePlayer(pid, x1, y1, x2, y2, dur, done) {
  writeLivePos(pid, x2, y2);
  animate(dur, e => setPlayerRender(pid, x1 + (x2 - x1) * e, y1 + (y2 - y1) * e), done);
}
function moveBall(x1, y1, x2, y2, dur, done) {
  animate(dur, e => setBallRender(x1 + (x2 - x1) * e, y1 + (y2 - y1) * e), done);
}
function moveBoth(pid, x1, y1, x2, y2, dur, done) {
  writeLivePos(pid, x2, y2);
  animate(dur, e => {
    const x = x1 + (x2 - x1) * e, y = y1 + (y2 - y1) * e;
    setPlayerRender(pid, x, y);
    setBallRender(x, y - 2.2);
  }, done);
}

function flashPlayer(pid, kind) {
  const g = document.getElementById(`player-${pid}`);
  if (!g) return;
  const c = g.querySelector(".main");
  if (!c) return;
  const cls = kind === "red" ? "flash-red" : kind === "orange" ? "flash-orange" : "flash-green";
  c.classList.add(cls);
  setTimeout(() => c.classList.remove(cls), 700);
}
function sceneFlashRed() {
  const r = document.getElementById("scene-flash");
  if (!r) return;
  r.setAttribute("opacity", "0");
  r.style.transition = "opacity 0.15s ease-out";
  requestAnimationFrame(() => {
    r.setAttribute("opacity", "0.22");
    setTimeout(() => r.setAttribute("opacity", "0"), 240);
  });
}
function goalFlash() {
  const fx = document.getElementById("fx-layer");
  if (!fx) return;
  fx.innerHTML = `<circle cx="100" cy="30" r="1" fill="#ffe066" opacity="1">
    <animate attributeName="r" from="1" to="18" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.5s" fill="freeze"/>
  </circle>`;
  setTimeout(() => { fx.innerHTML = ""; }, 600);
}

function markChoicePicked(choiceId, allChoices) {
  allChoices.forEach(c => {
    const el = document.getElementById(`choice-${c.id}`);
    if (!el) return;
    if (c.id === choiceId) el.classList.add("picked");
    else el.classList.add("unpicked");
  });
}
function hideChoicesLayer() {
  const l = document.getElementById("choices-layer");
  if (l) l.style.transition = "opacity 0.25s ease", l.style.opacity = "0";
}
function showChoicesLayer() {
  const l = document.getElementById("choices-layer");
  if (l) l.style.opacity = "1";
}
function hideArrows() {
  const l = document.getElementById("arrows-layer");
  if (l) l.style.opacity = "0";
}
function showArrows() {
  const l = document.getElementById("arrows-layer");
  if (l) l.style.opacity = "1";
}

function resetPositions(s) {
  s.players.forEach(p => { writeLivePos(p.id, p.x, p.y); setPlayerRender(p.id, p.x, p.y); });
  // Re-hide YOU if this scenario expects YOU to appear only after a pick.
  if (s.you_choose_position) {
    const youEl = document.getElementById("player-you");
    if (youEl) { youEl.style.opacity = "0"; youEl.style.pointerEvents = "none"; }
  }
  const passer = s.players.find(p => p.id === s.passer);
  if (passer) setBallRender(passer.x, passer.y - 2.4);
  const l = document.getElementById("choices-layer");
  if (l) {
    l.style.opacity = "1";
    s.choices.forEach(c => {
      const el = document.getElementById(`choice-${c.id}`);
      if (el) el.classList.remove("disabled", "picked", "unpicked");
    });
  }
  showArrows();
}

function setCoach(text, kind) {
  const el = document.getElementById("coach-body");
  if (!el) return;
  el.classList.remove("ok", "miss");
  if (kind) el.classList.add(kind);
  el.innerHTML = text;
}

// ============================================================
// GAMEPLAY
// ============================================================
function onChoice(s, choiceId) {
  if (state.animating || state.answered) return;
  const choice = s.choices.find(c => c.id === choiceId);
  if (!choice) return;
  stopScenarioTimer();
  const pauseBtn = document.getElementById("timer-pause-btn");
  if (pauseBtn) { pauseBtn.disabled = true; pauseBtn.style.opacity = "0.35"; }
  const passer = s.players.find(p => p.id === s.passer);
  const you = s.players.find(p => p.id === "you");
  state.animating = true;

  // Immediate click feedback on the picked choice.
  markChoicePicked(choiceId, s.choices);

  // Brief pause so the user registers the pick before motion starts.
  setTimeout(() => {
    hideArrows();

    // Resolve choice destination.
    const destX = choice.x;
    const destY = choice.y;
    const mainDur = 520;

    // ── Lesson 2: YOU has the ball — dribble, pass, or shoot ──
    if (s.you_has_ball) {
      const ctype = choice.choice_type || "dribble";
      if (choice.correct) {
        reactDefendersToward(s, destX, destY, mainDur, 0.35);
        if (ctype === "dribble") {
          driftTeammatesForward(s, mainDur, null); // both teammates run forward
          moveBoth("you", you.x, you.y, destX, destY, mainDur, () => {
            hideChoicesLayer();
            runFollowUp(s, choice, destX, destY, () => completeCorrect(s, choice));
          });
        } else if (ctype === "pass") {
          // Find the first dribble recipient so they run directly to the receive point.
          // Other teammates get the generic forward drift. This prevents a gap between
          // where the ball lands and where the dribbling player starts from.
          const _fuArr = Array.isArray(choice.followUp) ? choice.followUp : (choice.followUp ? [choice.followUp] : []);
          const _recipStep = _fuArr.find(st => st.type === "dribble" && st.by && st.by !== "you");
          const _recipId = _recipStep ? _recipStep.by : null;
          driftTeammatesForward(s, mainDur, _recipId ? [_recipId] : null);
          if (_recipId) {
            const _rp = livePosOf(_recipId);
            movePlayer(_recipId, _rp.x, _rp.y, destX, destY, mainDur, null);
          }
          moveBall(you.x, you.y - 2.4, destX, destY - 2.2, mainDur, () => {
            hideChoicesLayer();
            runFollowUp(s, choice, destX, destY, () => completeCorrect(s, choice));
          });
        } else { // shoot — aim at goal using choice target y so the ball goes where the S bubble is
          const tx = 100, ty = destY;
          reactDefendersToward(s, tx, ty, mainDur, 0.35);
          driftTeammatesForward(s, mainDur, null); // both follow up the shot
          moveBall(you.x, you.y - 2.4, tx, ty, mainDur, () => {
            hideChoicesLayer();
            goalFlash();
            playGoal();
            setTimeout(() => completeCorrect(s, choice), 520);
          });
        }
      } else {
        reactDefendersToward(s, destX, destY, mainDur, 0.35);
        driftTeammatesForward(s, mainDur, null); // teammates run regardless of wrong pick
        if (ctype === "dribble") {
          moveBoth("you", you.x, you.y, destX, destY, mainDur, () => {
            hideChoicesLayer();
            runWrongOutcomeAtArrival(s, choice, destX, destY, () => completeWrong(s, choice, choiceId));
          });
        } else if (ctype === "pass") {
          // For intercept: ball stops at the defender's projection on the pass line — they cut it mid-flight.
          // For covered/shadowed/crowded: ball goes all the way to the destination (defender was already there).
          // reactDefendersToward already ran, so livePosOf gives each defender's drifted position.
          const _pout = choice.outcome || {};
          const _pInterceptor = s.players.find(p => p.id === _pout.by);
          const _isPassIntercept = _pInterceptor && !_pInterceptor.goalie && _pout.type === "intercept";
          if (_isPassIntercept) {
            const _pilp = livePosOf(_pInterceptor.id);
            const _pdx = destX - you.x, _pdy = destY - you.y, _plen2 = _pdx*_pdx + _pdy*_pdy;
            const _pt = _plen2 > 0 ? Math.max(0.1, Math.min(0.9, ((_pilp.x-you.x)*_pdx + (_pilp.y-you.y)*_pdy) / _plen2)) : 0.5;
            const _pix = you.x + _pt*_pdx, _piy = you.y + _pt*_pdy;
            moveBall(you.x, you.y - 2.4, _pix, _piy - 2.2, mainDur, () => {
              hideChoicesLayer();
              runWrongOutcomeAtArrival(s, choice, _pix, _piy, () => completeWrong(s, choice, choiceId));
            });
          } else {
            moveBall(you.x, you.y - 2.4, destX, destY - 2.2, mainDur, () => {
              hideChoicesLayer();
              runWrongOutcomeAtArrival(s, choice, destX, destY, () => completeWrong(s, choice, choiceId));
            });
          }
        } else { // shoot — field defender blocks, or ball travels to goal (GK save)
          // reactDefendersToward already ran, so livePosOf gives each defender's drifted position.
          const _out = choice.outcome || {};
          const _blocker = s.players.find(p => p.id === _out.by);
          const _fieldBlock = _blocker && !_blocker.goalie && _out.type === "intercept";
          if (_fieldBlock) {
            // Ball goes to blocker's drifted position — they step forward to cut off the shot.
            const _blp = livePosOf(_blocker.id);
            moveBall(you.x, you.y - 2.4, _blp.x, _blp.y - 2.2, mainDur, () => {
              hideChoicesLayer();
              runWrongOutcomeAtArrival(s, choice, _blp.x, _blp.y, () => completeWrong(s, choice, choiceId));
            });
          } else {
            // GK save: ball travels toward near-goal target.
            // Move GK concurrently — stays at their x, slides to shot's y — so they arrive with the ball.
            // Skip playInterceptAt on arrival: it would snap the ball to the goal line and move it back out.
            // Instead, flash the GK and complete directly once ball lands.
            const _isGKSave = _blocker && _blocker.goalie;
            if (_isGKSave) {
              const _gklp = livePosOf(_blocker.id);
              movePlayer(_blocker.id, _gklp.x, _gklp.y, _gklp.x, destY, mainDur, null);
            }
            moveBall(you.x, you.y - 2.4, destX, destY - 2.2, mainDur, () => {
              hideChoicesLayer();
              if (_isGKSave) {
                flashPlayer(_blocker.id, 'red');
                completeWrong(s, choice, choiceId);
              } else {
                runWrongOutcomeAtArrival(s, choice, destX, destY, () => completeWrong(s, choice, choiceId));
              }
            });
          }
        }
      }
      return;
    }

    // ── Lesson 3: Attacker has ball — YOU picks a defensive position ──
    if (s.attacker_has_ball) {
      const o1 = s.players.find(p => p.id === "o1");
      // YOU moves from their starting position to the chosen defensive spot.
      movePlayer("you", you.x, you.y, destX, destY, mainDur, () => {
        hideChoicesLayer();
        if (choice.correct) {
          // Intercept: ball travels from o1 to YOU, then follow-up animation upfield.
          moveBall(o1 ? o1.x : 50, o1 ? o1.y - 2.4 : 28, destX, destY - 2.2, 380, () => {
            flashPlayer("you", "green");
            setTimeout(() => {
              runFollowUp(s, choice, destX, destY, () => completeCorrect(s, choice));
            }, 180);
          });
        } else {
          // YOU is out of position — o1 passes to the free attacker who scores.
          const receiverId = choice.outcome && choice.outcome.by;
          const receiver = receiverId ? s.players.find(p => p.id === receiverId) : null;
          if (receiver) {
            const rx = receiver.x, ry = receiver.y;
            const goalY = 30;
            moveBall(o1 ? o1.x : 50, o1 ? o1.y - 2.4 : 28, rx, ry - 2.2, 380, () => {
              // Receiver dribbles toward home goal and finishes.
              moveBoth(receiver.id, rx, ry, 12, goalY, 500, () => {
                moveBall(12, goalY - 2.2, 1, goalY, 320, () => {
                  goalFlash();
                  playGoal();
                  setTimeout(() => completeWrong(s, choice, choiceId), 520);
                });
              });
            });
          } else {
            setTimeout(() => completeWrong(s, choice, choiceId), 400);
          }
        }
      });
      return;
    }

    if (choice.correct) {
      // Parallel: YOU runs/appears, ball travels — defenders stay still.
      // Keeping defenders static during the main phase lets the kid see they
      // found open space. Full closing reaction fires in the follow-up once
      // the ball arrives, showing the urgency to act quickly.
      const ballEndX = destX;
      const ballEndY = destY;
      if (s.you_choose_position) {
        // YOU is not on the field yet — place at chosen spot instantly, then send ball.
        const youEl = document.getElementById("player-you");
        if (youEl) { youEl.setAttribute("transform", `translate(${destX} ${destY})`); youEl.style.opacity = ""; youEl.style.pointerEvents = ""; }
        writeLivePos("you", destX, destY);
        moveBall(passer.x, passer.y - 2.4, ballEndX, ballEndY - 2.2, mainDur, () => {
          hideChoicesLayer();
          runFollowUp(s, choice, destX, destY, () => completeCorrect(s, choice));
        });
      } else {
        // For scenarios with pressReaction, show a light defender step (factor 0.15)
        // so the kid can see defenders fail to track the run — key for give-and-go lessons.
        if (s.pressReaction) reactDefendersToward(s, destX, destY, mainDur, 0.15);
        moveBall(passer.x, passer.y - 2.4, ballEndX, ballEndY - 2.2, mainDur, null);
        // When YOU is the GK distributing (carrier_role:"you"), YOU stays in goal — only the ball moves.
        const _youIsGK = (s.passer === "you" && !s.you_has_ball && !s.attacker_has_ball);
        if (_youIsGK) {
          setTimeout(() => {
            hideChoicesLayer();
            runFollowUp(s, choice, destX, destY, () => completeCorrect(s, choice));
          }, mainDur);
        } else {
          movePlayer("you", you.x, you.y, destX, destY, mainDur, () => {
            // fade choices once the play arrives
            hideChoicesLayer();
            runFollowUp(s, choice, destX, destY, () => completeCorrect(s, choice));
          });
        }
      }
    } else {
      // Wrong: YOU runs/appears, ball is played, defenders react — all in parallel.
      // The specific failure mode (intercept, shadow, crowd, cover) resolves on arrival.
      reactDefendersToward(s, destX, destY, mainDur, 0.35);
      if (s.you_choose_position) {
        // Instantly place YOU, then play failure outcome when ball arrives.
        const youEl = document.getElementById("player-you");
        if (youEl) { youEl.setAttribute("transform", `translate(${destX} ${destY})`); youEl.style.opacity = ""; youEl.style.pointerEvents = ""; }
        writeLivePos("you", destX, destY);
        moveBall(passer.x, passer.y - 2.4, destX, destY - 2.2, mainDur, () => {
          hideChoicesLayer();
          runWrongOutcomeAtArrival(s, choice, destX, destY, () => completeWrong(s, choice, choiceId));
        });
      } else {
        const _youIsGK2 = (s.passer === "you" && !s.you_has_ball && !s.attacker_has_ball);
        moveBall(passer.x, passer.y - 2.4, destX, destY - 2.2, mainDur, () => {
          if (_youIsGK2) hideChoicesLayer();
          runWrongOutcomeAtArrival(s, choice, destX, destY, () => completeWrong(s, choice, choiceId));
        });
        if (!_youIsGK2) {
          movePlayer("you", you.x, you.y, destX, destY, mainDur, () => {
            hideChoicesLayer();
          });
        }
      }
    }
  }, 180);
}

function completeCorrect(s, choice) {
  state.animating = false;
  state.answered = true;
  playCorrect();
  if (starsMode()) {
    const stars = state.tries === 0 ? 3 : 1;
    state.starsPer[state.idx] = stars;
    const starsLine = "★".repeat(stars) + "☆".repeat(3 - stars);
    setCoach(`<strong>Nice read.</strong> ${choice.explanation} <span style="color:var(--gold);font-weight:700;margin-left:4px">${starsLine}</span>`, "ok");
    const sc = document.getElementById("stars-count");
    if (sc) sc.textContent = totalStars();
  } else {
    setCoach(`<strong>Nice read.</strong> ${choice.explanation}`, "ok");
  }
  document.getElementById("next").disabled = false;
}

function completeWrong(s, choice, choiceId) {
  playWrong();
  state.tries++;
  setCoach(`<strong>Not quite.</strong> ${choice.explanation}`, "miss");
  sceneFlashRed();
  setTimeout(() => {
    resetPositions(s);
    const el = document.getElementById(`choice-${choiceId}`);
    if (el) el.classList.add("disabled");
    state.animating = false;
    const nextBtn = document.getElementById("next");
    if (nextBtn) nextBtn.disabled = false;
  }, 1100);
}

// ---- Correct-answer follow-up ----
// followUp may be a single step object or an array of steps (chained).
// Each step receives the landing position (fromX, fromY) from the previous step,
// so "pass then shoot" fires the shot from the recipient's position, not YOU's.
function runFollowUp(s, choice, destX, destY, done) {
  const fu = choice.followUp;
  if (!fu) { done(); return; }
  const steps = Array.isArray(fu) ? fu : [fu];
  function execStep(i, fromX, fromY) {
    if (i >= steps.length) { done(); return; }
    const step = steps[i];
    const next = (nx, ny) => execStep(i + 1, nx, ny);
    if (step.type === "dribble") {
      let mover = step.by || "you";
      // Bug D fix: when YOU is the GK distributing (carrier_role:"you"), YOU stays
      // in goal — the dribbler is the recipient teammate, not YOU. If step.by is
      // unset, infer the recipient from the home teammate at the ball's current
      // position. This prevents YOU teleporting from the goal onto the field.
      const _youIsGK = (s.passer === "you" && !s.you_has_ball && !s.attacker_has_ball);
      if (_youIsGK && !step.by) {
        const teammates = s.players.filter(p => p.team === "home" && !p.goalie && p.id !== "you");
        let nearest = null, nearestD = Infinity;
        teammates.forEach(t => {
          const lp = livePosOf(t.id);
          const dd = Math.hypot(lp.x - fromX, lp.y - fromY);
          if (dd < nearestD) { nearestD = dd; nearest = t.id; }
        });
        if (nearest && nearestD < 5) mover = nearest;
      }
      reactDefendersToward(s, step.endX, step.endY, 550);
      // Player starts from their actual live position — not the ball's arrival point.
      // Ball starts from where it arrived (fromX, fromY). Both run concurrently, no snaps.
      const _moverLp = livePosOf(mover);
      movePlayer(mover, _moverLp.x, _moverLp.y, step.endX, step.endY, 550, () => next(step.endX, step.endY));
      moveBall(fromX, fromY - 2.2, step.endX, step.endY - 2.2, 550, null);
    } else if (step.type === "pass") {
      const target = s.players.find(p => p.id === step.to);
      reactDefendersToward(s, target.x, target.y, 520);
      moveBall(fromX, fromY - 2.2, target.x, target.y - 2.2, 520, () => {
        flashPlayer(target.id, "green");
        setTimeout(() => next(target.x, target.y), 200);
      });
    } else if (step.type === "shoot") {
      const tx = step.targetX != null ? step.targetX : 100;
      const ty = step.targetY != null ? step.targetY : 24;
      reactDefendersToward(s, fromX, fromY, 460);
      moveBall(fromX, fromY - 2.2, tx, ty, 460, () => {
        goalFlash();
        playGoal();
        setTimeout(done, 520);
      });
    } else if (step.type === "clear") {
      // Clearance: ball flies out of play. YOU stays put. Green flash on departure.
      const endX = step.endX != null ? step.endX : fromX;
      const endY = step.endY != null ? step.endY : fromY;
      reactDefendersToward(s, endX, endY, 500);
      flashPlayer("you", "green");
      moveBall(fromX, fromY - 2.2, endX, endY - 2.2, 500, () => {
        setTimeout(done, 200);
      });
    } else { next(fromX, fromY); }
  }
  execStep(0, destX, destY);
}

// ---- Defender reactions ----
// factor: 0..1 multiplier on step size. Main-phase calls use ~0.35 so the
// pass lane stays readable. Follow-up uses 1.0 for the full closing reaction.
// Drift home-team field players forward during DPS animations so the field looks alive.
// exclude: array of player IDs to skip (e.g. the pass recipient, who is animated separately).
function driftTeammatesForward(s, dur, exclude) {
  const attackDir = (s.attackDir === 'left') ? -1 : 1;
  const runDist = 9;
  ['t1', 't2'].forEach(pid => {
    if (exclude && exclude.includes(pid)) return;
    const p = s.players.find(pl => pl.id === pid);
    if (!p) return;
    const lp = livePosOf(pid);
    const runX = Math.min(Math.max(lp.x + attackDir * runDist, 5), 90);
    const runY = lp.y + (30 - lp.y) * 0.12; // drift slightly toward center
    movePlayer(pid, lp.x, lp.y, runX, runY, dur * 0.85);
  });
}

function reactDefendersToward(s, endX, endY, duration, factor) {
  if (factor == null) factor = 1.0;
  const defs = s.players.filter(p => p.team === "away" && !p.goalie);
  if (!defs.length) return;
  let presser = null, pressDist = Infinity;
  defs.forEach(d => {
    const lp = livePosOf(d.id);
    const dd = Math.hypot(lp.x - endX, lp.y - endY);
    if (dd < pressDist) { pressDist = dd; presser = d; }
  });
  defs.forEach(d => {
    const lp = livePosOf(d.id);
    const vx = endX - lp.x, vy = endY - lp.y;
    const len = Math.hypot(vx, vy) || 1;
    let step;
    if (d === presser)       step = Math.min(5.0, len * 0.45);
    else if (len < 20)       step = Math.min(3.0, len * 0.28);
    else                     step = 1.2;
    step *= factor;
    const x0 = lp.x, y0 = lp.y;
    const tx = x0 + (vx / len) * step;
    const ty = y0 + (vy / len) * step;
    writeLivePos(d.id, tx, ty);
    animate(duration, e => setPlayerRender(d.id, x0 + (tx - x0) * e, y0 + (ty - y0) * e), null);
  });
}

// ---- Wrong-answer outcomes, applied once ball arrives ----
function runWrongOutcomeAtArrival(s, choice, destX, destY, done) {
  const outcome = choice.outcome || { type: "intercept" };
  switch (outcome.type) {
    case "intercept": return playInterceptAt(s, outcome, destX, destY, done);
    case "shadowed":  return playShadowedAt(s, outcome, destX, destY, done);
    case "crowded":   return playCrowdedAt(s, outcome, destX, destY, done);
    case "covered":   return playCoveredAt(s, outcome, destX, destY, done);
    default:          return playInterceptAt(s, outcome, destX, destY, done);
  }
}

function playInterceptAt(s, outcome, destX, destY, done) {
  const def = s.players.find(p => p.id === outcome.by);
  if (!def) { done(); return; }
  const lp = livePosOf(def.id);
  const tx = lp.x + (destX - lp.x) * 0.6;
  const ty = lp.y + (destY - lp.y) * 0.6;
  writeLivePos(def.id, tx, ty);
  animate(300, e => {
    const x = lp.x + (tx - lp.x) * e, y = lp.y + (ty - lp.y) * e;
    setPlayerRender(def.id, x, y);
    // Ball stays at the arrival point — defender moves to it. Never snap the ball backward.
  }, () => {
    flashPlayer(def.id, "red");
    done();
  });
}

function playShadowedAt(s, outcome, destX, destY, done) {
  const marker = s.players.find(p => p.id === outcome.by);
  if (!marker) { done(); return; }
  const lp = livePosOf(marker.id);
  const tx = destX + (lp.x - destX) * 0.35;
  const ty = destY + (lp.y - destY) * 0.35;
  writeLivePos(marker.id, tx, ty);
  animate(300, e => {
    const x = lp.x + (tx - lp.x) * e, y = lp.y + (ty - lp.y) * e;
    setPlayerRender(marker.id, x, y);
  }, () => {
    flashPlayer(marker.id, "red");
    done();
  });
}

function playCrowdedAt(s, outcome, destX, destY, done) {
  const defIds = Array.isArray(outcome.by) ? outcome.by : (outcome.by ? [outcome.by] : []);
  const defs = defIds.map(id => s.players.find(p => p.id === id)).filter(Boolean);
  if (!defs.length) { done(); return; }
  let remaining = defs.length;
  defs.forEach(def => {
    const lp = livePosOf(def.id);
    const tx = destX + (lp.x - destX) * 0.35, ty = destY + (lp.y - destY) * 0.35;
    writeLivePos(def.id, tx, ty);
    animate(300, e => setPlayerRender(def.id, lp.x + (tx - lp.x) * e, lp.y + (ty - lp.y) * e), () => {
      flashPlayer(def.id, "red");
      remaining--;
      if (remaining === 0) {
        // Flash the crowded teammate so kids see why bunching fails
        if (outcome.teammate) {
          const tm = s.players.find(p => p.id === outcome.teammate);
          if (tm) setTimeout(() => flashPlayer(tm.id, "orange"), 150);
        }
        done();
      }
    });
  });
}

function playCoveredAt(s, outcome, destX, destY, done) {
  const ids = Array.isArray(outcome.by) ? outcome.by : [outcome.by];
  let remaining = ids.length;
  if (!remaining) { done(); return; }
  ids.forEach(did => {
    const def = s.players.find(p => p.id === did);
    if (!def) { if (--remaining === 0) done(); return; }
    const lp = livePosOf(def.id);
    const tx = destX + (lp.x - destX) * 0.45, ty = destY + (lp.y - destY) * 0.45;
    writeLivePos(def.id, tx, ty);
    animate(320, e => setPlayerRender(def.id, lp.x + (tx - lp.x) * e, lp.y + (ty - lp.y) * e), () => {
      flashPlayer(def.id, "red");
      if (--remaining === 0) done();
    });
  });
}

let audioCtx = null;
function ctx() {
  if (!state.sound) return null;
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  return audioCtx;
}
function tone(freq, dur, type = "sine", gain = 0.18, delay = 0) {
  const c = ctx(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = 0;
  o.connect(g).connect(c.destination);
  const t0 = c.currentTime + delay;
  g.gain.linearRampToValueAtTime(gain, t0 + 0.02);
  g.gain.linearRampToValueAtTime(0, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function playCorrect() { tone(660, 0.10); tone(880, 0.14, "sine", 0.2, 0.08); }
function playWrong()   { tone(180, 0.18, "square", 0.14); }
function playGoal()    { tone(523, 0.12); tone(659, 0.12, "sine", 0.2, 0.12); tone(784, 0.22, "sine", 0.2, 0.24); }

    g.dataset.choice = c.id;
    if (isStay) {
      const ring = el('circle', { cx, cy, r:'5.8', fill:'rgba(255,255,255,0.06)', stroke: c.correct ? '#1f7a3a' : '#1f5e2e', 'stroke-width':'0.55', 'stroke-dasharray':'1.6 1.2' });
      g.appendChild(ring);
    }
    const fill = c.correct ? '#1f7a3a' : 'rgba(255,255,255,0.85)';
    const stroke = c.correct ? 'white' : '#1f5e2e';
    const textFill = c.correct ? 'white' : '#1f5e2e';
    const badge = el('circle', { cx, cy, r:'2.5', fill, stroke, 'stroke-width':'0.45' });
    const num = el('text', { x:cx, y:cy, 'font-size':'2.4', 'font-weight':'800', 'text-anchor':'middle', 'dominant-baseline':'central', fill:textFill, 'pointer-events':'none' });
    const DPS_ED = { dribble:'D', pass:'P', shoot:'S' };
    num.textContent = edIsDPSMode() ? (DPS_ED[c.choice_type] || String(c.num)) : String(c.num);
    g.appendChild(badge);
    g.appendChild(num);
    dyn.appendChild(g);
  });
  updateExp45Visibility();
  updateExpLabels();
}

function updateExpLabels() {
  const dps = edIsDPSMode();
  const DPS_FULL = { dribble:'D — Dribble', pass:'P — Pass', shoot:'S — Shoot' };
  [1,2,3,4,5].forEach(n => {
    const hdr = document.getElementById(`ed-exp-hdr-${n}`);
    if (!hdr) return;
    const ch = ed.choices.find(c => c.num === n);
    if (dps && ch && ch.choice_type) {
      hdr.textContent = `CHOICE ${DPS_FULL[ch.choice_type] || n} (position ${n})`;
    } else {
      hdr.textContent = `POSITION ${n}`;
    }
  });
}

function updateExp45Visibility() {
  const has4 = ed.choices.some(c => c.id === '4' && c.x != null);
  const has5 = ed.choices.some(c => c.id === '5' && c.x != null);
  const wrap = document.getElementById('ed-exp-45-wrap');
  const hdr5 = document.getElementById('ed-exp-hdr-5');
  const ta5  = document.getElementById('ed-exp-5');
  if (!wrap) return;
  wrap.style.display = has4 ? '' : 'none';
  if (hdr5) hdr5.style.display = has5 ? '' : 'none';
  if (ta5)  ta5.style.display  = has5 ? '' : 'none';
}

function initEditorSVGEvents(svg) {
  let dragType = null, dragId = null, dragOffX = 0, dragOffY = 0;
  let dragStartX = 0, dragStartY = 0, hasDragged = false;
  let edLastTap = { role: null, time: 0 }; // double-tap tracking for heading toggle

  svg.addEventListener('pointerdown', e => {
    if (e.button && e.button !== 0) return;
    const pt = edSvgPt(svg, e.clientX, e.clientY);
    dragStartX = pt.x; dragStartY = pt.y; hasDragged = false;
    // Session I — snapshot the play BEFORE any user gesture on the field so
    // Undo returns to pre-gesture state. Guarded against duplicates, so
    // clicks that turn into no-ops don't clutter history.
    if (ed.playMode && ed.play) _edPushHistory();

    // 1. Heading handle (check element directly)
    if (e.target.dataset && e.target.dataset.hdgHandle) {
      dragType = 'hdg'; dragId = e.target.dataset.hdgHandle;
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 1b-wp. Waypoint pivot dot drag — grab and reposition an intermediate waypoint.
    const wpDotEl = e.target.closest ? e.target.closest('[data-ed-wp-role]') : null;
    if (!wpDotEl && e.target.dataset && e.target.dataset.edWpRole) {
      // direct hit on circle (no closest needed for SVG primitives in some browsers)
    }
    const wpHit = wpDotEl || (e.target.dataset && e.target.dataset.edWpRole ? e.target : null);
    if (wpHit && ed.playMode && ed.play) {
      dragType = 'wpivot';
      dragId = JSON.stringify({
        role:   wpHit.dataset.edWpRole,
        topIdx: parseInt(wpHit.dataset.edWpTopIdx, 10),
        subIdx: wpHit.dataset.edWpSubIdx !== '' ? parseInt(wpHit.dataset.edWpSubIdx, 10) : null,
        wpIdx:  parseInt(wpHit.dataset.edWpIdx, 10)
      });
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 1b. Play-mode end-position handle (Slice 3) — dotted outline circle.
    // Dragging updates the role's terminal step in the active phase.
    // Session I — when a Run/Dribble tool is active, the end circle is instead
    // the anchor for a waypoint-extend gesture (see branch 4a). Let that path
    // claim the drag.
    const motionToolActive = ed.playMode && (ed.lineTool === 'dribble' || ed.lineTool === 'run');
    const playEndEl = e.target.closest ? e.target.closest('[data-playrole-end]') : null;
    if (playEndEl && playEndEl.dataset.playroleEnd && ed.playMode && ed.play && !motionToolActive) {
      dragType = 'playend'; dragId = playEndEl.dataset.playroleEnd;
      // Capture offset vs the rendered (screen-space, possibly mirrored) end position.
      const play = _plTransformPlay(ed.play);
      const end = _edPhaseEndPositions(play, ed.activePhase)[dragId];
      if (end) { dragOffX = pt.x - end.x; dragOffY = pt.y - end.y; }
      // Capture the role's current speed (ms/u) on its LAST motion step so
      // pointermove can update dur to keep the color (tier) stable during drag.
      // Authored-orientation info (ed.play is raw), so operate on ed.play.
      ed._dragSpeedMs = _edCaptureDragSpeed(ed.play, ed.activePhase, dragId);
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 1c. Play-mode setup-position handle — solid circle in setup phase only.
    // Dragging mutates ed.play.setup[role].
    const playStartEl = e.target.closest ? e.target.closest('[data-playrole-start]') : null;
    if (playStartEl && playStartEl.dataset.playroleStart && ed.playMode && ed.play && _edIsSetupPhase(ed.activePhase)) {
      dragType = 'playstart'; dragId = playStartEl.dataset.playroleStart;
      const play = _plTransformPlay(ed.play);
      const s = play.setup && play.setup[dragId];
      if (s) { dragOffX = pt.x - s.x; dragOffY = pt.y - s.y; }
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 1d. Play-mode ball drag (setup only) — transfers hasBall on drop.
    const playBallEl = e.target.closest ? e.target.closest('[data-play-ball]') : null;
    if (playBallEl && ed.playMode && ed.play && _edIsSetupPhase(ed.activePhase)) {
      dragType = 'playball'; dragId = null;
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 1e. Play-mode step click.
    // Single-click on a motion connector opens the Motion Inspector.
    // Double-click on either a motion connector or a ball arrow deletes the
    // step. Single-click on a ball arrow hints at the double-click action.
    // The single-vs-double resolution lives in _edHandleStepClick (pointerup).
    const stepEl = e.target.closest ? e.target.closest('[data-ed-step-kind]') : null;
    if (stepEl && ed.playMode && ed.play) {
      const kind = stepEl.dataset.edStepKind;
      const top = parseInt(stepEl.dataset.edStepTop, 10);
      const sub = stepEl.dataset.edStepSub != null ? parseInt(stepEl.dataset.edStepSub, 10) : null;
      const wp  = stepEl.dataset.edWpIdx  != null ? parseInt(stepEl.dataset.edWpIdx,  10) : null;
      if (kind === 'motion') {
        if (typeof ed.activePhase === 'number' && ed.activePhase >= 0) {
          dragType = 'stepclick';
          dragId = JSON.stringify({ top, sub, wp, kind, clientX: e.clientX, clientY: e.clientY });
          svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
        }
      } else {
        dragType = 'stepclick';
        dragId = JSON.stringify({ top, sub, wp, kind, clientX: e.clientX, clientY: e.clientY });
        svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
      }
    }

    // 2. Placed player group
    const roleEl = e.target.closest ? e.target.closest('[data-role]') : null;
    if (roleEl && roleEl.dataset.role) {
      dragType = 'placed'; dragId = roleEl.dataset.role;
      const p = ed.placed[dragId];
      if (p) { dragOffX = pt.x - p.x; dragOffY = pt.y - p.y; }
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 3. Choice marker group
    const choiceEl = e.target.closest ? e.target.closest('[data-choice]') : null;
    if (choiceEl && choiceEl.dataset.choice) {
      const cid = choiceEl.dataset.choice;
      const ch = ed.choices.find(c => c.id === cid);
      if (ch && !ch.stayStill && ch.x != null) {
        dragOffX = pt.x - ch.x; dragOffY = pt.y - ch.y;
      }
      dragType = 'choice'; dragId = cid;
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 4a. Play-mode Dribble/Run tool — anchor from the nearest phase-start
    // OR phase-end circle. Start anchor → upsert the role's last motion
    // (overwrites or creates). End anchor → extend the role's existing
    // motion step with a new waypoint (role pivots mid-phase).
    if (ed.playMode && ed.play && (ed.lineTool === 'dribble' || ed.lineTool === 'run')) {
      const mirrored = _plTransformPlay(ed.play);
      const hit = _edNearestPhaseAnchor(mirrored, ed.activePhase, pt.x, pt.y, 4.0);
      if (hit) {
        dragType = hit.isEnd ? 'playlineextend' : 'playline';
        dragId = hit.role;
        dragStartX = hit.pos.x; dragStartY = hit.pos.y;
        svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
      }
      // Start too far from any player — block the drag and hint.
      const s = document.getElementById('ed-tool-status');
      if (s) { s.textContent = 'Start the drag near a player circle (solid = new line, dotted = add pivot).'; s.style.color = 'rgba(245,179,1,0.95)'; }
      dragType = 'none';
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 4bs. Play-mode Shoot tool (re-uses the Score button in play mode).
    // Anchor at the ball holder's END-of-phase position so the shot line
    // originates from the dotted circle. On release, append a shot ball step
    // at the end of the active phase so it fires after all motion.
    if (ed.playMode && ed.play && ed.lineTool === 'score') {
      if (_edIsSetupPhase(ed.activePhase)) {
        const s = document.getElementById('ed-tool-status');
        if (s) { s.textContent = 'Shoot lives in a motion phase — pick a phase block first.'; s.style.color = 'rgba(245,179,1,0.95)'; }
        dragType = 'none';
        svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
      }
      const mirrored = _plTransformPlay(ed.play);
      const holder = _edPhaseBallHolder(ed.play, ed.activePhase);
      const endMap = _edPhaseEndPositions(mirrored, ed.activePhase);
      const holderPos = holder && endMap[holder];
      if (holder && holderPos) {
        dragType = 'playshoot'; dragId = holder;
        dragStartX = holderPos.x; dragStartY = holderPos.y;
        svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
      }
      const s = document.getElementById('ed-tool-status');
      if (s) { s.textContent = 'No ball holder in this phase.'; s.style.color = 'rgba(245,179,1,0.95)'; }
      dragType = 'none';
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 4b. Play-mode Pass tool — always anchor at the current ball holder's
    // post-motion position. The click location becomes the drop point;
    // release near a teammate commits.
    //
    // Session J — anchor at the holder's END-of-last-motion (not phase-start)
    // so the authored pass line starts from the same spot the render already
    // draws pass arrows from. If the holder hasn't moved in the phase,
    // endMap[holder] === startMap[holder] by definition, so fresh pass
    // authoring still works.
    if (ed.playMode && ed.play && ed.lineTool === 'pass') {
      if (_edIsSetupPhase(ed.activePhase)) {
        const s = document.getElementById('ed-tool-status');
        if (s) { s.textContent = 'Pass lives in a motion phase — pick a phase block first. Setup only holds positions.'; s.style.color = 'rgba(245,179,1,0.95)'; }
        dragType = 'none';
        svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
      }
      const mirrored = _plTransformPlay(ed.play);
      const holder = _edPhaseBallHolder(ed.play, ed.activePhase);
      const endMap = _edPhaseEndPositions(mirrored, ed.activePhase);
      const startMap = _edPhaseStartPositions(mirrored, ed.activePhase);
      const holderPos = holder && (endMap[holder] || startMap[holder]);
      if (holder && holderPos) {
        dragType = 'playpass'; dragId = holder;
        dragStartX = holderPos.x; dragStartY = holderPos.y;
        svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
      }
      const s = document.getElementById('ed-tool-status');
      if (s) { s.textContent = 'No ball holder in this phase.'; s.style.color = 'rgba(245,179,1,0.95)'; }
      dragType = 'none';
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }

    // 4. Empty area — scenario-designer line draw or deselect.
    // In play mode we do NOT use ed.lines for anything, so suppress line drawing.
    if (ed.playMode) {
      dragType = 'none';
      svg.setPointerCapture(e.pointerId); e.preventDefault(); return;
    }
    dragType = 'line';
    svg.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  svg.addEventListener('pointermove', e => {
    if (!dragType) return;
    const pt = edSvgPt(svg, e.clientX, e.clientY);
    if (Math.hypot(pt.x - dragStartX, pt.y - dragStartY) > 1.5) hasDragged = true;

    if (dragType === 'wpivot') {
      // Live-update the intermediate waypoint position as the user drags.
      const c = edClamp(pt.x, pt.y);
      try {
        const info = JSON.parse(dragId);
        const isA = ed.play && ed.play.actionTeam === 'A';
        const dataX = isA ? (100 - c.x) : c.x;
        const steps = _edPhaseSteps(ed.play, ed.activePhase) || [];
        const step = info.subIdx != null
          ? (steps[info.topIdx] && steps[info.topIdx].par && steps[info.topIdx].par[info.subIdx])
          : steps[info.topIdx];
        if (step && Array.isArray(step.waypoints) && step.waypoints[info.wpIdx]) {
          step.waypoints[info.wpIdx].x = Math.round(dataX * 10) / 10;
          step.waypoints[info.wpIdx].y = Math.round(c.y * 10) / 10;
          renderEditorSVG();
        }
      } catch(err) {}
    } else if (dragType === 'placed') {
      const c = edClamp(pt.x - dragOffX, pt.y - dragOffY);
      ed.placed[dragId] = Object.assign({}, ed.placed[dragId], { x:c.x, y:c.y });
      renderEditorSVG();
    } else if (dragType === 'playend') {
      // Write in authoring orientation: un-mirror x for A-series plays.
      const c = edClamp(pt.x - dragOffX, pt.y - dragOffY);
      const isA = ed.play && ed.play.actionTeam === 'A';
      const dataX = isA ? (100 - c.x) : c.x;
      _edWritePhaseEnd(ed.play, ed.activePhase, dragId, dataX, c.y);
      // Preserve the step's authored speed — update dur to match new distance
      // so the rendered color (tier) stays consistent during the drag.
      if (ed._dragSpeedMs && ed._dragSpeedMs > 0) {
        _edPreserveDragSpeed(ed.play, ed.activePhase, dragId, ed._dragSpeedMs);
      }
      renderEditorSVG();
    } else if (dragType === 'playstart') {
      // Mutate ed.play.setup[role] directly. Un-mirror x for A-series.
      const c = edClamp(pt.x - dragOffX, pt.y - dragOffY);
      const isA = ed.play && ed.play.actionTeam === 'A';
      const dataX = isA ? (100 - c.x) : c.x;
      if (ed.play.setup && ed.play.setup[dragId]) {
        ed.play.setup[dragId].x = Math.round(dataX * 10) / 10;
        ed.play.setup[dragId].y = Math.round(c.y * 10) / 10;
      }
      renderEditorSVG();
    } else if (dragType === 'playball') {
      // Preview a small highlight circle at the pointer; commit on release.
      let ring = document.getElementById('ed-ball-drop-ring');
      if (!ring) {
        ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ring.id = 'ed-ball-drop-ring';
        ring.setAttribute('pointer-events', 'none');
        svg.appendChild(ring);
      }
      ring.setAttribute('cx', pt.x); ring.setAttribute('cy', pt.y);
      ring.setAttribute('r', '3.3');
      ring.setAttribute('fill', 'rgba(245,179,1,0.15)');
      ring.setAttribute('stroke', 'rgba(245,179,1,0.85)');
      ring.setAttribute('stroke-width', '0.35');
      ring.setAttribute('stroke-dasharray', '1.2 0.8');
    } else if (dragType === 'choice') {
      const ch = ed.choices.find(c => c.id === dragId);
      if (ch && !ch.stayStill) {
        const c = edClamp(pt.x - dragOffX, pt.y - dragOffY);
        ch.x = c.x; ch.y = c.y;
        renderEditorSVG();
      }
    } else if (dragType === 'hdg') {
      const p = ed.placed[dragId];
      if (p && !(dragId === 'you' && edIsDPSMode())) {
        const dx = pt.x - p.x, dy = pt.y - p.y, len = Math.hypot(dx,dy)||1;
        ed.placed[dragId] = Object.assign({}, p, { heading:{ x:dx/len, y:dy/len } });
        renderEditorSVG();
      }
    } else if (dragType === 'line' && hasDragged) {
      // Draw preview line
      let pl = document.getElementById('ed-preview-line');
      if (!pl) {
        pl = document.createElementNS('http://www.w3.org/2000/svg','line');
        pl.id = 'ed-preview-line'; pl.setAttribute('pointer-events','none');
        svg.appendChild(pl);
      }
      const c = ed.lineTool ? '#f5c400' : 'rgba(255,255,255,0.55)';
      pl.setAttribute('x1',dragStartX); pl.setAttribute('y1',dragStartY);
      pl.setAttribute('x2',pt.x); pl.setAttribute('y2',pt.y);
      pl.setAttribute('stroke',c); pl.setAttribute('stroke-width','0.65');
      pl.setAttribute('stroke-dasharray','1.5 1.5'); pl.setAttribute('stroke-linecap','round');
    } else if (dragType === 'playline' || dragType === 'playlineextend') {
      // Preview a play-mode motion segment. Anchor is either the role's
      // phase-start (playline) or phase-end (playlineextend — pivot gesture).
      let pl = document.getElementById('ed-preview-line');
      if (!pl) {
        pl = document.createElementNS('http://www.w3.org/2000/svg','line');
        pl.id = 'ed-preview-line'; pl.setAttribute('pointer-events','none');
        svg.appendChild(pl);
      }
      const col = ed.lineTool === 'dribble' ? 'rgba(90,190,220,0.95)' : 'rgba(110,200,130,0.95)';
      pl.setAttribute('x1', dragStartX); pl.setAttribute('y1', dragStartY);
      pl.setAttribute('x2', pt.x);       pl.setAttribute('y2', pt.y);
      pl.setAttribute('stroke', col); pl.setAttribute('stroke-width', '0.7');
      pl.setAttribute('stroke-dasharray', '1.6 1.2'); pl.setAttribute('stroke-linecap', 'round');
    } else if (dragType === 'playpass') {
      // Preview the pass arrow while dragging.
      let pl = document.getElementById('ed-preview-line');
      if (!pl) {
        pl = document.createElementNS('http://www.w3.org/2000/svg','line');
        pl.id = 'ed-preview-line'; pl.setAttribute('pointer-events','none');
        svg.appendChild(pl);
      }
      pl.setAttribute('x1', dragStartX); pl.setAttribute('y1', dragStartY);
      pl.setAttribute('x2', pt.x);       pl.setAttribute('y2', pt.y);
      pl.setAttribute('stroke', 'rgba(255,255,255,0.9)'); pl.setAttribute('stroke-width', '0.7');
      pl.setAttribute('stroke-dasharray', '1.8 1.4'); pl.setAttribute('stroke-linecap', 'round');
    } else if (dragType === 'playshoot') {
      // Preview the shot arrow in yellow.
      let pl = document.getElementById('ed-preview-line');
      if (!pl) {
        pl = document.createElementNS('http://www.w3.org/2000/svg','line');
        pl.id = 'ed-preview-line'; pl.setAttribute('pointer-events','none');
        svg.appendChild(pl);
      }
      pl.setAttribute('x1', dragStartX); pl.setAttribute('y1', dragStartY);
      pl.setAttribute('x2', pt.x);       pl.setAttribute('y2', pt.y);
      pl.setAttribute('stroke', '#f5c400'); pl.setAttribute('stroke-width', '0.7');
      pl.setAttribute('stroke-dasharray', '1.8 1.4'); pl.setAttribute('stroke-linecap', 'round');
    }
  });

  svg.addEventListener('pointerup', e => {
    if (!dragType) return;
    const pt = edSvgPt(svg, e.clientX, e.clientY);

    if (dragType === 'placed' && !hasDragged) {
      // Double-tap on a player toggles their heading arrow.
      // In DPS mode: opponents and GKs cannot receive arrows (they don't show in game).
      const now = Date.now();
      const isDPS = edIsDPSMode();
      const dpsNoArrow = isDPS && (dragId === 'you' ||
        ['presser','cover','shadow','extra_defender','gk_home','gk_away'].includes(dragId));
      if (!dpsNoArrow && edLastTap.role === dragId && now - edLastTap.time < 350) {
        // Double-tap confirmed: toggle heading
        const p = ed.placed[dragId];
        if (p) {
          if (p.heading) { delete ed.placed[dragId].heading; }
          else { ed.placed[dragId] = Object.assign({}, p, { heading: { x:1, y:0 } }); }
        }
        edLastTap.role = null; edLastTap.time = 0;
      } else {
        edLastTap.role = dragId; edLastTap.time = now;
      }
    } else if (dragType === 'choice' && !hasDragged) {
      // Cycle: default → correct → stayStill (skipped in DPS) → remove
      const ch = ed.choices.find(c => c.id === dragId);
      if (ch) {
        if (!ch.correct && !ch.stayStill) {
          ed.choices.forEach(c => c.correct = false); ch.correct = true;
        } else if (ch.correct && !edIsDPSMode()) {
          ch.correct = false; ch.stayStill = true;
        } else {
          ch.correct = false; ch.stayStill = false; ch.x = null; ch.y = null;
        }
      }
    } else if (dragType === 'line') {
      const pl = document.getElementById('ed-preview-line');
      if (pl) pl.remove();
      if (hasDragged && ed.lineTool) {
        ed.lines.push({ type:ed.lineTool, x1:dragStartX, y1:dragStartY, x2:pt.x, y2:pt.y });
      }
    } else if (dragType === 'playline') {
      const pl = document.getElementById('ed-preview-line');
      if (pl) pl.remove();
      if (hasDragged && ed.play && (ed.lineTool === 'dribble' || ed.lineTool === 'run')) {
        const c = edClamp(pt.x, pt.y);
        const dist = Math.hypot(c.x - dragStartX, c.y - dragStartY);
        if (dist >= 1.0) {
          const dur = _edDurFromDistance(dist, ed.lineTool);
          const isA = ed.play.actionTeam === 'A';
          const dataX = isA ? (100 - c.x) : c.x;
          _edUpsertPhaseStep(ed.play, ed.activePhase, dragId, dataX, c.y, dur);
        }
      }
    } else if (dragType === 'playlineextend') {
      const pl = document.getElementById('ed-preview-line');
      if (pl) pl.remove();
      if (hasDragged && ed.play && (ed.lineTool === 'dribble' || ed.lineTool === 'run')) {
        const c = edClamp(pt.x, pt.y);
        const dist = Math.hypot(c.x - dragStartX, c.y - dragStartY);
        if (dist >= 1.0) {
          const dur = _edDurFromDistance(dist, ed.lineTool);
          const isA = ed.play.actionTeam === 'A';
          const dataX = isA ? (100 - c.x) : c.x;
          // If the role released the ball after their last motion, the drag
          // is an off-ball continuation, not a pivot. _edAppendWaypoint
          // returns false in that case — fall back to _edUpsertPhaseStep,
          // which appends a new top-level step starting from the role's
          // end-of-last-motion position.
          const releasedAfter = _edRoleHasReleasedBallAfterLastMotion(ed.play, ed.activePhase, dragId);
          let ok, msg, col;
          if (releasedAfter) {
            ok = _edUpsertPhaseStep(ed.play, ed.activePhase, dragId, dataX, c.y, dur);
            msg = ok
              ? `Off-ball continuation for ${dragId === 'DY' ? 'YOU' : dragId} (${dur} ms)`
              : 'Could not add continuation run.';
            col = ok ? 'rgba(140,220,160,0.95)' : 'rgba(245,179,1,0.95)';
          } else {
            ok = _edAppendWaypoint(ed.play, ed.activePhase, dragId, dataX, c.y, dur);
            msg = ok
              ? `Pivot added to ${dragId === 'DY' ? 'YOU' : dragId} (${dur} ms)`
              : 'Could not add pivot — draw a first line for this role first.';
            col = ok ? 'rgba(140,220,160,0.95)' : 'rgba(245,179,1,0.95)';
          }
          const status = document.getElementById('ed-tool-status');
          if (status) { status.textContent = msg; status.style.color = col; }
        }
      }
    } else if (dragType === 'wpivot') {
      // Waypoint pivot drag complete — push undo snapshot and re-render.
      if (hasDragged && ed.play) {
        _edPushHistory();
        renderEditorSVG();
      }
    } else if (dragType === 'playball') {
      const ring = document.getElementById('ed-ball-drop-ring');
      if (ring) ring.remove();
      if (ed.play && _edIsSetupPhase(ed.activePhase)) {
        const mirrored = _plTransformPlay(ed.play);
        const hit = _edNearestPhaseStart(mirrored, -1, pt.x, pt.y, 4.0);
        if (hit) {
          _edSetSetupBallHolder(ed.play, hit.role);
          const status = document.getElementById('ed-tool-status');
          if (status) {
            status.textContent = `Ball transferred to ${hit.role === 'DY' ? 'YOU' : hit.role}`;
            status.style.color = 'rgba(140,220,160,0.95)';
          }
        }
      }
    } else if (dragType === 'stepclick') {
      // Session I — single-vs-double click resolution.
      // Single motion click → open inspector. Double click → delete.
      // Single ball click → hint. Double ball click → delete.
      if (hasDragged === false && dragId && ed.play) {
        try {
          const info = JSON.parse(dragId);
          if (info.top >= 0) _edHandleStepClick(info);
        } catch (err) {}
      }
    } else if (dragType === 'none' || dragType === 'line') {
      // Click on empty field area — close the inspector if it is open.
      if (!hasDragged) edCloseMotionInspector();
    } else if (dragType === 'playshoot') {
      const pl = document.getElementById('ed-preview-line');
      if (pl) pl.remove();
      if (hasDragged && ed.play && ed.lineTool === 'score') {
        const c = edClamp(pt.x, pt.y);
        const dist = Math.hypot(c.x - dragStartX, c.y - dragStartY);
        if (dist >= 2.0) {
          const isA = ed.play.actionTeam === 'A';
          const dataX = isA ? (100 - c.x) : c.x;
          const dur = Math.max(150, Math.round((dist * 50) / 50) * 50);
          const steps = _edPhaseSteps(ed.play, ed.activePhase);
          if (Array.isArray(steps)) {
            // Append as a top-level sequential step so the shot fires AFTER
            // all prior motion in the phase completes. Originates from the
            // holder's end position (captured at pointerdown).
            steps.push({
              ball: { from: dragId, kind: 'shot', toX: Math.round(dataX * 10) / 10, toY: Math.round(c.y * 10) / 10, dur }
            });
            const status = document.getElementById('ed-tool-status');
            if (status) {
              status.textContent = `Shot committed: ${dragId === 'DY' ? 'YOU' : dragId} → goal (${dur} ms)`;
              status.style.color = 'rgba(140,220,160,0.95)';
            }
          }
        }
      }
    } else if (dragType === 'playpass') {
      const pl = document.getElementById('ed-preview-line');
      if (pl) pl.remove();
      if (hasDragged && ed.play && ed.lineTool === 'pass') {
        // Find the target role: nearest phase-start position to drop point.
        const mirrored = _plTransformPlay(ed.play);
        const target = _edNearestPhaseStart(mirrored, ed.activePhase, pt.x, pt.y, 5.0);
        if (target && target.role !== dragId) {
          // Distance in authoring orientation is the same as in screen (mirror preserves length).
          const fromPos = mirrored.setup && mirrored.setup[dragId] ? mirrored.setup[dragId] : null;
          const dx = target.pos.x - dragStartX;
          const dy = target.pos.y - dragStartY;
          const dist = Math.hypot(dx, dy);
          // Ball tier: 50 ms/u, rounded to 50, floor 150 so kids can see it.
          const dur = Math.max(150, Math.round((dist * 50) / 50) * 50);
          _edAppendBallStep(ed.play, ed.activePhase, {
            from: dragId, to: target.role, kind: 'pass', dur
          });
          // Status nudge so Amy knows the commit landed.
          const status = document.getElementById('ed-tool-status');
          if (status) {
            status.textContent = `Pass committed: ${dragId === 'DY' ? 'YOU' : dragId} → ${target.role === 'DY' ? 'YOU' : target.role} (${dur} ms)`;
            status.style.color = 'rgba(140,220,160,0.95)';
          }
        } else {
          const status = document.getElementById('ed-tool-status');
          if (status) {
            status.textContent = 'Drop near a teammate to commit the pass.';
            status.style.color = 'rgba(245,179,1,0.95)';
          }
        }
      }
    }

    // After any draw operation, auto-deselect the line tool so it doesn't
    // stay stuck — the user expects one draw per click.
    if (hasDragged && ed.lineTool && ['line','playline','playlineextend','playshoot','playpass'].includes(dragType)) {
      ed.lineTool = null;
      document.querySelectorAll('.ed-tool-btn.active').forEach(b => b.classList.remove('active'));
      const _ts = document.getElementById('ed-tool-status');
      if (_ts) { _ts.textContent = 'No tool — drag on field to draw'; _ts.style.color = 'rgba(255,255,255,0.35)'; }
    }

    try { svg.releasePointerCapture(e.pointerId); } catch(e){}
    dragType = null; dragId = null; hasDragged = false;
    // Reset the drag-speed cache captured for endpoint drags (Issue 1).
    if (ed) ed._dragSpeedMs = null;
    renderEditorSVG();
  });

  // Right-click: choice → cycle type (D→P→S); player/ball → remove
  svg.addEventListener('contextmenu', e => {
    e.preventDefault();
    const choiceEl = e.target.closest ? e.target.closest('[data-choice]') : null;
    if (choiceEl && choiceEl.dataset.choice && edIsDPSMode()) {
      const ch = ed.choices.find(c => c.id === choiceEl.dataset.choice);
      if (ch && ch.x != null) {
        const cycle = { dribble:'pass', pass:'shoot', shoot:'dribble' };
        ch.choice_type = cycle[ch.choice_type] || 'dribble';
        renderEditorSVG(); return;
      }
    }
    const roleEl = e.target.closest ? e.target.closest('[data-role]') : null;
    if (roleEl && roleEl.dataset.role) {
      delete ed.placed[roleEl.dataset.role];
      renderEditorSVG();
    }
  });
}

function initEdDragFromPalette() {
  const overlay = document.getElementById('ed-overlay');
  if (!overlay) return;

  function makeDraggable(tok, onDrop) {
    tok.style.touchAction = 'none';
    tok.addEventListener('pointerdown', e => {
      if (e.button && e.button !== 0) return;
      const ghost = document.createElement('div');
      ghost.textContent = tok.textContent;
      ghost.style.cssText = `position:fixed;width:42px;height:42px;border-radius:50%;background:${tok.style.background||'rgba(255,255,255,0.88)'};color:${tok.classList.contains('ed-choice-tok')?'#1f5e2e':'white'};font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10000;opacity:0.88;transform:translate(-50%,-50%);left:${e.clientX}px;top:${e.clientY}px;border:2px solid rgba(0,0,0,0.2);box-shadow:0 4px 16px rgba(0,0,0,0.5);`;
      document.body.appendChild(ghost);
      function onMove(ev) { ghost.style.left=ev.clientX+'px'; ghost.style.top=ev.clientY+'px'; }
      function onUp(ev) {
        ghost.remove();
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        const svg = document.getElementById('ed-svg');
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        if (ev.clientX >= rect.left && ev.clientX <= rect.right && ev.clientY >= rect.top && ev.clientY <= rect.bottom) {
          const pt = edSvgPt(svg, ev.clientX, ev.clientY);
          onDrop(edClamp(pt.x, pt.y));
        }
      }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      e.preventDefault();
    });
  }

  overlay.querySelectorAll('[data-pal-role]').forEach(tok => {
    makeDraggable(tok, ({x, y}) => {
      const role = tok.dataset.palRole;
      const existing = ed.placed[role] || {};
      ed.placed[role] = Object.assign({}, existing, { x, y });
      // Default heading: rightward for non-you/gk roles.
      // In DPS mode: opponents get no default heading — they don't show arrows in game.
      const _dpsOppRole = ['presser','cover','shadow','extra_defender'];
      const _skipHdg = role === 'you' || role.startsWith('gk') ||
        (edIsDPSMode() && _dpsOppRole.includes(role));
      if (!ed.placed[role].heading && !_skipHdg) {
        ed.placed[role].heading = { x:1, y:0 };
      }
      renderEditorSVG();
    });
  });

  overlay.querySelectorAll('[data-pal-choice]').forEach(tok => {
    makeDraggable(tok, ({x, y}) => {
      const ch = ed.choices.find(c => c.id === tok.dataset.palChoice);
      if (ch) { ch.x = x; ch.y = y; ch.stayStill = false; renderEditorSVG(); }
    });
  });

  // Ball token — drag to field to set explicit ball position
  // DPS type tokens — drag fills next open slot with the specified choice_type
  overlay.querySelectorAll('[data-pal-dps]').forEach(tok => {
    makeDraggable(tok, ({x, y}) => {
      const type = tok.dataset.palDps; // 'dribble' | 'pass' | 'shoot'
      const slot = ed.choices.find(c => c.x == null); // next unfilled slot
      if (!slot) return;
      slot.x = x; slot.y = y; slot.stayStill = false; slot.choice_type = type;
      renderEditorSVG();
    });
  });

  const ballTok = overlay.querySelector('[data-pal-ball]');
  if (ballTok) {
    makeDraggable(ballTok, ({x, y}) => {
      ed.placed['ball'] = { x, y };
      renderEditorSVG();
    });
  }
}

// ============================================================
// PLAY LIBRARY EDITING — Session B (phase-aware designer)
// ============================================================
// Slice 1: load any play from CORRECT_PLAYS, render phase timeline, show setup positions.
// Slice 2: for the active phase, show start (solid) and end (dotted) positions with a
// dotted connector. Read-only — editing is Slice 3+.
// The play data stays in authoring orientation (as stored in CORRECT_PLAYS). For
// A-series plays we mirror x at render time via _plTransformPlay, so the view matches
// the game's Play Library view.

const PLAY_ROLE_ORDER = ['A1','A2','A3','A4','D1','D2','D3','DY','GK'];

function edPlayRoleCfg(play, role) {
  const isDef = play.actionTeam !== 'A';
  const CFG = {
    A1: { fill: isDef ? '#d9393a' : '#2e6dd1', label: 'A' },
    A2: { fill: isDef ? '#bf2020' : '#3a5fbf', label: 'A' },
    A3: { fill: isDef ? '#9a1010' : '#1e4fa0', label: 'A' },
    A4: { fill: isDef ? '#7a1010' : '#163c7a', label: 'A' },
    D1: { fill: isDef ? '#2e6dd1' : '#d9393a', label: 'D' },
    D2: { fill: isDef ? '#6fa3e8' : '#bf2020', label: 'D' },
    D3: { fill: isDef ? '#3a5fbf' : '#9a1010', label: 'D' },
    DY: { fill: '#f5b301', label: 'You' },
    GK: { fill: isDef ? '#4a8fbf' : '#b33', label: 'G' },
  };
  return CFG[role] || { fill: '#888', label: role };
}

// Duration in ms for a single step. Top-level steps play sequentially; par sub-steps
// play in parallel (max delay+dur). ball.dur + ball.delay contribute. Legacy ballFly
// uses the step's own dur; ballTo is instant. hold and pause contribute their dur.
function _edStepMs(step) {
  if (!step) return 0;
  if (step.pause) return step.pause;
  if (step.par) {
    let max = 0;
    for (const s of step.par) max = Math.max(max, (s.delay || 0) + _edStepMs(s));
    return max;
  }
  if (step.ball) return (step.ball.delay || 0) + (step.ball.dur || 0);
  if (step.ballFly) return step.dur || 0;
  if (step.ballTo) return 0;
  if (step.hold) return step.dur || 0;
  if (step.waypoints && step.waypoints.length) {
    // Session J — per-segment delay on waypoints (for segments 2+) extends
    // total step duration. Waypoint[0].delay is NOT counted here; step.delay
    // is the pre-segment-1 pause and lives on the step itself.
    return step.waypoints.reduce(
      (s, w, i) => s + (w.dur || 0) + (i > 0 ? (w.delay || 0) : 0),
      0
    );
  }
  if (step.dur != null) return step.dur;
  return 0;
}

function _edPhaseMs(steps) {
  let total = 0;
  (steps || []).forEach(s => { total += _edStepMs(s); });
  return total;
}

// Session G (Slice 2) — unified phase resolver. Accepts either a legacy string
// ('setup' | 'prePlay' | 'payoff') or a numeric phase index (-1 = setup,
// 0..N-1 = motion phases from play.phases). Returns the steps array for that
// phase, or null for setup / out-of-range. Every phase helper below threads
// through this so strings and numbers are interchangeable during migration.
function _edPhaseSteps(play, phase) {
  if (!play) return null;
  if (typeof phase === 'number') {
    if (phase < 0) return null;
    return Array.isArray(play.phases) ? (play.phases[phase] || null) : null;
  }
  if (phase === 'setup') return null;
  if (phase === 'prePlay') {
    return Array.isArray(play.phases) && play.phases.length >= 1
      ? play.phases[0]
      : (play.prePlay || null);
  }
  if (phase === 'payoff') {
    return Array.isArray(play.phases) && play.phases.length >= 2
      ? play.phases[play.phases.length - 1]
      : (play.payoff || null);
  }
  return null;
}

// Index-valued phase accessor. Number passes through; strings map to:
// 'setup' → -1, 'prePlay' → 0, 'payoff' → last phase index.
function _edPhaseIdx(play, phase) {
  if (typeof phase === 'number') return phase;
  if (phase === 'setup') return -1;
  if (phase === 'prePlay') return 0;
  if (phase === 'payoff') {
    const n = Array.isArray(play?.phases) ? play.phases.length : 2;
    return Math.max(0, n - 1);
  }
  return -1;
}

// Cardinal ball offset for the ball holder in a phase. Mirrors the runtime
// engine's ball-glue: ball sits on the cardinal side matching the holder's
// direction of motion in the active phase; if the holder doesn't move in the
// phase, falls back to the attack direction inferred from the play's
// actionTeam (A-series faces east after mirror, D-series carrier is an
// opposing attacker facing west toward the home goal). `play` and `startPos`
// are expected in rendered (mirrored for A-series) coordinates.
function _edDesignerBallDir(play, phase, holder, startPos) {
  const OFF = 3.5;
  const cardinalFrom = (dx, dy) => {
    if (Math.abs(dx) >= Math.abs(dy)) return { ox: dx >= 0 ? OFF : -OFF, oy: 0 };
    return { ox: 0, oy: dy >= 0 ? OFF : -OFF };
  };
  // Look for the holder's last motion step in the active phase.
  const steps = _edPhaseSteps(play, phase);
  if (Array.isArray(steps)) {
    let lastMotion = null;
    (function walk(list) {
      for (const s of list) {
        if (s && s.par) walk(s.par);
        else if (s && s.role === holder) {
          if (('toX' in s) && ('toY' in s)) lastMotion = s;
          else if (s.waypoints && s.waypoints.length) lastMotion = s;
        }
      }
    })(steps);
    if (lastMotion) {
      const start = (startPos && startPos[holder]) || { x: 50, y: 30 };
      let endX, endY;
      if (lastMotion.waypoints) {
        const last = lastMotion.waypoints[lastMotion.waypoints.length - 1];
        endX = last.x; endY = last.y;
      } else {
        endX = lastMotion.toX; endY = lastMotion.toY;
      }
      const dx = endX - start.x, dy = endY - start.y;
      if (Math.hypot(dx, dy) > 0.5) return cardinalFrom(dx, dy);
    }
  }
  // No motion — face the attack direction. A-series is mirrored so attackers
  // face east (+x). D-series is not mirrored; the carrier is the opposing
  // attacker moving west toward the home goal at x=0.
  return play && play.actionTeam === 'A'
    ? { ox: OFF, oy: 0 }
    : { ox: -OFF, oy: 0 };
}

// True when the given phase reference (string or number) points at setup
// (no motion steps). Used by call sites that branch on setup-vs-motion.
function _edIsSetupPhase(phase) {
  if (typeof phase === 'number') return phase < 0;
  return phase === 'setup';
}

// Total number of motion phases on a play. Used by the N-phase timeline.
function _edPhaseCount(play) {
  if (Array.isArray(play?.phases)) return play.phases.length;
  // Legacy shape — count whichever of prePlay/payoff are non-empty-ish.
  let n = 0;
  if (Array.isArray(play?.prePlay) && play.prePlay.length) n++;
  if (Array.isArray(play?.payoff)  && play.payoff.length)  n++;
  return Math.max(1, n);
}

// Apply a step to a position map (mutates). Only player-move steps shift positions;
// ball/ballFly/ballTo/hold/pause are no-ops here.
function _edApplyStep(positions, step) {
  if (!step) return;
  if (step.par) {
    for (const sub of step.par) _edApplyStep(positions, sub);
    return;
  }
  if (step.role) {
    if ('toX' in step && 'toY' in step) {
      positions[step.role] = { x: step.toX, y: step.toY };
    } else if (step.waypoints && step.waypoints.length) {
      const last = step.waypoints[step.waypoints.length - 1];
      positions[step.role] = { x: last.x, y: last.y };
    }
  }
}

function _edApplyPhase(start, steps) {
  const pos = {};
  Object.entries(start || {}).forEach(([r, p]) => { pos[r] = { x: p.x, y: p.y }; });
  (steps || []).forEach(s => _edApplyStep(pos, s));
  return pos;
}

function _edPhaseStartPositions(play, phase) {
  const setup = {};
  Object.entries(play.setup).forEach(([r, p]) => { setup[r] = { x: p.x, y: p.y }; });
  const idx = _edPhaseIdx(play, phase);
  if (idx <= 0) return setup;
  // Apply every prior motion phase to reach this phase's start.
  let pos = setup;
  if (Array.isArray(play.phases)) {
    for (let i = 0; i < idx && i < play.phases.length; i++) {
      pos = _edApplyPhase(pos, play.phases[i]);
    }
  } else {
    // Legacy fallback — 'payoff' starts after prePlay runs.
    pos = _edApplyPhase(pos, play.prePlay);
  }
  return pos;
}

function _edPhaseEndPositions(play, phase) {
  const start = _edPhaseStartPositions(play, phase);
  const steps = _edPhaseSteps(play, phase);
  if (!steps) return start;
  return _edApplyPhase(start, steps);
}

// Slice 3 — write a new endpoint for a role in a phase. Walks the phase's step list
// (including par sub-steps) and mutates the LAST movement step that controls the
// role. For waypoint steps, mutates the final waypoint. Returns true on success,
// false if the role has no movement step in that phase.
// Coordinates are in authoring orientation; the caller must un-mirror x for A-series
// plays before calling.
function _edWritePhaseEnd(play, phase, role, x, y) {
  const steps = _edPhaseSteps(play, phase);
  if (!steps) return false;
  let lastStep = null;
  for (const step of steps) {
    if (step.par) {
      for (const sub of step.par) {
        if (sub.role === role &&
            (('toX' in sub && 'toY' in sub) || (sub.waypoints && sub.waypoints.length))) {
          lastStep = sub;
        }
      }
    } else if (step.role === role &&
               (('toX' in step && 'toY' in step) || (step.waypoints && step.waypoints.length))) {
      lastStep = step;
    }
  }
  if (!lastStep) return false;
  const rx = Math.round(x * 10) / 10;
  const ry = Math.round(y * 10) / 10;
  if (lastStep.waypoints && lastStep.waypoints.length) {
    const last = lastStep.waypoints[lastStep.waypoints.length - 1];
    last.x = rx; last.y = ry;
  } else {
    lastStep.toX = rx; lastStep.toY = ry;
  }
  return true;
}

function _edIsPlayId(id) {
  return Array.isArray(CORRECT_PLAYS) && CORRECT_PLAYS.some(p => p.id === id);
}

// Walk a phase's steps in order, tracking a position cursor, and return the
// role's LAST motion step plus its own segment-start position (the cursor
// immediately before the step). Used by the drag handler to preserve tier.
function _edLastMotionStepInfo(play, phase, role) {
  const steps = _edPhaseSteps(play, phase);
  if (!Array.isArray(steps)) return null;
  const startMap = _edPhaseStartPositions(play, phase);
  const posCursor = {};
  for (const r in startMap) posCursor[r] = { x: startMap[r].x, y: startMap[r].y };
  let info = null;
  function isMotion(s) {
    return s && s.role && (('toX' in s && 'toY' in s) || (s.waypoints && s.waypoints.length));
  }
  function applyMotion(s) {
    if (!isMotion(s)) return;
    if ('toX' in s && 'toY' in s) {
      posCursor[s.role] = { x: s.toX, y: s.toY };
    } else {
      const last = s.waypoints[s.waypoints.length - 1];
      posCursor[s.role] = { x: last.x, y: last.y };
    }
  }
  for (const step of steps) {
    if (step.par && Array.isArray(step.par)) {
      // Snapshot the cursor position for each motion sub-step BEFORE the par
      // advances the cursor, so the segment start is the par entry position.
      for (const sub of step.par) {
        if (isMotion(sub) && sub.role === role) {
          const segStart = { x: posCursor[role].x, y: posCursor[role].y };
          info = { step: sub, segStart };
        }
      }
      for (const sub of step.par) applyMotion(sub);
    } else {
      if (isMotion(step) && step.role === role) {
        const segStart = { x: posCursor[role].x, y: posCursor[role].y };
        info = { step, segStart };
      }
      applyMotion(step);
    }
  }
  return info;
}

// Compute the role's current speed (ms/u) on its LAST motion step in the
// phase. Returns the ms/u number, or null if no motion or distance is tiny.
// Stored at drag-start so pointermove can preserve it across distance changes.
function _edCaptureDragSpeed(play, phase, role) {
  const info = _edLastMotionStepInfo(play, phase, role);
  if (!info) return null;
  const s = info.step;
  let segDist = 0, segDur = 0;
  if (s.waypoints && s.waypoints.length) {
    let px = info.segStart.x, py = info.segStart.y;
    for (const w of s.waypoints) {
      segDist += Math.hypot(w.x - px, w.y - py);
      segDur  += (w.dur || 0);
      px = w.x; py = w.y;
    }
  } else {
    segDist = Math.hypot(s.toX - info.segStart.x, s.toY - info.segStart.y);
    segDur  = s.dur || 0;
  }
  if (segDist < 0.1 || segDur <= 0) return null;
  return segDur / segDist;
}

// After _edWritePhaseEnd runs on pointermove, re-derive the step's new segment
// distance and set dur = distance × msPerU so the rendered tier color stays
// pinned to the authored speed. Uses the same floor-at-50ms rounding as the
// authoring tools.
function _edPreserveDragSpeed(play, phase, role, msPerU) {
  const info = _edLastMotionStepInfo(play, phase, role);
  if (!info || !msPerU || msPerU <= 0) return;
  const s = info.step;
  let segDist = 0;
  if (s.waypoints && s.waypoints.length) {
    let px = info.segStart.x, py = info.segStart.y;
    for (const w of s.waypoints) {
      segDist += Math.hypot(w.x - px, w.y - py);
      px = w.x; py = w.y;
    }
  } else {
