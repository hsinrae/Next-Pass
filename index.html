      if (s.ball.delay) s.ball.delay = Math.max(0,  Math.round(s.ball.delay * factor / 50) * 50);
    }
    if (s.pause) s.pause = Math.max(50, Math.round(s.pause * factor / 50) * 50);
  }
  steps.forEach(scaleStep);
}

// Slice 1 + 2: phase-aware field render. Setup shows only solid circles at setup
// positions. prePlay/payoff show solid circles at phase start, dotted outlines at
// phase end, with a dotted connector where a role moves.
function renderPlayModeSVG(opts) {
  // Session J — when opts.hideArrows is true, suppress authoring overlay
  // (motion connectors, dotted-outline end circles, ball-event arrows, and
  // waypoint pivot dots). Used by "Play All" preview so the animation
  // matches the Play Library render. Per-phase previews keep the overlay
  // visible so authors can trace what's authored in the phase they picked.
  const hideArrows = !!(opts && opts.hideArrows);
  const svg = document.getElementById('ed-svg');
  if (!svg) return;
  const ns = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v));
    return e;
  }
  let dyn = document.getElementById('ed-dyn');
  if (dyn) dyn.remove();
  dyn = el('g', { id: 'ed-dyn' });
  svg.appendChild(dyn);

  // Mirror x for A-series so the view matches the game's Play Library orientation.
  const play = _plTransformPlay(ed.play);
  const startPos = _edPhaseStartPositions(play, ed.activePhase);
  const endPos   = _edPhaseEndPositions(play, ed.activePhase);
  const isSetup  = _edIsSetupPhase(ed.activePhase);

  // Dotted motion connectors: start → end per role. Each connector is tagged
  // with the step address behind it so clicking removes that step.
  //
  // Session J — color is bound to the ACTION, not the speed tier. A segment
  // where the role holds the ball at segment start renders cyan (on-ball
  // carry). A segment where the role does not hold the ball renders green
  // (off-ball run). Sprint / Jog / Run tier selections in the Motion Inspector
  // affect `dur` only; the line color stays the color that matches whether
  // the player has the ball or not.
  //
  // Ball-holder is walked through the phase's steps in order, including ball
  // events (pass, shot, clear, intercept, legacy ballFly / ballTo). Within a
  // par, motion substeps fire concurrent with the holder they had at par
  // start, even if the par also contains a ball event that changes the
  // holder — they were mid-motion when the pass released.
  const ED_MOTION_CARRY = 'rgba(90,190,220,0.88)';   // cyan — on-ball carry
  const ED_MOTION_RUN   = 'rgba(110,200,130,0.88)';  // green — off-ball run
  if (!isSetup && !hideArrows) {
    // Start-of-phase holder (resolved across all prior phases).
    let heldBy = _edPhaseBallHolder(play, ed.activePhase);

    // Per-segment rendering. Each atomic segment (single-segment step or one
    // waypoint) becomes its own <g> tagged with (topIdx, subIdx, wpIdx) so a
    // single click opens an inspector for ONLY that segment — independent
    // speed/delay edits across pivots within the same role.
    const roleCursor = {};
    for (const r in startPos) roleCursor[r] = { x: startPos[r].x, y: startPos[r].y };
    const emitSeg = (sp, ep, color, topIdx, subIdx, wpIdx) => {
      if (Math.hypot(ep.x - sp.x, ep.y - sp.y) < 0.3) return;
      const g = el('g', { cursor: 'pointer' });
      g.dataset.edStepTop = String(topIdx);
      if (subIdx != null) g.dataset.edStepSub = String(subIdx);
      if (wpIdx != null)  g.dataset.edWpIdx  = String(wpIdx);
      g.dataset.edStepKind = 'motion';
      g.appendChild(el('line', { x1: sp.x, y1: sp.y, x2: ep.x, y2: ep.y,
        stroke: 'transparent', 'stroke-width': '2.4' }));
      g.appendChild(el('line', { x1: sp.x, y1: sp.y, x2: ep.x, y2: ep.y,
        stroke: color, 'stroke-width': '0.55',
        'stroke-dasharray': '1.2 1.0', 'stroke-linecap': 'round',
        'pointer-events': 'none' }));
      dyn.appendChild(g);
    };
    const emitMotion = (st, topIdx, subIdx, holderAtStart) => {
      if (!st || !st.role) return;
      const role = st.role;
      const sp = roleCursor[role] || startPos[role];
      if (!sp) return;
      const onBall = (role === holderAtStart);
      const col = onBall ? ED_MOTION_CARRY : ED_MOTION_RUN;
      if ('toX' in st && 'toY' in st) {
        const ep = { x: st.toX, y: st.toY };
        emitSeg(sp, ep, col, topIdx, subIdx, null);
        roleCursor[role] = ep;
      } else if (Array.isArray(st.waypoints) && st.waypoints.length) {
        let px = sp.x, py = sp.y;
        for (let wi = 0; wi < st.waypoints.length; wi++) {
          const w = st.waypoints[wi];
          emitSeg({ x: px, y: py }, { x: w.x, y: w.y }, col, topIdx, subIdx, wi);
          // Dot at each intermediate waypoint — draggable to adjust pivot.
          // Skip the last waypoint — it's the dotted end circle.
          if (wi < st.waypoints.length - 1) {
            const dot = el('circle', { cx: w.x, cy: w.y, r: '1.4',
              fill: col, stroke: 'rgba(255,255,255,0.7)', 'stroke-width': '0.35',
              cursor: 'grab' });
            dot.dataset.edWpRole   = role;
            dot.dataset.edWpTopIdx = topIdx;
            dot.dataset.edWpSubIdx = (subIdx != null) ? subIdx : '';
            dot.dataset.edWpIdx    = wi;
            dyn.appendChild(dot);
          }
          px = w.x; py = w.y;
        }
        roleCursor[role] = { x: px, y: py };
      }
    };
    const applyBallEventToHolder = (s) => {
      if (!s) return;
      if (s.ball) {
        const k = s.ball.kind || 'pass';
        if (k === 'intercept') heldBy = s.ball.interceptedBy || heldBy;
        else if (k === 'pass' || k === 'throw') heldBy = s.ball.to || heldBy;
        // shot / clear: holder stays null after launch; we keep heldBy
        // unchanged to preserve pre-launch identity for any preceding motion.
      } else if (s.ballFly) {
        heldBy = s.ballFly;
      } else if (s.ballTo) {
        heldBy = s.ballTo;
      }
    };

    const raw = _edPhaseSteps(play, ed.activePhase) || [];
    for (let topIdx = 0; topIdx < raw.length; topIdx++) {
      const step = raw[topIdx];
      if (step.par && Array.isArray(step.par)) {
        // Motion substeps in a par all started with the same par-start holder.
        const parHeldBy = heldBy;
        for (let subIdx = 0; subIdx < step.par.length; subIdx++) {
          const sub = step.par[subIdx];
          if (sub && sub.role && (('toX' in sub && 'toY' in sub) ||
              (Array.isArray(sub.waypoints) && sub.waypoints.length))) {
            emitMotion(sub, topIdx, subIdx, parHeldBy);
          }
        }
        // Apply par's ball events at par close (holder may have changed).
        step.par.forEach(applyBallEventToHolder);
      } else if (step.role && (('toX' in step && 'toY' in step) ||
                 (Array.isArray(step.waypoints) && step.waypoints.length))) {
        emitMotion(step, topIdx, null, heldBy);
      } else {
        applyBallEventToHolder(step);
      }
    }
  }

  // Dotted-outline end positions (non-setup phases only).
  // Tagged with data-playrole-end so the drag handler can identify and reposition them.
  if (!isSetup && !hideArrows) {
    PLAY_ROLE_ORDER.forEach(role => {
      const s = startPos[role], e2 = endPos[role];
      if (!s || !e2) return;
      if (Math.hypot(e2.x - s.x, e2.y - s.y) < 0.3) return;
      const cfg = edPlayRoleCfg(play, role);
      const g = el('g', { opacity: '0.9', cursor: 'grab' });
      g.dataset.playroleEnd = role;
      // Transparent hit-area so the whole circle is grabbable, not just the thin stroke.
      g.appendChild(el('circle', {
        cx: e2.x, cy: e2.y, r: '2.8', fill: 'transparent'
      }));
      g.appendChild(el('circle', {
        cx: e2.x, cy: e2.y, r: '2.8',
        fill: 'none', stroke: cfg.fill, 'stroke-width': '0.65',
        'stroke-dasharray': '1.3 1.0', 'pointer-events': 'none'
      }));
      const lbl = el('text', {
        x: e2.x, y: e2.y,
        'font-size': cfg.label.length > 2 ? '2.0' : '2.3', 'font-weight': '800',
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        fill: cfg.fill, 'pointer-events': 'none', opacity: '0.82'
      });
      lbl.textContent = cfg.label;
      g.appendChild(lbl);
      dyn.appendChild(g);
    });
  }

  // Ball-event arrows (passes, shots, clears, intercepts). Each is grouped and
  // tagged with the step address so clicking removes that step. Color is per
  // kind: pass white, shot yellow, clear magenta, intercept red.
  //
  // Session J — Amy's L1-A3 bug: pass line was drawn from the passer's
  // post-motion position, but the engine fires the ball mid-motion (at
  // step.delay within the par). Line said one thing, ball did another. Fix:
  // for ball events INSIDE a par, compute `from` at step.delay and `to` at
  // step.delay + ball.dur using the same linear interp the engine uses
  // (_edRoleInParAtT). Top-level ball events keep the end-of-motion behavior
  // (they fire sequentially after all par motion closes, so end positions
  // are correct for them).
  if (!isSetup && !hideArrows) {
    const addresses = [];
    const fromPositions = [];
    const toPositions = [];
    const raw = _edPhaseSteps(play, ed.activePhase) || [];
    const posCursor = {};
    for (const r in startPos) posCursor[r] = { x: startPos[r].x, y: startPos[r].y };
    const applyMotionTo = (s) => {
      if (!s || !s.role) return;
      if ('toX' in s && 'toY' in s) {
        posCursor[s.role] = { x: s.toX, y: s.toY };
      } else if (s.waypoints && s.waypoints.length) {
        const last = s.waypoints[s.waypoints.length - 1];
        posCursor[s.role] = { x: last.x, y: last.y };
      }
    };
    raw.forEach((step, topIdx) => {
      if (step.par && Array.isArray(step.par)) {
        // Snapshot each role's position at par-START (for intra-par
        // resolution). Apply motion to posCursor AFTER so subsequent
        // top-level steps see post-par positions.
        const parStartSnap = {};
        for (const r in posCursor) parStartSnap[r] = { x: posCursor[r].x, y: posCursor[r].y };
        step.par.forEach((sub, subIdx) => {
          if (sub.ball || sub.ballFly || sub.ballTo) {
            addresses.push({ topIdx, subIdx });
            const b = sub.ball || {};
            const fireT = (sub.delay || 0);
            const arriveT = fireT + (b.dur || 0);
            const fromRole = b.from || null;
            fromPositions.push(fromRole
              ? _edRoleInParAtT(step.par, fromRole, parStartSnap, fireT)
              : null);
            let toPos = null;
            if (b.kind === 'shot' || b.kind === 'clear') {
              if (b.toX != null && b.toY != null) toPos = { x: b.toX, y: b.toY };
            } else if (b.kind === 'intercept') {
              if (b.interceptedBy) toPos = _edRoleInParAtT(step.par, b.interceptedBy, parStartSnap, arriveT);
            } else if (b.to) {
              toPos = _edRoleInParAtT(step.par, b.to, parStartSnap, arriveT);
            }
            toPositions.push(toPos);
          }
        });
        step.par.forEach(sub => { applyMotionTo(sub); });
      } else {
        applyMotionTo(step);
        if (step.ball || step.ballFly || step.ballTo) {
          addresses.push({ topIdx, subIdx: null });
          const fromRole = (step.ball && step.ball.from) || null;
          fromPositions.push(fromRole && posCursor[fromRole]
            ? { x: posCursor[fromRole].x, y: posCursor[fromRole].y }
            : null);
          toPositions.push(null);  // sentinel — fall back to endPos in the next loop
        }
      }
    });
    const ballEvents = _edCollectBallEvents(play, ed.activePhase);
    ballEvents.forEach((ev, i) => {
      const addr = addresses[i] || {};
      const from = fromPositions[i] || (ev.from && startPos[ev.from]);
      if (!from) return;
      let to = toPositions[i];
      if (!to) {
        if (ev.kind === 'shot' || ev.kind === 'clear') {
          if (ev.toX != null && ev.toY != null) to = { x: ev.toX, y: ev.toY };
        } else if (ev.kind === 'intercept') {
          to = ev.interceptedBy ? (endPos[ev.interceptedBy] || startPos[ev.interceptedBy]) : null;
        } else {
          to = ev.to ? (endPos[ev.to] || startPos[ev.to]) : null;
        }
      }
      if (!to) return;
      const colorByKind = {
        pass:      'rgba(255,255,255,0.9)',
        throw:     'rgba(255,255,255,0.9)',
        shot:      '#f5c400',
        clear:     'rgba(220,110,190,0.92)',
        intercept: 'rgba(220,80,80,0.95)',
      };
      const col = colorByKind[ev.kind] || 'rgba(255,255,255,0.85)';
      const g = el('g', { cursor: 'pointer' });
      g.dataset.edStepTop = String(addr.topIdx != null ? addr.topIdx : -1);
      if (addr.subIdx != null) g.dataset.edStepSub = String(addr.subIdx);
      g.dataset.edStepKind = 'ball';
      // Transparent hit strip along the arrow.
      g.appendChild(el('line', {
        x1: from.x, y1: from.y, x2: to.x, y2: to.y,
        stroke: 'transparent', 'stroke-width': '2.6'
      }));
      g.appendChild(el('line', {
        x1: from.x, y1: from.y, x2: to.x, y2: to.y,
        stroke: col, 'stroke-width': '0.7',
        'stroke-dasharray': ev.kind === 'intercept' ? '1.2 1.2' : '1.8 1.4',
        'stroke-linecap': 'round', 'pointer-events': 'none'
      }));
      // Arrow head at target
      const dx = to.x - from.x, dy = to.y - from.y;
      const len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len, px = -uy, py = ux, sz = 1.3;
      const tx = to.x - ux * sz * 2, ty = to.y - uy * sz * 2;
      g.appendChild(el('polygon', {
        points: `${to.x},${to.y} ${tx + px * sz},${ty + py * sz} ${tx - px * sz},${ty - py * sz}`,
        fill: col, 'pointer-events': 'none'
      }));
      dyn.appendChild(g);
    });
  }

  // Solid start-position circles. In setup phase, tag with data-playrole-start
  // so they are draggable (mutates ed.play.setup[role]).
  const isSetupPhase = _edIsSetupPhase(ed.activePhase);
  PLAY_ROLE_ORDER.forEach(role => {
    const s = startPos[role];
    if (!s) return;
    const cfg = edPlayRoleCfg(play, role);
    const g = el('g', isSetupPhase ? { cursor: 'grab' } : {});
    if (isSetupPhase) g.dataset.playroleStart = role;
    // Session H (Slice 4) — player circles and labels carry the same pl-* IDs
    // the Play Library engine expects, so _plRunFull animates them directly.
    // In motion phases, the solid start circles are not draggable — they're
    // display-only. Set pointer-events: none so they never steal clicks from
    // the dotted end-circles layered underneath (especially important when a
    // role's start and end positions are close together).
    const startAttrs = {
      id: `plc-${role}`,
      cx: s.x, cy: s.y, r: '2.8',
      fill: cfg.fill, stroke: 'rgba(0,0,0,0.2)', 'stroke-width': '0.3'
    };
    if (!isSetupPhase) startAttrs['pointer-events'] = 'none';
    g.appendChild(el('circle', startAttrs));
    const lbl = el('text', {
      id: `plt-${role}`,
      x: s.x, y: s.y,
      'font-size': cfg.label.length > 2 ? '2.0' : '2.3', 'font-weight': '800',
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      fill: 'white', 'pointer-events': 'none'
    });
    lbl.textContent = cfg.label;
    g.appendChild(lbl);
    dyn.appendChild(g);
  });

  // Ball (⚽) sits on the cardinal side facing the holder's direction of motion
  // in this phase. If the holder has no motion in the active phase, falls back
  // to the direction of the opponent goal (attackers face that goal). Matches
  // the runtime engine's ball-glue behavior so designer static view and
  // animation agree. Grabbable in setup phase only; drop transfers hasBall.
  const phaseHolder = _edPhaseBallHolder(play, ed.activePhase);
  if (phaseHolder && startPos[phaseHolder]) {
    const bp = startPos[phaseHolder];
    const dir = _edDesignerBallDir(play, ed.activePhase, phaseHolder, startPos);
    const bx = bp.x + dir.ox, by = bp.y + dir.oy;
    if (isSetupPhase) {
      const bg = el('g', { cursor: 'grab' });
      bg.dataset.playBall = '1';
      bg.appendChild(el('circle', { cx: bx, cy: by, r: '3', fill: 'transparent' }));
      const t = el('text', {
        id: 'pl-ball',
        x: bx, y: by,
        'font-size': '3.8', 'text-anchor': 'middle',
        'dominant-baseline': 'central', 'pointer-events': 'none'
      });
      t.textContent = '⚽';
      bg.appendChild(t);
      dyn.appendChild(bg);
    } else {
      const t = el('text', {
        id: 'pl-ball',
        x: bx, y: by,
        'font-size': '3.8', 'text-anchor': 'middle',
        'dominant-baseline': 'central', 'pointer-events': 'none'
      });
      t.textContent = '⚽';
      dyn.appendChild(t);
    }
  }

}


function edLoadScenario(scenarioId) {
  const s = SCENARIOS.find(sc => sc.id === scenarioId);
  if (!s) return;
  ed.placed = {}; ed.lines = []; ed.choices = ED_CHOICES_DEF(); ed.category = '';
  s.players.forEach(p => {
    const role = PID_TO_ROLE_ED[p.id];
    if (!role) return;
    ed.placed[role] = { x:p.x, y:p.y };
    if (p.heading) ed.placed[role].heading = { x:p.heading.x, y:p.heading.y };
  });
  // For you_has_ball scenarios (DP) the ball belongs on YOU, not on the carrier.
  // Set an explicit ball placement so the auto-fallback to carrier doesn't fire.
  const ballPlayer = s.players.find(p => p.hasBall);
  if (ballPlayer && ballPlayer.id !== 't1' && ballPlayer.id !== 'gk-home' && ballPlayer.id !== 'gk-away') {
    ed.placed['ball'] = { x: ballPlayer.x, y: ballPlayer.y };
  }
  s.choices.forEach(c => {
    const ec = ed.choices.find(ec => ec.id === c.id);
    if (!ec) return;
    ec.x = c.x; ec.y = c.y; ec.correct = !!c.correct; ec.stayStill = !!c.stayStill;
  });
  // Populate text fields
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('ed-id', s.id);
  set('ed-question', s.question);
  s.choices.forEach(c => {
    set(`ed-exp-${c.id}`, c.explanation || '');
    const ec = ed.choices.find(ec => ec.id === c.id);
    if (ec && c.choice_type) ec.choice_type = c.choice_type;
  });
  renderEditorSVG();
}

function edLoadFromJSON(jsonStr) {
  try {
    const t = JSON.parse(jsonStr);
    ed.placed = {}; ed.lines = []; ed.choices = ED_CHOICES_DEF(); ed.category = '';
    if (t.roles) {
      Object.entries(t.roles).forEach(([role, pos]) => {
        if (pos && pos.x != null) {
          ed.placed[role] = { x:pos.x, y:pos.y };
          if (!role.startsWith('gk') && role !== 'you' &&
              !(edIsDPSMode() && ['presser','cover','shadow','extra_defender'].includes(role))) {
            ed.placed[role].heading = { x:1, y:0 };
          }
        }
      });
    }
    if (t.choices) {
      t.choices.forEach(c => {
        const ec = ed.choices.find(ec => ec.id === c.id);
        if (!ec) return;
        if (c.stayStill) { ec.stayStill = true; const you = ed.placed['you']; if (you) { ec.x = you.x; ec.y = you.y; } }
        else if (c.target) { ec.x = c.target.x; ec.y = c.target.y; }
        ec.correct = !!c.correct;
      });
    }
    renderEditorSVG();
    return true;
  } catch(err) { alert('Invalid JSON: ' + err.message); return false; }
}

function edReadFields() {
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  return {
    id:       g('ed-id') || 'NEW-01',
    question: g('ed-question'),
    exp1:     g('ed-exp-1'),
    exp2:     g('ed-exp-2'),
    exp3:     g('ed-exp-3'),
    exp4:     g('ed-exp-4'),
    exp5:     g('ed-exp-5'),
  };
}

function edBuildTemplate(fields, placed, choices, concept) {
  const roles = {};
  // Determine explicit ball carrier from placed ball position (nearest player)
  let ballCarrier = null;
  if (placed['ball']) {
    const bx = placed['ball'].x, by = placed['ball'].y;
    let minDist = Infinity;
    Object.entries(placed).forEach(([role, p]) => {
      if (role === 'ball') return;
      const d = Math.hypot(p.x - bx, p.y - by);
      if (d < minDist) { minDist = d; ballCarrier = role; }
    });
  }
  // Build roles (exclude the virtual ball entry; include T3/D4 as extra players)
  Object.entries(placed).forEach(([role, p]) => {
    if (role === 'ball') return;
    roles[role] = { x: Math.round(p.x*10)/10, y: Math.round(p.y*10)/10 };
    if (p.heading) roles[role].heading = { x: Math.round(p.heading.x*100)/100, y: Math.round(p.heading.y*100)/100 };
  });
  const exps = { '1': fields.exp1||'', '2': fields.exp2||'', '3': fields.exp3||'', '4': fields.exp4||'', '5': fields.exp5||'' };
  const isDP = ed.category === 'decision' || (ed.category === '' && ballCarrier === 'you');
  if (isDP && roles['you']) delete roles['you'].heading; // YOU has no heading in DPS exports
  const isDefend = ed.category === 'defend';
  const resolvedCategory = ed.category || (isDP ? 'decision' : 'get_open');
  const builtChoices = choices.filter(c => c.x != null || c.stayStill).map(c => {
    const obj = { id:c.id, correct:c.correct };
    if (c.stayStill) { obj.stayStill = true; }
    else { obj.target = { x: Math.round(c.x*10)/10, y: Math.round(c.y*10)/10 }; }
    if (isDP) obj.choice_type = c.choice_type || ED_CHOICE_TYPES[c.id] || 'dribble';
    obj.explanation = exps[c.id] || '';
    return obj;
  });

  // Wire followUp from designer line annotations into exported choices.
  // Pass line (white arrow): receiving player dribbles to the line endpoint.
  //   The recipient is inferred as the nearest placed player to the choice target.
  // Score line (yellow arrow): shoot. Matched to the choice whose target is nearest
  //   the line start, OR chained after a pass line whose endpoint the score line starts near.
  // Lines are matched within 7 field units of a choice target position.
  if (isDP && ed.lines && ed.lines.length) {
    builtChoices.forEach(obj => {
      if (!obj.target) return;
      const cx = obj.target.x, cy = obj.target.y;
      const linked = ed.lines
        .filter(ln => Math.hypot(ln.x1 - cx, ln.y1 - cy) < 7)
        .sort((a, b) => Math.hypot(a.x1 - cx, a.y1 - cy) - Math.hypot(b.x1 - cx, b.y1 - cy));
      if (!linked.length) return;
      const steps = [];
      let lastX = cx, lastY = cy;
      for (const ln of linked) {
        if (ln.type === 'pass') {
          // Nearest placed player to the choice target = pass recipient → dribbles to line end
          let nearRole = null, nearDist = Infinity;
          Object.entries(placed).forEach(([role, p]) => {
            if (role === 'ball') return;
            const d = Math.hypot(p.x - cx, p.y - cy);
            if (d < nearDist) { nearDist = d; nearRole = role; }
          });
          const byId = nearRole ? (ROLE_TO_PID[nearRole] || nearRole) : null;
          const step = { type: 'dribble', endX: Math.round(ln.x2 * 10) / 10, endY: Math.round(ln.y2 * 10) / 10 };
          if (byId) step.by = byId;
          steps.push(step);
          lastX = ln.x2; lastY = ln.y2;
        } else if (ln.type === 'score') {
          if (!steps.some(s => s.type === 'shoot')) steps.push({ type: 'shoot' });
        }
      }
      // Check for a score line chained from where a pass line ended
      if (steps.length && (lastX !== cx || lastY !== cy)) {
        ed.lines
          .filter(ln => ln.type === 'score' && Math.hypot(ln.x1 - lastX, ln.y1 - lastY) < 7)
          .forEach(() => { if (!steps.some(s => s.type === 'shoot')) steps.push({ type: 'shoot' }); });
      }
      if (steps.length) obj.followUp = steps;
    });
  }
  // Fallback: auto-add shoot for correct DPS dribble choices with no line-detected followUp.
  if (isDP) {
    builtChoices.forEach(obj => {
      if (obj.correct && obj.choice_type === 'dribble' && !obj.followUp) {
        obj.followUp = [{ type: 'shoot' }];
      }
    });
  }
  const conceptInfo = concept ? ED_CONCEPTS.find(c => c.key === concept) : null;
  const out = {
    _reminder: "IMPORTANT: Amy likely has not updated explanations. Review and rewrite ALL choice explanations before wiring in. Verify choice_type values (dribble/pass/shoot) match the intended action.",
    id: fields.id,
    category: resolvedCategory,
    concept: conceptInfo ? conceptInfo.label.replace(' (exists)','') : '',
    question: fields.question,
    roles,
    choices: builtChoices
  };
  if (isDP) out.you_has_ball = true;
  if (isDefend) out.attacker_has_ball = true;
  if (ballCarrier) out.ball_carrier = ballCarrier;
  return out;
}

function generateEditorJSON() {
  if (ed.playMode && ed.play) return edBuildPlayExport();
  return JSON.stringify(edBuildTemplate(edReadFields(), ed.placed, ed.choices, ed.concept), null, 2);
}

// Slice 6 — Play Library export. Serializes the edited `ed.play` in the same shape
// as CORRECT_PLAYS entries, with a _reminder field that tells the agent to replace
// the matching id in CORRECT_PLAYS (or to diff against the baseline before wiring).
// Description edits flow through ed-question when ed.playMode is true.
function edBuildPlayExport() {
  const out = {
    _reminder: "IMPORTANT: Replace the CORRECT_PLAYS entry with matching `id`. Deep-clone before edits. concept_steps binding (Invariant 7) and release-geometry (Rule A) still apply — run verify scripts after wiring.",
  };
  // Start with a deep copy of the edited play so field order is predictable.
  const play = JSON.parse(JSON.stringify(ed.play));
  // Reflect the Description textarea back into the play if the user edited it.
  const descEl = document.getElementById('ed-question');
  if (descEl && descEl.value != null) {
    const v = String(descEl.value).trim();
    if (v.length) play.description = v;
  }
  // Reflect the Scenario-ID field back onto the play.id (allows renaming if needed).
  const idEl = document.getElementById('ed-id');
  if (idEl && idEl.value && String(idEl.value).trim().length) {
    play.id = String(idEl.value).trim();
  }
  // Preserve known top-level keys in a stable order.
  const ordered = {
    id: play.id,
    name: play.name,
    level: play.level,
    actionTeam: play.actionTeam,
    concept: play.concept,
    description: play.description,
  };
  if (play.concept_steps) ordered.concept_steps = play.concept_steps;
  ordered.setup   = play.setup;
  // Session G: if phases[] diverged from prePlay/payoff (edits via the
  // designer push into phases[] only), rebuild prePlay/payoff from phases[]
  // so the exported JSON reflects the user's edits. First phase maps to
  // prePlay, the rest concatenate into payoff. 3+ phase plays preserve all
  // steps via payoff until Slice 5 adopts phases[] as the source shape.
  if (Array.isArray(play.phases) && play.phases.length) {
    ordered.prePlay = play.phases[0] || [];
    ordered.payoff  = play.phases.slice(1).reduce((acc, ph) => acc.concat(ph || []), []);
  } else {
    ordered.prePlay = play.prePlay;
    ordered.payoff  = play.payoff;
  }
  // Carry any other keys that future schema adds (except phases[] — legacy
  // output shape keeps the prePlay/payoff form for downstream wire-in).
  for (const k of Object.keys(play)) {
    if (k === 'phases') continue;
    if (!(k in ordered)) ordered[k] = play[k];
  }
  out.play = ordered;
  return JSON.stringify(out, null, 2);
}

function edSaveDraft() {
  const fields = edReadFields();
  const draft = {
    id: fields.id,
    concept: ed.concept,
    question: fields.question,
    explanations: { '1': fields.exp1, '2': fields.exp2, '3': fields.exp3, '4': fields.exp4, '5': fields.exp5 },
    placed: JSON.parse(JSON.stringify(ed.placed)),
    choices: ed.choices.map(c => Object.assign({}, c)),
    lines: ed.lines.slice()
  };
  const idx = ed.drafts.findIndex(d => d.id === draft.id);
  if (idx >= 0) ed.drafts[idx] = draft; else ed.drafts.push(draft);
  renderDraftsList();
  refreshLoadDropdown();
  const btn = document.getElementById('ed-save-btn');
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save Draft'; }, 1400); }
}

function edLoadDraft(draftId) {

  set('ed-exp-3', (draft.explanations||{})['3']);
  set('ed-exp-4', (draft.explanations||{})['4']);
  set('ed-exp-5', (draft.explanations||{})['5']);
  const cSel = document.getElementById('ed-concept-sel');
  if (cSel) cSel.value = draft.concept || '';

  const desc = document.getElementById('ed-concept-desc');
  if (desc) desc.textContent = info ? info.desc : 'Pick a concept above to see what to design.';

function renderDraftsList() {

    list.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.28);padding:4px 0">No drafts saved yet.</div>';

function edExportAllDrafts() {
  if (!ed.drafts.length) return '// No drafts saved.';
  const templates = ed.drafts.map(d => {
    const fields = { id: d.id, question: d.question||'', exp1: (d.explanations||{})['1']||'', exp2: (d.explanations||{})['2']||'', exp3: (d.explanations||{})['3']||'' };
    return edBuildTemplate(fields, d.placed, d.choices, d.concept);
  });
  return JSON.stringify(templates, null, 2);
}

// =====================================================================
// Play-mode drafts (Session I). Mirrors the scenario draft pattern but
// stores a deep-cloned `ed.play` snapshot. In-memory only (same as the
// scenario drafts — they don't persist across reloads).
// =====================================================================
function edSavePlayDraft() {
  if (!ed.playMode || !ed.play) return;
  const idField   = document.getElementById('ed-id');
  const descField = document.getElementById('ed-question');
  const draftId   = (idField && idField.value.trim()) || ed.play.id || 'untitled-play';
  const draftDesc = (descField && descField.value.trim()) || ed.play.description || '';

  const draft = {
    id: draftId,
    description: draftDesc,
    savedAt: Date.now(),
    play: JSON.parse(JSON.stringify(ed.play))
  };
  // Reflect textarea edits back onto the play stored in the draft.
  if (draftDesc) draft.play.description = draftDesc;
  if (idField && idField.value.trim()) draft.play.id = idField.value.trim();

  const idx = ed.playDrafts.findIndex(d => d.id === draft.id);
  if (idx >= 0) ed.playDrafts[idx] = draft; else ed.playDrafts.push(draft);
  renderPlayDraftsList();
  refreshLoadDropdown();

  // Sync to the runtime CORRECT_PLAYS so Play Library immediately reflects edits.
  const liveIdx = CORRECT_PLAYS.findIndex(p => p.id === draftId);
  if (liveIdx >= 0) {
    const live = JSON.parse(JSON.stringify(draft.play));
    // Rebuild prePlay/payoff from phases[] (mirrors edBuildPlayExport logic).
    if (Array.isArray(live.phases) && live.phases.length) {
      live.prePlay = live.phases[0] || [];
      live.payoff  = live.phases.slice(1).reduce((acc, ph) => acc.concat(ph || []), []);
    }
    delete live.phases;
    _plCompilePhases(live);
    Object.assign(CORRECT_PLAYS[liveIdx], live);
  }

  const btn = document.getElementById('ed-play-save-btn');
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save Play Draft'; }, 1400); }
}

function edLoadPlayDraft(draftId) {
  const draft = ed.playDrafts.find(d => d.id === draftId);
  if (!draft || !draft.play) return;
  ed.play = JSON.parse(JSON.stringify(draft.play));
  // Rebuild phases[] to ensure references align with the clone.
  delete ed.play.phases;
  if (typeof _plCompilePhases === 'function') _plCompilePhases(ed.play);
  ed.designMode = 'play';
  ed.playMode = true;
  ed.activePhase = 'setup';
  ed.placed = {}; ed.choices = ED_CHOICES_DEF(); ed.lines = []; ed.category = '';
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('ed-id', draft.id);
  set('ed-question', draft.description || ed.play.description || '');
  set('ed-exp-1', ''); set('ed-exp-2', ''); set('ed-exp-3', '');
  set('ed-exp-4', ''); set('ed-exp-5', '');
  _edTogglePlayModeUI();
  renderPhaseTimeline();
  renderEditorSVG();
  _edResetHistory();
}

function renderPlayDraftsList() {
  const list = document.getElementById('ed-play-drafts-list');
  if (!list) return;
  if (!ed.playDrafts.length) {
    list.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.28);padding:4px 0">No play drafts saved yet.</div>';
    return;
  }
  list.innerHTML = ed.playDrafts.map((d, i) => {
    const when = d.savedAt ? new Date(d.savedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

function refreshLoadDropdown() {
  const sel = document.getElementById('ed-load-sel');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '';
  const add = (val, text, disabled) => {
    const o = document.createElement('option');
    o.value = val; o.textContent = text; if (disabled) o.disabled = true;
    sel.appendChild(o);
  };
  if (ed.designMode === 'play') {
    // Play mode: show Play Library entries and any saved play drafts.
    add('', '── Play Library ──', true);
    if (Array.isArray(CORRECT_PLAYS) && CORRECT_PLAYS.length) {
      const _plSorted = [...CORRECT_PLAYS].sort((a, b) => {
        // Section rank: Offensive (0), Defensive (1), PP Advanced (2)
        const rank = p => p.section === 'PP' ? 2 : (p.actionTeam === 'A' ? 0 : 1);
        const ra = rank(a), rb = rank(b);
        if (ra !== rb) return ra - rb;
        // Within section: sort by trailing number only (avoids L1-A3 → "13" collision)
        const trailNum = id => parseInt((id.match(/(\d+)$/) || ['0'])[0]) || 0;
        return trailNum(a.id) - trailNum(b.id);
      });
      _plSorted.forEach(p => add(`play:${p.id}`, `${p.id} — ${p.name}`));
    }
    if (ed.playDrafts && ed.playDrafts.length) {
      add('', '── My Play Drafts ──', true);
      ed.playDrafts.forEach(d => add(`playdraft:${d.id}`, d.id));
    }
  } else {
    // Scenario mode: show Game Scenarios and My Drafts only
    add('', '── Game Scenarios ──', true);
    const _catOrder = {get_open:0, decision:1, defend:2, set_pieces:3};
    const _sorted = [...SCENARIOS].sort((a,b) => {
      const ca = _catOrder[a.category]??99, cb = _catOrder[b.category]??99;
      if (ca !== cb) return ca - cb;
      return (parseInt(a.id.replace(/[^\d]/g,''))||0) - (parseInt(b.id.replace(/[^\d]/g,''))||0);
    });
    _sorted.forEach(s => add(s.id, `${s.id} — ${s.concept}`));
    if (ed.drafts.length) {
      add('', '── My Drafts ──', true);
      ed.drafts.forEach(d => {
        const label = d.concept ? (ED_CONCEPTS.find(c=>c.key===d.concept)||{label:d.concept}).label.split(' (')[0] : 'Draft';
        add(`draft:${d.id}`, `${d.id} — ${label}`);
      });
    }
  }
  if (prev) { const m = sel.querySelector(`option[value="${CSS.escape(prev)}"]`); if (m) sel.value = prev; }
}

      status.textContent = labels[lineTool] + hint;

  });

}

// Tracks which role currently holds the ball during payoff animation
let _plBallHolder = null;
// Tracks each player's movement direction as {ox, oy} ball offset from their center
let _plDirs = {};
// Current play's actionTeam ('A' or 'D'). Set by _plWatchPlay. Used by _plRunBallStep
// to determine the attack direction (east for A-series, west for D-series) when
// computing the ball landing cardinal on the receiver.
let _plActionTeam = 'A';
// ID of the play currently loaded in the Play Library viewer. Used to show custom
// flash labels (e.g. "OFFSIDE PASS!" for the Hold the Line offside trap play).
let _plCurrentPlayId = null;
// Session AE — Intercept-carry cardinal realignment.
// When a ball is intercepted, the arrival cardinal is the APPROACH vector (ball came
// from the passer). The interceptor then turns and carries in a NEW direction. Without
// realignment, the held-ball offset (captured from DOM at _plMovePlayer start) stays on
// the approach side for the entire carry, producing the 90-degree-off ball seen in
// Straight Drive (Session AE, issue #1). This flag signals the NEXT _plMovePlayer /
// _plMovePlayerWaypoints call for the interceptor to override its held-ball offset with
// the movement cardinal so the ball leads the carry. Flag is consumed exactly once and
// cleared on consumption.
let _plJustIntercepted = null;

// Mirror x-coordinates for offensive plays so they attack right (toward x=100).
// Defensive plays (actionTeam='D') are unchanged — attackers already come from the right.
// Concept_steps renderer (Invariant 7). Walks an array of { actor, action, target? } into a
// compact description. When a play provides concept_steps, the viewer renders from it so that
// text and animation share the same source. Falls back to play.description when absent.
const _PL_ACTION_PHRASES = {
  carries_forward:  a => `${a} carries forward`,
  carries_wide:     a => `${a} drives wide to the byline`,
  drives_inside:    a => `${a} drives inside`,
  checks_back:      a => `${a} checks back to the ball`,
  receives:         a => `${a} receives`,
  holds:            a => `${a} holds shape`,
  runs_in_behind:   a => `${a} runs in behind`,
  runs_near_post:   a => `${a} runs to the near post`,
  runs_far_post:    a => `${a} runs to the far post`,
  overlaps:         a => `${a} overlaps`,
  passes_to:        (a, t) => `${a} passes to ${t}`,
  crosses_to:       (a, t) => `${a} crosses to ${t}`,
  plays_in:         (a, t) => `${a} plays in ${t}`,
  one_touch_to:     (a, t) => `${a} one-touches to ${t}`,
  shoots:           a => `${a} shoots`,
  scores:           a => `${a} scores`,
};
function _plRenderConceptSteps(steps) {
  if (!Array.isArray(steps) || !steps.length) return '';
  const label = r => (r === 'DY' ? 'YOU' : r);
  const parts = steps.map(s => {
    const fn = _PL_ACTION_PHRASES[s.action];
    const a = label(s.actor);
    const t = s.target ? label(s.target) : undefined;
    if (fn) return fn(a, t);
    // Fallback: humanize underscored action
    const phrase = String(s.action || '').replace(/_/g, ' ');
    return t ? `${a} ${phrase} ${t}` : `${a} ${phrase}`;
  });
  return parts.join('. ') + '.';
}

function _plTransformPlay(play) {
  if (play.actionTeam !== 'A') return play;
  const fx = x => 100 - x;
  const flipPos  = p => ({ ...p, x: fx(p.x) });
  const flipSetup = s => Object.fromEntries(Object.entries(s).map(([r, p]) => [r, flipPos(p)]));
  const flipStep  = s => {
    if (s.ballFly || s.ballTo || s.pause) return s;
    if (s.par) return { ...s, par: s.par.map(flipStep) };
    const out = { ...s };
    if ('toX' in s) out.toX = fx(s.toX);
    if (s.ball && 'toX' in s.ball) out.ball = { ...s.ball, toX: fx(s.ball.toX) };
    if (Array.isArray(s.waypoints)) out.waypoints = s.waypoints.map(w => ({ ...w, x: fx(w.x) }));
    return out;
  };
  const out = {
    ...play,
    setup:   flipSetup(play.setup),
    prePlay: (play.prePlay || []).map(flipStep),
    payoff:  (play.payoff  || []).map(flipStep),
  };
  // Mirror phases[] too so designer render paths that prefer phases see flipped coords.
  if (Array.isArray(play.phases)) {
    out.phases = play.phases.map(phase => (phase || []).map(flipStep));
  }
  return out;
}

function _plWatchPlay(playOrId, speedMult) {
  speedMult = speedMult || 1;
  _plClear();
  // Accept either a play ID (string) or an already-loaded play object.
  // Object form is used by the Scenario Designer's Preview button to animate
  // an edited `ed.play` without round-tripping through CORRECT_PLAYS.
  const rawPlay = (typeof playOrId === 'string')
    ? CORRECT_PLAYS.find(p => p.id === playOrId)
    : playOrId;
  const play = _plTransformPlay(rawPlay);
  if (!play) return;
  const playId = rawPlay && rawPlay.id;
  _plActionTeam = play.actionTeam || 'A';
  _plCurrentPlayId = playId || null;

  document.querySelectorAll('.play-lib-item').forEach(el => {
    el.classList.toggle('active', el.dataset.playId === playId);
  });

  // Update text areas in place
  const titleEl   = document.getElementById('pl-title');
  const descEl    = document.getElementById('pl-desc');
  const conceptEl = document.getElementById('pl-concept-svg');
  if (titleEl)   { titleEl.textContent = play.name; titleEl.style.opacity = ''; titleEl.style.fontStyle = ''; }
  if (descEl) {
    // Always show the hand-authored description. concept_steps are used for
    // structural validation (Invariant 7) only, not for display.
    descEl.textContent = play.description || (play.concept_steps ? _plRenderConceptSteps(play.concept_steps) : '');
  }
  if (conceptEl) conceptEl.textContent = play.concept;

  // Update attack arrow direction
  const arrowEl = document.getElementById('pl-attack-arrow');
  if (arrowEl) {
    if (play.actionTeam === 'A') {
      arrowEl.setAttribute('x', '88'); arrowEl.textContent = 'Attack →';
    } else {
      arrowEl.setAttribute('x', '2');  arrowEl.textContent = '← Attack';
    }
    arrowEl.setAttribute('fill', 'rgba(255,255,255,0.3)');
  }

  // Color scheme: actionTeam drives which team is blue vs red
  const isDefAction = (play.actionTeam !== 'A');
  const ROLE_CFG = {
    A1: { fill: isDefAction ? '#d9393a' : '#2e6dd1', label: 'A', fs: '2.3' },
    A2: { fill: isDefAction ? '#bf2020' : '#3a5fbf', label: 'A', fs: '2.3' },
    A3: { fill: isDefAction ? '#9a1010' : '#1e4fa0', label: 'A', fs: '2.3' },
    A4: { fill: isDefAction ? '#7a1010' : '#163c7a', label: 'A', fs: '2.3' },
    D1: { fill: isDefAction ? '#2e6dd1' : '#d9393a', label: 'D', fs: '2.3' },
    D2: { fill: isDefAction ? '#6fa3e8' : '#bf2020', label: 'D', fs: '2.3' },
    D3: { fill: isDefAction ? '#3a5fbf' : '#9a1010', label: 'D', fs: '2.3' },
    DY: { fill: '#f5b301', label: 'You', fs: '1.8' },
    // Opposing GK (A-series: the GK being attacked) renders red. Home GK stays blue.
    GK: { fill: isDefAction ? '#4a8fbf' : '#b33', label: 'G', fs: '2.3' },
  };

  // Clear old players and ball, then repopulate
  const playersG = document.getElementById('pl-players');
  const svg      = document.getElementById('pl-svg');
  if (!playersG || !svg) return;

  const oldBall = document.getElementById('pl-ball');
  if (oldBall) oldBall.remove();

  _plDirs = {};
  _plJustIntercepted = null;
  let ballRole = null;
  let playersHTML = '';
  Object.entries(play.setup).forEach(([role, pos]) => {
    if (pos.hasBall) { ballRole = role; _plBallHolder = role; }
    const cfg = ROLE_CFG[role] || { fill: '#888', label: '?', fs: '2.3' };
    playersHTML += `<circle id="plc-${role}" cx="${pos.x}" cy="${pos.y}" r="2.8" fill="${cfg.fill}" stroke="rgba(0,0,0,0.2)" stroke-width="0.3"/>` +
      `<text id="plt-${role}" x="${pos.x}" y="${pos.y}" font-size="${cfg.fs}" font-weight="800" text-anchor="middle" dominant-baseline="central" fill="white" pointer-events="none" font-family="-apple-system,system-ui,Arial,sans-serif">${cfg.label}</text>`;
  });
  playersG.innerHTML = playersHTML;

  // Place ball element on top of players
  if (ballRole && play.setup[ballRole]) {
    const bp = play.setup[ballRole];
    let initOx = 3.5, initOy = 0;
    if (play.prePlay) {
      for (const step of play.prePlay) {
        let found = null;
        if (step.par) { found = step.par.find(s => s.role === ballRole); }
        else if (step.role === ballRole) { found = step; }
        if (found) {
          const dx = found.toX - bp.x, dy = found.toY - bp.y;
          const d = Math.hypot(dx, dy);
          if (d > 0.5) {
            if (Math.abs(dx) >= Math.abs(dy)) { initOx = dx > 0 ? 3.5 : -3.5; initOy = 0; }
            else { initOx = 0; initOy = dy > 0 ? 3.5 : -3.5; }
          }
          break;
        }
      }
    }
    _plDirs[ballRole] = { ox: initOx, oy: initOy };
    const ballEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    ballEl.id = 'pl-ball';
    ballEl.setAttribute('x', String(bp.x + initOx));
    ballEl.setAttribute('y', String(bp.y + initOy));
    ballEl.setAttribute('font-size', '4.2');
    ballEl.setAttribute('text-anchor', 'middle');
    ballEl.setAttribute('dominant-baseline', 'central');
    ballEl.setAttribute('pointer-events', 'none');
    ballEl.textContent = '⚽';
    svg.appendChild(ballEl);
  }

  // Bug A fix: initialize GK held-ball offsets to the field-facing side. Stationary
  // GKs never get a movement cardinal stamped, so without this the ball can land on
  // the goal-line side when a back-pass arrives (PP-2: home GK at displayed x=5 was
  // receiving on the west side, away from the field). Rule: home GK (x<50) faces
  // east, away GK (x>50) faces west.
  Object.entries(play.setup).forEach(([role, pos]) => {
    if (role === 'GK' || role === 'gk_home' || role === 'gk_away') {
      if (!_plDirs[role]) {
        const ox = pos.x < 50 ? 3.5 : -3.5;
        _plDirs[role] = { ox: ox, oy: 0 };
      }
    }
  });

  // Enable and wire buttons (use onclick to avoid stacking listeners on Replay)
  const replayBtn = document.getElementById('pl-replay-btn');
  const slomoBtn  = document.getElementById('pl-slomo-btn');
  // Replay and slomo re-invoke with the ORIGINAL argument so designer preview
  // (which passes an edited play object) replays that same object, not the
  // unedited CORRECT_PLAYS entry.
  if (replayBtn) { replayBtn.disabled = false; replayBtn.style.opacity = ''; replayBtn.onclick = () => _plWatchPlay(playOrId); }
  if (slomoBtn)  { slomoBtn.onclick = () => _plWatchPlay(playOrId, 2); }

  // Run full animation immediately — prePlay then payoff in one continuous chain
  _plRunFull(play, speedMult);
}

function _plMovePlayer(role, endX, endY, dur, onDone) {
  // Smoothly moves a player circle + label to (endX, endY) in field coords.
  const circle = document.getElementById(`plc-${role}`);
  const text   = document.getElementById(`plt-${role}`);
  if (!circle || !text) { if (onDone) onDone(); return; }

  const startX = parseFloat(circle.getAttribute('cx'));
  const startY = parseFloat(circle.getAttribute('cy'));

  // Ball stays on the cardinal side it already occupies when this move starts. Do NOT
  // recompute a movement cardinal and stamp _plDirs here — that caused visible cross-circle
  // jumps whenever a receiver's next movement direction differed from the ball's arrival
  // side. The ball is only repositioned by ball events (release, arrival, intercept); in
  // between, it is glued to the holder at a fixed offset captured at move-start.
  let heldBallOx = 0, heldBallOy = 0;
  const heldBallAtStart = (_plBallHolder === role);
  if (heldBallAtStart) {
    const bEl = document.getElementById('pl-ball');
    if (bEl) {
      heldBallOx = parseFloat(bEl.getAttribute('x')) - startX;
      heldBallOy = parseFloat(bEl.getAttribute('y')) - startY;
    } else {
      const d = _plDirs[role] || { ox: 3.5, oy: 0 };
      heldBallOx = d.ox; heldBallOy = d.oy;
    }
  }

  // For non-holders (and for _plDirs tracking purposes), compute and stamp the movement
  // cardinal so any subsequent ball event that reads _plDirs[role] sees a direction.
  const movDx = endX - startX, movDy = endY - startY;
  const movDist = Math.hypot(movDx, movDy);
  let ox, oy;
  if (movDist > 0.5) {
    if (Math.abs(movDx) >= Math.abs(movDy)) {
      ox = movDx > 0 ? 3.5 : -3.5;
      oy = 0;
    } else {
      ox = 0;
      oy = movDy > 0 ? 3.5 : -3.5;
    }
  } else {
    const prev = _plDirs[role];
    ox = prev ? prev.ox : 3.5;
    oy = prev ? prev.oy : 0;
  }
  // Only stamp the movement cardinal into _plDirs if this role is NOT currently holding
  // the ball — otherwise the pre-existing cardinal (from pass arrival) must be preserved
  // so the ball keeps its resting side.
  if (!heldBallAtStart) {
    _plDirs[role] = { ox, oy };
  }

  // Session AE — Intercept-carry realignment. If this role just received the ball via
  // intercept, override the held-ball offset (currently the approach cardinal captured
  // from DOM) with the movement cardinal so the ball leads the carry. Clear the flag.
  if (heldBallAtStart && _plJustIntercepted === role && movDist > 0.5) {
    heldBallOx = ox;
    heldBallOy = oy;
    _plDirs[role] = { ox, oy };
    _plJustIntercepted = null;
  }

  const frameCount = Math.max(1, Math.round(dur / 16));
  let frame = 0;
  let lastHolder = heldBallAtStart ? role : null;

  const intv = setInterval(() => {
    frame++;
    const p = frame / frameCount;
    // Session J — linear interp (constant velocity). The prior easeInOut
    // curve had velocity=0 at both endpoints, producing a visible decel at
    // the end of each motion and an accel at the start of the next. Amy
    // observed this as "deceleration or pause between phase 1 and phase 2"
    // and between sequential steps in a phase. Linear keeps motion moving
    // through phase boundaries at the same speed, matching the waypoint
    // engine's existing linear-per-segment behavior.
    const t = p;
    const cx = startX + (endX - startX) * t;
    const cy = startY + (endY - startY) * t;
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    text.setAttribute('x', cx);
    text.setAttribute('y', cy);
    if (_plBallHolder === role) {
      const ball = document.getElementById('pl-ball');
      if (ball) {
        // If this role JUST became the holder mid-move (e.g. ball arrived via pass while
        // the receiver was still running), recapture the offset from ball's current DOM
        // position. Otherwise the initial heldBallOx/Oy (captured at move-start when the
        // role wasn't holding) would snap the ball to the receiver's center on the next
        // tick — a visible jolt right after pass arrival.
        if (lastHolder !== role) {
          heldBallOx = parseFloat(ball.getAttribute('x')) - cx;
          heldBallOy = parseFloat(ball.getAttribute('y')) - cy;
          lastHolder = role;
        }
        ball.setAttribute('x', cx + heldBallOx);
        ball.setAttribute('y', cy + heldBallOy);
      }
    } else if (lastHolder === role) {
      // Lost the ball mid-move (released a pass). Stop glueing.
      lastHolder = null;
    }
    if (frame >= frameCount) {
      clearInterval(intv);
      _plIntervals = _plIntervals.filter(i => i !== intv);
      if (onDone) onDone();
    }
  }, 16);
  _plIntervals.push(intv);
}

// Session AB — waypoint chaining primitive.
// Consumes { role, waypoints: [{x, y, dur}, ...] } step shape. Plays a continuous
// polyline from the role's current DOM position through each waypoint in sequence.
// Within each segment: LINEAR interpolation. Kills the par-boundary velocity-zero
// pause that multi-par motion produced. Authors who want outer ease can prepend a
// short "ramp" waypoint. Segment timing is preserved exactly: the Nth waypoint is
// hit at cumulative dur from the start. No per-segment ease, no global re-map.
// Held-ball glue, _plDirs cardinal stamp, and mid-move holder recapture all mirror
// _plMovePlayer behavior so ball physics are identical.
function _plMovePlayerWaypoints(role, waypoints, onDone) {
  const circle = document.getElementById(`plc-${role}`);
  const text   = document.getElementById(`plt-${role}`);
  if (!circle || !text || !Array.isArray(waypoints) || !waypoints.length) { if (onDone) onDone(); return; }

  const startX = parseFloat(circle.getAttribute('cx'));
  const startY = parseFloat(circle.getAttribute('cy'));

  // Session J — per-segment delay on waypoints. Build a timeline of phases,
  // each either a 'wait' (stationary) or 'move' (linear interp). Delay on
  // waypoint[i] for i > 0 pauses at waypoint[i-1] for `delay` ms before the
  // motion toward waypoint[i] begins. Waypoint[0].delay is NOT honored here;
  // step.delay (upstream) is the pre-segment-1 pause.
  const segs = [];
  let cx = startX, cy = startY;
  let t0 = 0;
  for (let i = 0; i < waypoints.length; i++) {
    const w = waypoints[i];
    const interDelay = i > 0 ? (w.delay || 0) : 0;
    if (interDelay > 0) {
      segs.push({ kind: 'wait', x: cx, y: cy, startMs: t0, endMs: t0 + interDelay });
      t0 += interDelay;
    }
    const dur = w.dur || 0;
    segs.push({
      kind: 'move',
      fromX: cx, fromY: cy, toX: w.x, toY: w.y,
      startMs: t0, endMs: t0 + dur
    });
    t0 += dur;
    cx = w.x; cy = w.y;
  }
  const totalDur = t0;
  if (totalDur <= 0) {
    circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
    text.setAttribute('x', cx); text.setAttribute('y', cy);
    if (onDone) onDone();
    return;
  }

  let heldBallOx = 0, heldBallOy = 0;
  const heldBallAtStart = (_plBallHolder === role);
  if (heldBallAtStart) {
    const bEl = document.getElementById('pl-ball');
    if (bEl) {
      heldBallOx = parseFloat(bEl.getAttribute('x')) - startX;
      heldBallOy = parseFloat(bEl.getAttribute('y')) - startY;
    } else {
      const d = _plDirs[role] || { ox: 3.5, oy: 0 };
      heldBallOx = d.ox; heldBallOy = d.oy;
    }
  }

  // Stamp cardinal from overall direction (start → final waypoint).
  const finalWp = waypoints[waypoints.length - 1];
  const movDx = finalWp.x - startX, movDy = finalWp.y - startY;
  const movDist = Math.hypot(movDx, movDy);
  let ox, oy;
  if (movDist > 0.5) {
    if (Math.abs(movDx) >= Math.abs(movDy)) { ox = movDx > 0 ? 3.5 : -3.5; oy = 0; }
    else { ox = 0; oy = movDy > 0 ? 3.5 : -3.5; }
  } else {
    const prev = _plDirs[role];
    ox = prev ? prev.ox : 3.5;
    oy = prev ? prev.oy : 0;
  }
  if (!heldBallAtStart) _plDirs[role] = { ox, oy };

  // Session AE — Intercept-carry realignment (matches _plMovePlayer).
  if (heldBallAtStart && _plJustIntercepted === role && movDist > 0.5) {
    heldBallOx = ox;
    heldBallOy = oy;
    _plDirs[role] = { ox, oy };
    _plJustIntercepted = null;
  }

  const frameCount = Math.max(1, Math.round(totalDur / 16));
  let frame = 0;
  let lastHolder = heldBallAtStart ? role : null;

  const intv = setInterval(() => {
    frame++;
    const p = frame / frameCount;
    const t = p * totalDur;
    // Find the last segment whose startMs <= t.
    let seg = segs[0];
    for (const s of segs) if (s.startMs <= t) seg = s;
    let px, py;
    if (seg.kind === 'wait') {
      px = seg.x; py = seg.y;
    } else {
      const segDur = seg.endMs - seg.startMs;
      const localT = segDur > 0 ? Math.max(0, Math.min(1, (t - seg.startMs) / segDur)) : 1;
      px = seg.fromX + (seg.toX - seg.fromX) * localT;
      py = seg.fromY + (seg.toY - seg.fromY) * localT;
    }
    circle.setAttribute('cx', px);
    circle.setAttribute('cy', py);
    text.setAttribute('x', px);
    text.setAttribute('y', py);
    if (_plBallHolder === role) {
      const ball = document.getElementById('pl-ball');
      if (ball) {
        if (lastHolder !== role) {
          heldBallOx = parseFloat(ball.getAttribute('x')) - px;
          heldBallOy = parseFloat(ball.getAttribute('y')) - py;
          lastHolder = role;
        }
        ball.setAttribute('x', px + heldBallOx);
        ball.setAttribute('y', py + heldBallOy);
      }
    } else if (lastHolder === role) {
      lastHolder = null;
    }
    if (frame >= frameCount) {
      clearInterval(intv);
      _plIntervals = _plIntervals.filter(i => i !== intv);
      if (onDone) onDone();
    }
  }, 16);
  _plIntervals.push(intv);
}

// ============================================================
// SESSION X — TYPED BALL CONSTRUCT
// ============================================================
// Single step primitive for every ball event, replacing the thin ballFly/ballTo pair.
// Shape: { ball: { from, to, kind, interceptedBy?, dur, delay? } }
// kind ∈ {pass, shot, clear, throw, intercept}
//   pass     — teammate-to-teammate straight flight; holder = to on arrival.
//   shot     — ball flies to goal target (to is a role or explicit toX/toY).
//   clear    — ball flies out of play to (toX,toY); green flash on launch; holder stays null.
//   throw    — throw-in; same holder semantics as pass (visual distinction optional).
//   intercept— ball aimed at `to`, but `interceptedBy` cuts the flight: trajectory bends to
//              the interceptor's projection on the from→to segment; holder = interceptedBy
//              on arrival at the bend point. No pass-through. No jolt.
// Holder atomicity (Invariant 3): _plBallHolder transitions on ball arrival, not on any
// player's movement completion. Timing alignment is the author's responsibility.
//
// Runtime rule (Session Z — engine rulebook Runtime-1): when called inside a par, the ball
// aims at the receiver's position at BALL-ARRIVAL TIME, not the receiver's final par
// destination. Fixes "ball moves backward to where receiver will be in future" bug across
// Through Ball, Give-and-Go return pass, and every offensive payoff with staggered timing.
// Show "Intercept!" in the dark-green margin below the field — completely outside the
// animation area so it never overlaps any player or the ball regardless of where the
// intercept happens on the field. Only fires when DY (YOU) wins the ball.
function _plShowTextFlash(text) {
  const svg = document.getElementById('pl-svg');
  if (!svg) return;
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  el.setAttribute('x', '50');
  el.setAttribute('y', '63.5');
  el.setAttribute('text-anchor', 'middle');
  el.setAttribute('font-size', '2.6');
  el.setAttribute('font-weight', '700');
  el.setAttribute('fill', '#f5b301');
  el.setAttribute('letter-spacing', '0.04em');
  el.setAttribute('font-family', '-apple-system,system-ui,Arial,sans-serif');
  el.setAttribute('pointer-events', 'none');
  el.style.animation = 'plInterceptFade 1.4s ease-out forwards';
  el.textContent = text;
  svg.appendChild(el);
  const tId = setTimeout(() => el.remove(), 1450);
  _plTimeouts.push(tId);
}

function _plShowInterceptFlash() {
  _plShowTextFlash('INTERCEPT!');
}

// parSteps is the par's sub-step list; parLaunchT is ms offset from par start when this ball
// step fires (= the ball's delay within the par); parSnap is a DOM snapshot of every role's
// position at par start, needed to simulate forward to arrival time.
function _plRunBallStep(ball, speedMult, parSteps, parLaunchT, parSnap, onDone) {
  const kind = ball.kind || 'pass';
  const ballEl = document.getElementById('pl-ball');
  const fromEl = ball.from ? document.getElementById(`plc-${ball.from}`) : null;
  if (!ballEl || !fromEl) { if (onDone) onDone(); return; }
  parLaunchT = parLaunchT || 0;

  // Ball fires from its current resting DOM position — no release-time teleport. The
  // passer's _plMovePlayer glue keeps the ball at a stable offset during carry, and the
  // preceding pass arrival placed the ball at the approach-side edge. Reading DOM here
  // preserves that position exactly. Amy's rule: "the ball should fire from its current
  // position" — any recomputation here produces a visible jolt on A2 in Give and Go.
  const fcx = parseFloat(fromEl.getAttribute('cx'));
  const fcy = parseFloat(fromEl.getAttribute('cy'));
  let sx = parseFloat(ballEl.getAttribute('x'));
  let sy = parseFloat(ballEl.getAttribute('y'));

  // Release — detach from current holder atomically
  _plBallHolder = null;

  // Simulate a role's position at time `t` (ms from par start).
  // Walks the role's sub-steps in delay order, starting from parSnap[role] (par-start position).
  // This is what lets us ask "where will the receiver be when the ball arrives?" without
  // guessing from their final destination.
  const resolveRoleAtT = (role, t) => {
    if (!role) return null;
    if (parSteps && parSnap && parSnap[role]) {
      // Collect movement sub-steps for this role: regular {toX,toY} AND waypoint arrays.
      // Each entry becomes a {delay, dur, path} record where path is a polyline to walk.
      const rSteps = [];
      for (const ps of parSteps) {
        if (ps.role !== role) continue;
        if (ps.toX !== undefined && ps.toY !== undefined) {
          rSteps.push({ delay: ps.delay || 0, dur: ps.dur || 0, path: [{ x: ps.toX, y: ps.toY, cum: ps.dur || 0 }], isEased: true });
        } else if (Array.isArray(ps.waypoints) && ps.waypoints.length) {
          let cum = 0;
          const path = [];
          // Session J — per-segment delay on waypoints. An inter-segment pause
          // is represented in the path as a zero-length segment at the same
          // point — localTime inside [prev.cum, prev.cum+interDelay] holds
          // position at the previous waypoint (same-point interp is a no-op).
          for (let wi = 0; wi < ps.waypoints.length; wi++) {
            const wp = ps.waypoints[wi];
            const interDelay = wi > 0 ? (wp.delay || 0) : 0;
            if (interDelay > 0 && path.length > 0) {
              const prev = path[path.length - 1];
              cum += interDelay;
              path.push({ x: prev.x, y: prev.y, cum });
            }
            cum += (wp.dur || 0);
            path.push({ x: wp.x, y: wp.y, cum });
          }
          rSteps.push({ delay: ps.delay || 0, dur: cum, path, isEased: false });
        }
      }
      rSteps.sort((a, b) => a.delay - b.delay);
      let cx = parSnap[role].x, cy = parSnap[role].y;
      for (const st of rSteps) {
        if (t <= st.delay) return { x: cx, y: cy };
        if (t >= st.delay + st.dur) {
          const last = st.path[st.path.length - 1];
          cx = last.x; cy = last.y;
          continue;
        }
        const localTime = t - st.delay;
        if (st.isEased) {
          // Single-segment linear interpolation. Session J switched
          // _plMovePlayer from easeInOut to linear; the predictor must
          // match or the ball aims at a different point than the
          // receiver actually reaches (the ~3.6u gap Amy observed on
          // L1-A3 DY receive).
          const p = st.dur > 0 ? Math.max(0, Math.min(1, localTime / st.dur)) : 1;
          const end = st.path[0];
          return { x: cx + (end.x - cx) * p, y: cy + (end.y - cy) * p };
        } else {
          // Linear-per-segment waypoint walk.
          let prevX = cx, prevY = cy, prevCum = 0;
          for (const seg of st.path) {
            if (localTime <= seg.cum) {
              const segDur = seg.cum - prevCum;
              const localT = segDur > 0 ? (localTime - prevCum) / segDur : 0;
              return { x: prevX + (seg.x - prevX) * localT, y: prevY + (seg.y - prevY) * localT };
            }
            prevX = seg.x; prevY = seg.y; prevCum = seg.cum;
          }
          return { x: prevX, y: prevY };
        }
      }
      return { x: cx, y: cy };
    }
    // Outside a par, or no snapshot — fall back to DOM current
    const el = document.getElementById(`plc-${role}`);
    if (!el) return null;
    return { x: parseFloat(el.getAttribute('cx')), y: parseFloat(el.getAttribute('cy')) };
  };

  const arrivalT = parLaunchT + (ball.dur || 540);

  // Resolve end point + end-of-flight holder per kind
  let ex, ey, endHolder = null;

  if (kind === 'intercept') {
    // Bend trajectory to the interceptor's position AT INTERCEPTION TIME.
    // Ball lands on the interceptor's leading edge — the side they were
    // running toward. Session J fix: prefer the interceptor's recent
    // movement cardinal (_plDirs) over the geometric "approach from line"
    // direction. When the interceptor is collocated with the carrier
    // (Straight Drive: DY presses UP to A1 so both sit on the same spot),
    // projecting onto the from→to line is degenerate and produces an
    // axis-flipped landing side that then snaps to the carry direction
    // when the interceptor starts moving — Amy's "ball hops from opponent
    // left → bottom of YOU → right of YOU" bug. Using the interceptor's
    // own motion cardinal puts the ball in front of their run from frame
    // one, so the subsequent carry is continuous.
    const intId = ball.interceptedBy;
    const intPos = resolveRoleAtT(intId, arrivalT);
    const toPos  = resolveRoleAtT(ball.to, arrivalT) || { x: fcx, y: fcy };
    const ipx = intPos ? intPos.x : toPos.x;
    const ipy = intPos ? intPos.y : toPos.y;
    let iox, ioy;
    const movement = _plDirs[intId];
    if (movement && (movement.ox !== 0 || movement.oy !== 0)) {
      // Interceptor has recent motion — use their run-direction cardinal.
      iox = movement.ox;
      ioy = movement.oy;
    } else {
      // Stationary interceptor — fall back to approach-from-line direction.
      const dxL = toPos.x - fcx, dyL = toPos.y - fcy;
      const lenSq = dxL*dxL + dyL*dyL;
      let tProj = lenSq > 0 ? ((ipx - fcx)*dxL + (ipy - fcy)*dyL) / lenSq : 0;
      tProj = Math.max(0.1, Math.min(0.9, tProj));
      const bendX = fcx + tProj*dxL, bendY = fcy + tProj*dyL;
      const approachDx = bendX - ipx, approachDy = bendY - ipy;
      if (Math.abs(approachDx) >= Math.abs(approachDy)) { iox = approachDx > 0 ? 3.5 : -3.5; ioy = 0; }
      else { iox = 0; ioy = approachDy > 0 ? 3.5 : -3.5; }
    }
    _plDirs[intId] = { ox: iox, oy: ioy };
    ex = ipx + iox; ey = ipy + ioy;
    endHolder = intId;

    // Session J safety net — instant snap on close contact.
    // When the ball's current DOM position is already within 4u of the
    // interceptor (the carrier has been physically pressed — Straight-Drive-
    // style), the flight animation would pass visibly through the overlapping
    // circles. Short-circuit: place the ball at its final edge, set the
    // holder, fire onDone. Larger-gap intercepts (defender cuts a pass lane
    // across the field) still run the flight interp as before.
    if (Math.hypot(sx - ipx, sy - ipy) < 4) {
      ballEl.setAttribute('x', ex);
      ballEl.setAttribute('y', ey);
      _plBallHolder = endHolder;
      _plJustIntercepted = endHolder;
      if (endHolder === 'DY') _plShowInterceptFlash();
      if (onDone) onDone();
      return;
    }
  } else if (kind === 'shot') {
    if (ball.toX !== undefined && ball.toY !== undefined) { ex = ball.toX; ey = ball.toY; }
    else {
      const tp = resolveRoleAtT(ball.to, arrivalT);
      if (tp) { ex = tp.x; ey = tp.y; }
      else { ex = sx; ey = sy; }
    }
    endHolder = null;
  } else if (kind === 'clear') {
    if (ball.toX !== undefined && ball.toY !== undefined) { ex = ball.toX; ey = ball.toY; }
    else { ex = sx; ey = sy; }
    endHolder = null;
    // Green flash on launch (same treatment as runFollowUp clear)
    const svg = document.getElementById('pl-svg');
    if (svg) {
      const flash = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      flash.setAttribute('cx', sx); flash.setAttribute('cy', sy);
      flash.setAttribute('r', '6'); flash.setAttribute('fill', '#3ec26a');
      flash.setAttribute('opacity', '0.55'); flash.setAttribute('pointer-events', 'none');
      svg.appendChild(flash);
      const tId = setTimeout(() => flash.remove(), 260);
      _plTimeouts.push(tId);
    }
  } else {
    // pass or throw — aim at receiver's position at ball-arrival time.
    // Landing and departure cardinals are derived from the APPROACH vector (passer →
    // receiver), not from either player's movement direction. Otherwise a ball flying
    // in the same direction the receiver is running would land on the FAR side of the
    // receiver's circle, producing a visible hop across the circle at arrival. Same
    // issue at release: if the passer's cardinal is opposite the pass direction, the
    // ball would start on the far side of the passer and snap through their circle.
    // Ball starts at its current resting DOM position (glued to the passer by the held-ball
    // offset). The flight cardinal is derived from the actual flight vector (ball current
    // pos → receiver arrival pos), so the on-arrival side matches where the flight line
    // physically ends. No post-arrival snap. Any cross-body transition happens gradually
    // across the flight tween, not as a discrete jump.
    sx = parseFloat(ballEl.getAttribute('x'));
    sy = parseFloat(ballEl.getAttribute('y'));
    const tp = resolveRoleAtT(ball.to, arrivalT);
    if (tp) {
      // Ball lands on the half of the receiver's circle facing the overall attack
      // direction (east for A-series, west for D-series). Within that half, the exact
      // edge point is picked from the receiver's movement vector in the current par
      // so the ball arrives in front of the receiver's run. If the receiver is
      // stationary or retreating (movement x-component does not match attack direction),
      // ball falls back to the pure attack-direction edge.
      const forwardDir = (_plActionTeam === 'A') ? 1 : -1;
      let mvx = 0, mvy = 0;
      if (parSteps && parSnap) {
        const rStep = parSteps.find(s => s.role === ball.to && typeof s.toX === 'number');
        const rStart = parSnap[ball.to];
        if (rStep && rStart) {
          mvx = rStep.toX - rStart.x;
          mvy = rStep.toY - rStart.y;
        }
      }
      let rox, roy;
      // Bug A fix: GK receivers always take the ball on the field-facing side
      // (home GK east, away GK west) regardless of flight direction or attack
      // team. Without this, a back-pass to the home GK in a D-series play
      // (forwardDir=-1) lands on the goal-line side and the ball appears
      // behind the keeper.
      const isGKReceiver = (ball.to === 'GK' || ball.to === 'gk_home' || ball.to === 'gk_away');
      if (isGKReceiver) {
        rox = tp.x < 50 ? 3.5 : -3.5;
        roy = 0;
      } else if (mvx * forwardDir > 0) {
        const mag = Math.hypot(mvx, mvy) || 1;
        rox = mvx / mag * 3.5;
        roy = mvy / mag * 3.5;
      } else {
        rox = forwardDir * 3.5;
        roy = 0;
      }
      _plDirs[ball.to] = { ox: rox, oy: roy };
      ex = tp.x + rox; ey = tp.y + roy;
    } else { ex = sx; ey = sy; }
    endHolder = ball.to;
  }

  const dur = (ball.dur || 540) * speedMult;
  const fc  = Math.max(1, Math.round(dur / 16));
  let f = 0;
  const iId = setInterval(() => {
    f++;
    const p = f / fc;
    const t = p < 0.5 ? 2*p*p : -1 + (4 - 2*p)*p;
    ballEl.setAttribute('x', sx + (ex - sx) * t);
    ballEl.setAttribute('y', sy + (ey - sy) * t);
    if (f >= fc) {
      clearInterval(iId);
      _plIntervals = _plIntervals.filter(i => i !== iId);
      // Arrival: leave the ball at the flight endpoint (ex, ey). No cardinal recomputation.
      // Do NOT read _plDirs[endHolder] here — it may have been overwritten to the holder's
      // movement cardinal by a concurrent _plMovePlayer call during the flight, which would
      // produce a visible side-jump at arrival. The next _plMovePlayer frame for endHolder
      // will capture ball's current DOM offset (via heldBallOx/Oy) and glue the ball there
      // through the rest of the move, preserving the approach-side landing.
      ballEl.setAttribute('x', ex); ballEl.setAttribute('y', ey);
      if (endHolder) {
        _plBallHolder = endHolder;
        // Session AE fix for Straight Drive 90-degree bug: flag the interceptor so
        // the next _plMovePlayer call realigns the held-ball offset to the carry's
        // movement cardinal instead of leaving it on the approach side.
        if (kind === 'intercept') {
          _plJustIntercepted = endHolder;
          if (endHolder === 'DY') _plShowInterceptFlash();
        }
      }
      if (onDone) onDone();
    }
  }, 16);
  _plIntervals.push(iId);
}

// Session J — cross-phase continuity. Merge consecutive pars so a role's
// next-par motion starts the moment its own prior-par motion ends, rather
// than waiting for the par's longest step to finish. Without this, Amy
// observed players decelerating + standing still between phase boundaries
// (par closed on the slowest step; everyone else finished early and waited).
//
// Offsets:
//   - motion substep (s.role): role-specific prior end, or prev-par max if
//     the role had no prior motion in the merged par.
//   - ball substep (s.ball): `from` role's prior end if it existed, else
//     prev-par max. Preserves author-intended relative timing between the
//     passer/shooter's motion and the ball fire.
//   - other substeps: prev-par max.
//
// Only consecutive pars are merged; mixed sequences (par → pause → par, or
// par → top-level motion → par) stay sequential. Source data is not mutated;
// merged par entries are shallow-cloned so downstream runs/exports are clean.
function _plMergeConsecutivePars(steps) {
  const out = [];
  const stepTotalDur = (s) => {
    if (!s) return 0;
    if (s.ball) return s.ball.dur || 0;
    if (Array.isArray(s.waypoints)) return s.waypoints.reduce((a, w, i) => a + (w.dur || 0) + (i > 0 ? (w.delay || 0) : 0), 0);
    if (s.hold) return s.dur || 0;
    if (typeof s.dur === 'number') return s.dur;
    return 0;
  };
  for (const cur of steps) {
    const prev = out.length ? out[out.length - 1] : null;
    const canMerge = cur && cur.par && Array.isArray(cur.par) && prev && prev.par && Array.isArray(prev.par);
    if (canMerge) {
      const roleEnd = {};
      let prevMax = 0;
      for (const s of prev.par) {
        const d = s.delay || 0;
        const end = d + stepTotalDur(s);
        prevMax = Math.max(prevMax, end);
        if (s.role) roleEnd[s.role] = Math.max(roleEnd[s.role] || 0, end);
      }
      for (const s of cur.par) {
        let base;
        if (s.role) base = roleEnd[s.role] != null ? roleEnd[s.role] : prevMax;
        else if (s.ball) base = (s.ball.from && roleEnd[s.ball.from] != null) ? roleEnd[s.ball.from] : prevMax;
        else base = prevMax;
        const moved = Object.assign({}, s);
        moved.delay = (s.delay || 0) + base;
        prev.par.push(moved);
      }
    } else if (cur && cur.par && Array.isArray(cur.par)) {
      // Clone so later merges don't mutate the source step objects.
      out.push({ par: cur.par.map(s => Object.assign({}, s)) });
    } else {
      out.push(cur);
    }
  }
  return out;
}

// Unified animation engine — runs prePlay then payoff in one continuous chain.
// speedMult=1 is normal speed; speedMult=2 is 50% speed (slo-mo).
function _plRunFull(play, speedMult) {
  speedMult = speedMult || 1;
  // Prefer phases[] (Session G shape); fall back to legacy prePlay+payoff.
  let allSteps = Array.isArray(play.phases)
    ? play.phases.reduce((acc, ph) => acc.concat(ph || []), [])
    : (play.prePlay || []).concat(play.payoff || []);
  if (!allSteps.length) return;
  // Collapse consecutive pars for cross-phase continuity.
  allSteps = _plMergeConsecutivePars(allSteps);

  let cursor = 0;
  function runNext() {
    if (cursor >= allSteps.length) return;
    const step = allSteps[cursor++];

    if (step.ball) {
      // Typed ball construct (Session X) — replaces ballFly/ballTo at top level.
      // Outside a par: no snapshot, no parLaunchT — ball aims at DOM current.
      _plRunBallStep(step.ball, speedMult, null, 0, null, runNext);
    } else if (step.hold) {
      // Explicit hold annotation (Invariant 2) — player stands for dur with a reason string
      const tId = setTimeout(runNext, (step.dur || 0) * speedMult);
      _plTimeouts.push(tId);
    } else if (step.ballFly) {
      const ball = document.getElementById('pl-ball');
      const tgt  = document.getElementById(`plc-${step.ballFly}`);
      if (!ball || !tgt) { runNext(); return; }
      const tcx = parseFloat(tgt.getAttribute('cx'));
      const tcy = parseFloat(tgt.getAttribute('cy'));
      // Departure: if ball is on the side opposite to the pass direction, it would fly through
      // the passer's body — snap to the pass-facing side first
      let sx = parseFloat(ball.getAttribute('x'));
      let sy = parseFloat(ball.getAttribute('y'));
      if (_plBallHolder) {
        const passerEl = document.getElementById(`plc-${_plBallHolder}`);
        if (passerEl) {
          const px = parseFloat(passerEl.getAttribute('cx'));
          const py = parseFloat(passerEl.getAttribute('cy'));
          const pd = _plDirs[_plBallHolder];
          const pdx = tcx - px, pdy = tcy - py;
          if (pd && (pdx * pd.ox + pdy * pd.oy) < 0) {
            // Ball is on wrong side — snap to pass-facing side
            let dox, doy;
            if (Math.abs(pdx) >= Math.abs(pdy)) { dox = pdx > 0 ? 3.5 : -3.5; doy = 0; }
            else { dox = 0; doy = pdy > 0 ? 3.5 : -3.5; }
            _plDirs[_plBallHolder] = { ox: dox, oy: doy };
            ball.setAttribute('x', px + dox); ball.setAttribute('y', py + doy);
            sx = px + dox; sy = py + doy;
          }
        }
      }
      // Arrive at receiver's leading edge using their movement direction
      const rd = _plDirs[step.ballFly] || { ox: 3.5, oy: 0 };
      const ex = tcx + rd.ox;
      const ey = tcy + rd.oy;
      const dur = (step.dur || 450) * speedMult;
      const fc  = Math.max(1, Math.round(dur / 16));
      let f = 0;
      const iId = setInterval(() => {
        f++;
        const p = f / fc;
        const t = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
        ball.setAttribute('x', sx + (ex-sx)*t);
        ball.setAttribute('y', sy + (ey-sy)*t);
        if (f >= fc) {
          clearInterval(iId);
          _plIntervals = _plIntervals.filter(i => i !== iId);
          ball.setAttribute('x', ex); ball.setAttribute('y', ey);
          _plBallHolder = step.ballFly;
          runNext();
        }
      }, 16);
      _plIntervals.push(iId);
    } else if (step.ballTo) {
      const targetCircle = document.getElementById(`plc-${step.ballTo}`);
      if (targetCircle) {
        const tx = parseFloat(targetCircle.getAttribute('cx'));
        const ty = parseFloat(targetCircle.getAttribute('cy'));
        const ball = document.getElementById('pl-ball');
        if (ball) {
          const bd = _plDirs[step.ballTo] || { ox: 3.5, oy: 0 };
          ball.setAttribute('x', tx + bd.ox); ball.setAttribute('y', ty + bd.oy);
        }
        _plBallHolder = step.ballTo;
      }
      runNext();
    } else if (step.par) {
      // Par-start snapshot of every role's DOM position. Used by _plRunBallStep to
      // simulate forward and predict a receiver's position at ball-arrival time.
      const parSnap = {};
      document.querySelectorAll('[id^="plc-"]').forEach(el => {
        const role = el.id.slice(4);
        parSnap[role] = { x: parseFloat(el.getAttribute('cx')), y: parseFloat(el.getAttribute('cy')) };
      });
      let maxMs = 0;
      step.par.forEach(s => {
        const delay = (s.delay || 0) * speedMult;
        const dur   = (s.dur   || 800) * speedMult;
        // Waypoint step: effective dur is the sum of waypoint durs.
        let effectiveDur = dur;
        if (Array.isArray(s.waypoints)) {
          effectiveDur = s.waypoints.reduce((a, w) => a + (w.dur || 0), 0) * speedMult;
        }
        maxMs = Math.max(maxMs, delay + effectiveDur);
        if (s.ball) {
          // Typed ball construct. parLaunchT = s.delay (ms from par start); parSnap lets the
          // handler walk each role's trajectory and aim at their position at ball-arrival.
          const tId = setTimeout(() => {
            _plRunBallStep(s.ball, speedMult, step.par, s.delay || 0, parSnap, null);
          }, delay);
          _plTimeouts.push(tId);
          const bdur = (s.ball.dur || 540) * speedMult;
          maxMs = Math.max(maxMs, delay + bdur);
        } else if (s.hold) {
          // No-op — hold is a semantic annotation, audit consumes the reason string
        } else if (s.ballFly) {
          // ballFly inside a par — fires after delay, animates ball while players keep moving
          const tId = setTimeout(() => {
            const ball = document.getElementById('pl-ball');
            const tgt  = document.getElementById(`plc-${s.ballFly}`);
            if (!ball || !tgt) return;
            const sx = parseFloat(ball.getAttribute('x'));
            const sy = parseFloat(ball.getAttribute('y'));
            // Target receiver's final par destination + their cardinal direction offset
            const receiverSteps = step.par.filter(ps => ps.role === s.ballFly);
            const receiverFinal = receiverSteps.slice(-1)[0];
            const finalX = receiverFinal ? receiverFinal.toX : parseFloat(tgt.getAttribute('cx'));
            const finalY = receiverFinal ? receiverFinal.toY : parseFloat(tgt.getAttribute('cy'));
            const rd = _plDirs[s.ballFly] || { ox: 3.5, oy: 0 };
